# Corvus Roost — Commercial Real Estate Property Management Neuron Graph
# Layer 0: Department, Layer 1: Role, Layer 2: Task Category
# Layer 3: System/Procedure, Layer 4: Decision/Analysis, Layer 5: Output/Deliverable
#
# Target user: Grunberg Realty — NYC, CT, AZ portfolio

departments:

  # ══════════════════════════════════════════════════════════════
  # EXECUTIVE & ASSET MANAGEMENT
  # ══════════════════════════════════════════════════════════════
  - label: Executive & Asset Management
    roles:
      - label: Managing Principal
        role_key: managing_principal
        tasks:
          - label: Strategic portfolio direction
            summary: Set investment strategy, capital allocation, and growth targets across the portfolio
            systems:
              - label: Portfolio performance dashboard review
                summary: Analyze property-level and portfolio-wide KPIs (NOI, occupancy, cap rate, DSCR)
                content: |
                  Review quarterly: NOI by property, occupancy rates vs market, weighted average lease term (WALT),
                  tenant credit quality distribution, capital reserve adequacy, debt maturity schedule.
                  Portfolio properties: 280 Trumbull St (675K sqft, Hartford CT), 628 Hebron Ave (155K sqft,
                  Glastonbury CT), 928 Broadway (NYC Flatiron), 7975 N Hayden Rd + 8655 E Via de Ventura
                  (251K sqft combined, Scottsdale AZ), 66 W 77th St (36 residential units, NYC UWS).
                decisions:
                  - label: Prioritize capital allocation across properties by ROI and strategic fit
                    outputs:
                      - label: Quarterly strategic direction memo
                        content: |
                          Summarize portfolio performance, highlight properties exceeding/underperforming targets,
                          capital allocation priorities for next quarter, acquisition/disposition recommendations,
                          and key risks (tenant concentration, regulatory deadlines, market shifts).

          - label: Acquisition underwriting
            summary: Evaluate potential property acquisitions for strategic and financial fit
            systems:
              - label: Market comp analysis using CoStar and broker data
                summary: Analyze comparable sales, cap rates, and submarket dynamics for target property
                content: |
                  CoStar provides 390+ markets with daily transaction updates. Pull comparable sales
                  within submarket (3-5 mile radius, similar class/size) from last 24 months. Analyze
                  cap rate trends, price per sqft, and vacancy/absorption. CompStak provides lease
                  comps for in-place revenue validation. Assess asking vs effective rent gap in market.
                decisions:
                  - label: Bid or pass based on IRR and equity multiple targets
                    outputs:
                      - label: Acquisition underwriting memo with recommendation
                        content: |
                          Include: property description, market analysis, rent roll review, capital needs assessment,
                          10-year DCF model with assumptions, sensitivity analysis on key variables (vacancy,
                          rent growth, cap rate exit), financing structure, go/no-go recommendation with rationale.

          - label: Disposition analysis
            summary: Evaluate hold vs sell decisions for existing portfolio properties
            systems:
              - label: Hold-sell-reposition analysis framework
                summary: Model scenarios for continuing to hold, selling at current market, or repositioning asset
                content: |
                  Inputs: current NOI, remaining debt term, capital needs (deferred maintenance, LL97 compliance,
                  tenant rollover costs), market cap rate, projected rent growth, and opportunity cost of capital.
                  Model three scenarios: (1) hold and operate as-is, (2) sell at current market valuation,
                  (3) reposition with capital investment and sell at improved valuation.
                decisions:
                  - label: Recommend hold, sell, or reposition based on risk-adjusted returns
                    outputs:
                      - label: Disposition analysis with scenario comparison
                        content: |
                          Present IRR and equity multiple for each scenario over 5 and 10 year horizons.
                          Include capital requirements, tax implications (1031 exchange eligibility),
                          and portfolio concentration impact.

      - label: Principal
        role_key: principal
        tasks:
          - label: Operations oversight
            summary: Oversee day-to-day property operations and vendor performance across the portfolio
            systems:
              - label: Property management reporting review
                summary: Review occupancy, collections, work order completion, and tenant satisfaction
                content: |
                  Monthly review: rent collection rates (target 98%+), work order completion time
                  (target 24hr for urgent, 72hr for routine), tenant complaint resolution, vendor
                  performance scorecards, utility cost trends, and insurance claims status. Site
                  visits to each property at minimum quarterly.
                decisions:
                  - label: Escalate underperforming properties or vendors for corrective action
                    outputs:
                      - label: Monthly operations summary with action items
                        content: |
                          Property-by-property status on collections, occupancy, maintenance backlog,
                          vendor issues, and upcoming lease expirations. Highlight any items requiring
                          Managing Principal attention.

          - label: Vendor relationship management
            summary: Manage key vendor contracts and service quality across properties
            systems:
              - label: Vendor scorecard and contract review
                summary: Evaluate vendor performance against SLAs and market pricing
                content: |
                  Track vendor metrics: response time, quality of work, pricing competitiveness,
                  insurance/license compliance, and safety record. Major vendor categories:
                  janitorial, HVAC/mechanical, elevator, security, landscaping, snow removal.
                  Contract review cycle: annually for major vendors, at renewal for all.
                decisions:
                  - label: Renew, rebid, or terminate vendor contracts based on performance
                    outputs:
                      - label: Vendor management directive (renewal, RFP, or termination notice)
                        content: |
                          For renewals: approved terms and any negotiated changes. For RFPs: scope of
                          work, evaluation criteria, and timeline. For terminations: transition plan
                          and replacement vendor timeline.

      - label: Asset Analyst
        role_key: asset_analyst
        tasks:
          - label: Property valuation and cap rate analysis
            summary: Maintain current valuations for all portfolio properties using income capitalization and DCF
            systems:
              - label: Income capitalization and DCF modeling
                summary: Apply valuation methodologies using in-place NOI and projected cash flows
                content: |
                  Direct capitalization: NOI / market cap rate = value. DCF: project 10-year cash flows
                  with assumptions for rent growth, vacancy, operating expense inflation, capital reserves,
                  and terminal cap rate. Sensitivity analysis on key variables. Market cap rates sourced
                  from CoStar, recent comparable sales, and broker surveys. Update valuations quarterly.
                decisions:
                  - label: Flag material changes in property value for executive review
                    outputs:
                      - label: Quarterly property valuation update
                        content: |
                          Per-property valuation with methodology, key assumptions, change from prior quarter,
                          and market context. Portfolio aggregate value with concentration analysis.

  # ══════════════════════════════════════════════════════════════
  # LEASING & TENANT RELATIONS
  # ══════════════════════════════════════════════════════════════
  - label: Leasing & Tenant Relations
    roles:
      - label: Director of Commercial Real Estate
        role_key: director_commercial_re
        tasks:
          - label: LOI preparation and negotiation
            summary: Prepare and negotiate letters of intent for new leases and renewals
            systems:
              - label: LOI drafting with market-informed terms
                summary: Draft LOI with base rent, escalations, TI, CAM structure, and term informed by market comps
                content: |
                  LOI structure: (1) Premises description (property, floor, sqft), (2) Lease term and
                  commencement date, (3) Base rent ($/sqft/year) — actual deals typically 10-20% below
                  asking, (4) Annual escalations (fixed 2-3%, CPI-indexed, or FMV reset), (5) Operating
                  expense structure (base year, expense stop, or NNN), (6) CAM charges with 5% annual
                  cap on controllable expenses, (7) TI allowance ($10-50+/sqft based on credit and term),
                  (8) Free rent concession (typically 1 month per year of term), (9) Security deposit,
                  (10) Renewal option terms, (11) Assignment/subletting rights, (12) Exclusive use clause
                  (if applicable), (13) Contingencies and due diligence period.
                  Generally non-binding on economic terms; binding on confidentiality and exclusivity.
                decisions:
                  - label: Set initial asking terms and negotiation floor based on market analysis
                    outputs:
                      - label: LOI document with market justification memo
                        content: |
                          Final LOI with all key terms, accompanied by market analysis showing comparable
                          lease comps, vacancy/absorption context, and rationale for proposed economics.

              - label: Counsel impact assessment for LOI negotiation
                summary: Adjust negotiation strategy based on tenant counsel quality and representation
                content: |
                  Tenant counsel significantly affects negotiation dynamics:
                  Big law firm representation: expect sophisticated contingency language, stronger
                  tenant protections, longer negotiation timeline, and more aggressive economic asks.
                  Prepare for detailed lease markup with institutional-quality comments.
                  Mid-size firm: competent representation with reasonable turnaround. Standard
                  commercial lease negotiation expected.
                  Solo practitioner: may lack CRE lease expertise — landlord should ensure clear
                  documentation to prevent future misunderstandings.
                  Self-represented tenant: fastest closing but highest risk of post-execution disputes.
                  Consider building in additional protections (personal guarantee, higher deposit).
                  Strategy: engage landlord counsel before issuing LOI, tailor language complexity
                  to expected counterpart, and build counsel-related timeline buffer into schedule.
                decisions:
                  - label: Adjust concession package and timeline based on counsel profile
                    outputs:
                      - label: Negotiation strategy memo with counsel-adjusted approach
                        content: |
                          Recommended negotiation strategy accounting for tenant counsel profile,
                          anticipated sticking points, concession budget, and target closing timeline.

          - label: Market analysis and rent setting
            summary: Analyze submarket conditions to set competitive asking rents
            systems:
              - label: Submarket comp analysis using CoStar and CompStak
                summary: Pull vacancy rates, absorption trends, and lease comps for each property submarket
                content: |
                  Data sources: CoStar (macro market data — vacancy, absorption, new supply, cap rates),
                  CompStak (actual lease comps — give-to-get crowdsourced model), Placer.ai (foot traffic
                  for retail-adjacent analysis). Key metrics: asking vs effective rent (gap reveals
                  concession levels), vacancy rate trend (rising=tenant market, falling=landlord market),
                  net absorption (positive=demand exceeding supply), new supply pipeline, tenant in-migration
                  vs out-migration patterns.
                  Submarkets: Hartford CBD (280 Trumbull), Glastonbury suburban (628 Hebron), Manhattan
                  Flatiron (928 Broadway), Scottsdale/McCormick Ranch (7975 Hayden + 8655 Via de Ventura).
                decisions:
                  - label: Adjust asking rents based on submarket positioning and competitive set
                    outputs:
                      - label: Quarterly market report with rent recommendations
                        content: |
                          Per-property market report with comp analysis, vacancy/absorption trends,
                          competitive set benchmarking, and recommended asking rent adjustments.

      - label: Leasing Agent
        role_key: leasing_agent
        tasks:
          - label: Tenant qualification and showings
            summary: Qualify prospective tenants and conduct property tours
            systems:
              - label: Prospect qualification checklist
                summary: Evaluate prospect financial capacity, space requirements, and timing
                content: |
                  Qualification criteria: (1) Business type and use compatibility with zoning/C of O,
                  (2) Space requirement (sqft, configuration, special needs), (3) Timeline (when do they
                  need to occupy), (4) Budget (can they afford the asking rent + operating expenses),
                  (5) Lease term willingness, (6) Credit quality (initial screening — D&B check,
                  financial statements request), (7) Decision-making authority of contact,
                  (8) Current location and reason for moving.
                decisions:
                  - label: Advance qualified prospects to LOI stage or decline
                    outputs:
                      - label: Prospect qualification summary for leasing director
                        content: |
                          Prospect name, business description, space needs, timeline, estimated credit
                          quality, likelihood of closing, and recommended next steps.

          - label: Available space marketing
            summary: Market vacant and upcoming available spaces across the portfolio
            systems:
              - label: Listing creation and distribution
                summary: Create property listings for CoStar, LoopNet, and broker networks
                content: |
                  Listing content: property address, available sqft, floor plan, asking rent,
                  building amenities, parking ratio, transit access, and contact information.
                  Distribution channels: CoStar/LoopNet (primary CRE listing platforms),
                  local broker networks, property website, and direct broker outreach for
                  targeted tenant profiles.
                decisions:
                  - label: Select marketing channels and pricing strategy for each available space
                    outputs:
                      - label: Marketing plan for available space
                        content: |
                          Listing details, target tenant profile, marketing budget, broker commission
                          structure, and outreach timeline.

      - label: Tenant Relations Manager
        role_key: tenant_relations_mgr
        tasks:
          - label: Lease renewal management
            summary: Track upcoming expirations and manage renewal negotiations
            systems:
              - label: Lease expiration tracking and early engagement
                summary: Maintain rolling 24-month expiration calendar and initiate renewal discussions 12-18 months early
                content: |
                  Renewal process: (1) Identify expirations 18-24 months out, (2) Assess tenant
                  desirability (credit quality, rent level vs market, space utilization, relationship),
                  (3) Initiate informal renewal discussion 12-18 months before expiry, (4) Prepare
                  renewal proposal with market-adjusted terms, (5) Negotiate and execute renewal or
                  begin remarketing. Key metric: retention rate (target 70%+ for desirable tenants).
                  Early engagement reduces vacancy risk and re-leasing costs (TI, downtime, commissions).
                decisions:
                  - label: Offer renewal terms or prepare to remarket based on tenant quality and market conditions
                    outputs:
                      - label: Renewal proposal or remarketing plan
                        content: |
                          For renewals: proposed terms with market justification. For non-renewals:
                          timeline for space preparation, marketing plan, and estimated downtime/cost.

          - label: Tenant satisfaction and retention
            summary: Maintain tenant relationships to maximize retention and minimize disputes
            systems:
              - label: Tenant engagement program
                summary: Regular touchpoints, satisfaction surveys, and issue resolution
                content: |
                  Quarterly tenant touchpoints (in-person or call) to discuss space needs, service
                  quality, and future plans. Annual satisfaction survey covering: maintenance
                  responsiveness, building cleanliness, security, amenities, and communication.
                  Issue resolution protocol: acknowledge within 24 hours, investigate within 48
                  hours, resolve or provide timeline within 72 hours. Escalation path: Property
                  Manager -> Principal -> Managing Principal.
                decisions:
                  - label: Identify at-risk tenants and deploy retention strategies
                    outputs:
                      - label: Tenant satisfaction report with retention action items
                        content: |
                          Survey results, at-risk tenant identification, recommended interventions
                          (rent adjustment, space modification, service improvement), and timeline.

  # ══════════════════════════════════════════════════════════════
  # PROPERTY OPERATIONS
  # ══════════════════════════════════════════════════════════════
  - label: Property Operations
    roles:
      - label: Property Manager
        role_key: property_manager
        tasks:
          - label: Building operations management
            summary: Oversee day-to-day building operations, vendor coordination, and tenant services
            systems:
              - label: Daily operations checklist and building walk-through
                summary: Systematic daily inspection covering lobby, common areas, mechanical, and exterior
                content: |
                  Daily walk-through: lobby condition, elevator operation, common area cleanliness,
                  restroom supplies, HVAC comfort (spot-check temperature), lighting, exterior/
                  landscaping, parking lot condition, signage. Document any issues for work order
                  creation. Verify vendor attendance (janitorial, security, landscaping).
                  Property-specific contacts:
                  - 280 Trumbull St: on-site management
                  - 628 Hebron Ave: India Liddell (Property Manager)
                  - 928 Broadway: NYC headquarters management
                  - 7975 N Hayden / 8655 Via de Ventura: Marsha Pisowicz (Property Manager)
                decisions:
                  - label: Prioritize and assign issues identified during walk-through
                    outputs:
                      - label: Daily operations report with work orders created
                        content: |
                          Issues identified, priority level, assigned party, expected completion date.

          - label: Work order management
            summary: Receive, prioritize, and track maintenance requests from tenants and staff
            systems:
              - label: Work order triage and dispatch
                summary: Classify work orders by urgency and assign to appropriate staff or vendor
                content: |
                  Priority levels: Emergency (immediate safety/building integrity — fire, flood, gas leak,
                  elevator entrapment, power failure affecting life safety), Urgent (within 4 hours —
                  HVAC failure in occupied space, plumbing leak, security system failure), Routine
                  (within 24-72 hours — minor repairs, cosmetic issues, non-critical equipment),
                  Scheduled (planned maintenance — per PM calendar). Dispatch to: in-house engineering
                  (Sabin Brown at Scottsdale, in-house team at other properties) or contracted vendor.
                decisions:
                  - label: Assign work order to appropriate resource based on skill and urgency
                    outputs:
                      - label: Work order completion report
                        content: |
                          Work order details, resolution description, parts/materials used, labor hours,
                          tenant notification, and any follow-up required.

          - label: Capital project oversight
            summary: Manage tenant build-outs and building capital improvement projects
            systems:
              - label: Project management for tenant improvements and capital work
                summary: Coordinate contractors, permits, inspections, and schedule for construction projects
                content: |
                  Project phases: (1) Scope definition and architect/engineer engagement, (2) Permit
                  application (DOB in NYC, local building dept in CT/AZ), (3) Contractor bidding and
                  selection, (4) Construction monitoring (weekly progress meetings, quality inspections),
                  (5) Punch list and closeout, (6) Final inspection and C of O (if required),
                  (7) Tenant occupancy. Key considerations: ADA compliance review for all alterations,
                  asbestos/lead survey for pre-renovation in older buildings (280 Trumbull 1984,
                  928 Broadway pre-war), noise/disruption coordination with existing tenants.
                decisions:
                  - label: Approve change orders and schedule adjustments
                    outputs:
                      - label: Project status report with budget and schedule tracking
                        content: |
                          Progress vs plan, budget vs actual, change order log, upcoming milestones,
                          and any issues requiring management attention.

      - label: Chief Engineer
        role_key: chief_engineer
        tasks:
          - label: Building systems maintenance
            summary: Maintain HVAC, electrical, plumbing, elevator, and fire/life safety systems
            systems:
              - label: Preventive maintenance program
                summary: Scheduled maintenance for all building systems per manufacturer and code requirements
                content: |
                  HVAC: filter changes (quarterly for standard, monthly for high-traffic areas),
                  coil cleaning (annual), refrigerant check (annual, EPA Section 608 compliance),
                  BMS calibration (semi-annual), chiller maintenance (annual overhaul).
                  Elevator: monthly maintenance per service contract (ASME A17.1), annual safety
                  test, 5-year full-load test. Fire/life safety: fire alarm testing (NFPA 72 —
                  annual), sprinkler inspection (NFPA 25 — quarterly visual, annual trip test),
                  fire pump test (weekly churn, annual flow). Electrical: switchgear thermography
                  (annual), generator load test (monthly), ATS transfer test (monthly).
                  Plumbing: backflow preventer test (annual), domestic water tank inspection,
                  sump pump test (monthly).
                  Key staff: Sabin Brown (Lead Engineer, Scottsdale properties).
                decisions:
                  - label: Identify equipment approaching end of life for capital planning
                    outputs:
                      - label: Equipment condition report with lifecycle projections
                        content: |
                          Equipment inventory with age, condition rating, expected remaining life,
                          estimated replacement cost, and recommended capital planning timeline.

              - label: Energy management and LL97 compliance
                summary: Monitor and optimize building energy performance to meet emissions targets
                content: |
                  Track energy consumption via BMS/utility data. Benchmark using EPA Energy Star
                  Portfolio Manager (LL84 requirement for NYC properties). Identify efficiency
                  opportunities: LED lighting retrofit, HVAC optimization, VFD installation on
                  pumps/fans, building envelope improvements. For NYC properties (928 Broadway,
                  66 W 77th St): calculate current emissions vs LL97 caps, model retrofit scenarios
                  with payback analysis, plan capital investment to avoid LL97 penalties ($268/ton).
                decisions:
                  - label: Recommend energy efficiency projects ranked by ROI and compliance impact
                    outputs:
                      - label: Energy management report with retrofit recommendations
                        content: |
                          Current energy performance, emissions vs LL97 targets, recommended ECMs
                          with estimated cost, savings, payback period, and emissions reduction.

      - label: Maintenance Technician
        role_key: maintenance_tech
        tasks:
          - label: Routine maintenance and repairs
            summary: Execute work orders for general maintenance, minor repairs, and tenant requests
            systems:
              - label: Standard maintenance procedures
                summary: Procedures for common maintenance tasks (lighting, plumbing, door hardware, painting)
                content: |
                  Common tasks: light fixture replacement (verify correct lamp type, check ballast),
                  plumbing repairs (faucet washer, toilet flapper, drain clearing), door hardware
                  (hinges, closers, locksets), drywall patching and painting, ceiling tile replacement,
                  carpet spot repair, window treatment adjustment. Safety requirements: LOTO for
                  electrical work, PPE for chemical use, ladder safety, hot work permit for welding/
                  soldering. Document all work in CMMS with time, materials, and resolution.
                  Key staff: Marco Diaz (Maintenance Technician, Scottsdale properties).
                decisions:
                  - label: Determine if repair requires escalation to engineer or outside vendor
                    outputs:
                      - label: Completed work order with resolution notes
                        content: |
                          Work performed, materials used, time spent, tenant notified, any follow-up needed.

      - label: Security Manager
        role_key: security_mgr
        tasks:
          - label: Building security and access control
            summary: Manage security systems, access control, and emergency procedures
            systems:
              - label: Security operations and access management
                summary: Oversee card access, visitor management, CCTV, and guard services
                content: |
                  Access control: card/fob access for tenants with floor-level permissions,
                  visitor sign-in at lobby (verify tenant authorization), after-hours access
                  procedures, loading dock security. CCTV: monitor camera system, maintain
                  recording retention (minimum 30 days). Guard services: lobby staffing hours,
                  patrol routes, incident response procedures. Emergency procedures: fire
                  evacuation plan, active threat protocol, medical emergency response, severe
                  weather sheltering. Coordinate with Fire Safety Director (NYC properties).
                  928 Broadway: 24-hour doorman service.
                  280 Trumbull: enhanced security infrastructure (capital improvement).
                  Scottsdale properties: evening security.
                decisions:
                  - label: Escalate security incidents and adjust protocols as needed
                    outputs:
                      - label: Security incident report and protocol update
                        content: |
                          Incident description, response actions, outcome, and any recommended
                          changes to security procedures or systems.

  # ══════════════════════════════════════════════════════════════
  # FINANCE & ACCOUNTING
  # ══════════════════════════════════════════════════════════════
  - label: Finance & Accounting
    roles:
      - label: Controller
        role_key: controller
        tasks:
          - label: Financial reporting and budgeting
            summary: Prepare property-level and consolidated financial statements and annual operating budgets
            systems:
              - label: Monthly financial close and reporting
                summary: Close property books monthly, prepare income statements, balance sheets, and NOI analysis
                content: |
                  Monthly close process: verify rent roll accuracy, post accruals and adjustments,
                  reconcile bank accounts, review AP aging, prepare property-level income statement
                  and balance sheet. NOI waterfall: Gross Potential Rent - Vacancy/Credit Loss +
                  Other Income = Effective Gross Income - Operating Expenses = NOI. Track actual
                  vs budget variance by line item. Consolidated reporting across all six properties.
                decisions:
                  - label: Identify material budget variances and recommend corrective action
                    outputs:
                      - label: Monthly financial package with variance analysis
                        content: |
                          Property-level and consolidated P&L, balance sheet, cash flow, NOI analysis,
                          budget vs actual variance report with explanations for material variances.

          - label: Annual operating budget preparation
            summary: Develop next-year operating budgets for all properties
            systems:
              - label: Budget development process
                summary: Build bottom-up budgets by line item using historical trends and known changes
                content: |
                  Budget process (begins Q3 for following year): (1) Revenue projections — in-place
                  rent roll, anticipated lease expirations and renewals, market rent assumptions for
                  vacant space, other income. (2) Operating expense projections — historical trend
                  analysis, known contractual increases, utility rate assumptions, property tax
                  estimates, insurance renewal quotes. (3) Capital budget — deferred maintenance
                  items, LL97 compliance projects, TI allowances for anticipated leasing, equipment
                  replacements per lifecycle schedule. (4) Debt service — scheduled payments,
                  refinancing assumptions. Present to Managing Principal and Principal for approval.
                decisions:
                  - label: Approve budget or request adjustments to align with portfolio strategy
                    outputs:
                      - label: Approved annual operating budget by property
                        content: |
                          Detailed line-item budget with assumptions, capital budget, debt service
                          schedule, and projected NOI with prior year comparison.

      - label: Property Accountant
        role_key: property_accountant
        tasks:
          - label: Rent collection and accounts receivable
            summary: Process rent payments, manage AR aging, and handle delinquency
            systems:
              - label: Rent roll management and collection tracking
                summary: Maintain accurate rent roll, process payments, and track delinquencies
                content: |
                  Rent due on 1st of month per standard lease terms. Grace period typically 5
                  business days. Late fee per lease terms (typically 5% of monthly rent). AR aging
                  buckets: current, 30 days, 60 days, 90+ days. Escalation protocol: 30 days —
                  phone call and written reminder, 60 days — formal demand letter, 90 days — legal
                  referral and default notice per lease terms. Track security deposit application
                  rights. Government tenants (GSA, state agencies) have different payment cycles —
                  typically 30-day net from invoice.
                decisions:
                  - label: Escalate delinquent accounts based on aging and tenant risk profile
                    outputs:
                      - label: AR aging report with collection action recommendations
                        content: |
                          Current AR aging by tenant, collection actions taken, recommended escalation
                          for accounts beyond 60 days, and any security deposit offset recommendations.

          - label: CAM reconciliation
            summary: Perform annual operating expense reconciliation and prepare tenant statements
            systems:
              - label: Year-end CAM reconciliation process
                summary: Calculate actual vs estimated operating expenses and issue reconciliation statements
                content: |
                  Process: (1) Compile actual operating expenses for calendar year, (2) Apply
                  lease-specific exclusions (capital items, landlord costs, management fee caps),
                  (3) Calculate each tenant pro rata share (based on BOMA-measured rentable sqft),
                  (4) Apply gross-up if building below 95% occupancy, (5) Compare actual pro rata
                  share to estimated payments collected during year, (6) Issue reconciliation
                  statement showing over/underpayment, (7) Bill or credit difference. Deadline:
                  typically within 120 days of year-end per lease terms. Tenant audit rights:
                  most leases allow review within 90-180 days of statement delivery.
                decisions:
                  - label: Resolve reconciliation disputes and audit findings
                    outputs:
                      - label: CAM reconciliation statements by tenant
                        content: |
                          Detailed reconciliation showing expense categories, total amounts,
                          tenant pro rata share, estimated payments, and over/underpayment.

          - label: RPIE filing preparation
            summary: Prepare Real Property Income and Expense filings for NYC properties
            systems:
              - label: RPIE data compilation and filing
                summary: Compile income and expense data for NYC DOF annual RPIE submission
                content: |
                  RPIE required for income-producing properties with assessed value over $40,000.
                  Applies to 928 Broadway and 66 W 77th St. Filing deadline: June 1 annually.
                  Online-only filing. Includes: gross income by category (rent, parking, other),
                  operating expenses by category, capital expenditures. Large Property Addendum
                  (assessed value >= $750K): requires rent roll detail. Section S (Storefront
                  Registration): required for ground-floor commercial at 928 Broadway.
                  Penalty for late filing: up to 5% of actual assessed value.
                decisions:
                  - label: Review filing for accuracy before submission
                    outputs:
                      - label: Completed RPIE filing with supporting documentation
                        content: |
                          RPIE form with all required sections, supporting schedules, and
                          file-ready documentation for NYC DOF online submission.

      - label: Financial Analyst
        role_key: financial_analyst
        tasks:
          - label: Cash flow modeling and debt analysis
            summary: Model property cash flows, debt service coverage, and refinancing scenarios
            systems:
              - label: DCF modeling and sensitivity analysis
                summary: Build discounted cash flow models for hold period analysis and refinancing
                content: |
                  10-year DCF model per property: revenue projections (in-place rent roll with
                  escalations, rollover assumptions, market rent for re-leasing), operating expense
                  projections (historical trends, known increases), capital reserves, TI/LC budget
                  for re-leasing, and terminal value (apply exit cap rate to year 11 NOI).
                  Discount rate: WACC or target IRR. Sensitivity analysis: test +/- 100bps on
                  cap rate, +/- 5% on vacancy, +/- 1% on rent growth. DSCR calculation:
                  NOI / annual debt service (lender minimum typically 1.25x). Debt maturity
                  analysis across portfolio.
                decisions:
                  - label: Flag debt covenant risks and refinancing opportunities
                    outputs:
                      - label: Cash flow model with debt analysis and refinancing recommendations
                        content: |
                          Property-level DCF, DSCR trending, debt maturity schedule, and
                          refinancing scenarios with rate sensitivity.

  # ══════════════════════════════════════════════════════════════
  # LEGAL & REGULATORY COMPLIANCE
  # ══════════════════════════════════════════════════════════════
  - label: Legal & Regulatory Compliance
    roles:
      - label: Compliance Officer
        role_key: compliance_officer
        tasks:
          - label: Regulatory calendar management
            summary: Track all filing deadlines, inspection cycles, and compliance requirements across jurisdictions
            systems:
              - label: Multi-jurisdiction compliance calendar
                summary: Maintain master calendar of regulatory deadlines for NYC, CT, and AZ
                content: |
                  NYC deadlines (928 Broadway, 66 W 77th St):
                  - LL84 benchmarking: May 1 annually
                  - LL97 GHG reporting: May 1 annually (starting 2025)
                  - RPIE filing: June 1 annually
                  - LL152 gas piping: 4-year cycle by Community District
                  - LL87 energy audit: 10-year cycle
                  - FISP facade inspection: 5-year cycle
                  - HPD annual registrations (residential)
                  - RGB rent increase notice: 90-150 days before lease expiry
                  CT deadlines (280 Trumbull, 628 Hebron):
                  - Fire safety inspection: annual
                  - Elevator inspection: annual
                  - Property tax appeal: per local deadline
                  AZ deadlines (7975 Hayden, 8655 Via de Ventura):
                  - Fire inspection: annual
                  - Maricopa County tax appeal: 60 days from notice of value
                  Cross-cutting:
                  - Insurance renewals: per policy anniversary
                  - ADA compliance: ongoing (triggered by alterations)
                  - OSHA 300 log: February 1 posting annually
                decisions:
                  - label: Prioritize upcoming deadlines and assign responsible parties
                    outputs:
                      - label: Monthly compliance report with upcoming deadlines
                        content: |
                          Rolling 90-day view of regulatory deadlines, assigned owner, status,
                          and any items at risk of missing deadline.

          - label: DOB violation management
            summary: Track, resolve, and close NYC DOB violations
            systems:
              - label: DOB NOW portal monitoring and violation resolution
                summary: Monitor violation status, coordinate remediation, and file certifications
                content: |
                  Monitor DOB NOW for new violations, hearing dates, and penalty assessments.
                  Violation resolution process: (1) Identify violation and assess severity,
                  (2) Engage qualified contractor/expediter for remediation, (3) Complete corrective
                  work, (4) Obtain required inspections/sign-offs, (5) File Certificate of
                  Correction with DOB, (6) Verify dismissal. Prioritize by penalty exposure and
                  impact on tenant operations or C of O status. Track open violation inventory.
                decisions:
                  - label: Cure vs contest DOB violations based on cost-benefit analysis
                    outputs:
                      - label: Violation status report with resolution plan
                        content: |
                          Open violations by property, severity, estimated remediation cost,
                          hearing dates, and recommended action (cure or contest).

      - label: Lease Counsel
        role_key: lease_counsel
        tasks:
          - label: Lease document preparation and review
            summary: Draft, review, and negotiate commercial lease agreements
            systems:
              - label: Lease drafting from LOI to execution
                summary: Convert agreed LOI terms into full lease document and negotiate with tenant counsel
                content: |
                  Lease document structure: (1) Basic lease information (parties, premises, term,
                  rent), (2) Use clause and restrictions, (3) Operating expense provisions (CAM
                  methodology, exclusions, caps, audit rights), (4) Maintenance and repair obligations,
                  (5) Insurance requirements ($1M GL, B+ AM Best, landlord as additional insured),
                  (6) Default provisions and remedies, (7) Assignment and subletting (landlord
                  approval, recapture rights, profit sharing), (8) Casualty and condemnation,
                  (9) SNDA (Subordination, Non-Disturbance, Attornment), (10) Estoppel certificate
                  requirements, (11) Holdover provisions, (12) Environmental representations.
                  Government tenant considerations: GSA lease requirements per PBS Leasing Desk Guide,
                  appropriations clauses, sovereign immunity limitations on landlord remedies.
                decisions:
                  - label: Approve final lease terms or escalate unresolved points
                    outputs:
                      - label: Executed lease document with term summary
                        content: |
                          Final executed lease, key term summary for property management and
                          accounting (rent schedule, escalations, CAM structure, key dates).

          - label: Tenant default and dispute management
            summary: Handle lease defaults, cure notices, and tenant disputes
            systems:
              - label: Default notice and cure procedure
                summary: Issue proper default notices per lease terms and applicable law
                content: |
                  Default types: monetary (rent non-payment) and non-monetary (use violation,
                  insurance lapse, unauthorized alteration). Cure notice requirements vary by
                  jurisdiction: NYC has specific notice requirements for commercial and residential,
                  CT per CGS Title 47a, AZ per ARS Title 33 Chapter 10. Monetary default:
                  demand notice specifying amount due and cure period (typically 5-10 business days).
                  Non-monetary default: notice specifying breach and cure period (typically 30 days).
                  If uncured: termination notice and/or legal proceedings. Government tenant
                  considerations: appropriations defense, holdover rights, sovereign immunity.
                decisions:
                  - label: Pursue cure, negotiate resolution, or initiate termination proceedings
                    outputs:
                      - label: Default notice or resolution agreement
                        content: |
                          Formal default notice with cure period, or negotiated resolution terms
                          (payment plan, lease modification, early termination agreement).

      - label: Regulatory Specialist
        role_key: regulatory_specialist
        tasks:
          - label: LL97 compliance strategy
            summary: Develop and implement LL97 compliance plans for NYC properties
            systems:
              - label: Emissions analysis and retrofit planning
                summary: Calculate current emissions, model penalty exposure, and plan compliance pathway
                content: |
                  Step 1: Calculate current building emissions from utility data (electricity, gas,
                  steam, fuel oil) using NYC-provided emissions factors. Step 2: Compare to LL97
                  building limits (by occupancy type and sqft). Step 3: Calculate penalty exposure
                  ($268/metric ton CO2 over cap). Step 4: Model compliance scenarios — efficiency
                  upgrades (LED, HVAC optimization, envelope), electrification (heat pumps),
                  renewable energy procurement (RECs, PPAs), carbon offsets (up to 10%).
                  Step 5: Rank scenarios by cost-effectiveness ($/ton CO2 reduced) and payback.
                  Step 6: Integrate into capital budget. Engage RDP for annual reporting.
                decisions:
                  - label: Select compliance pathway balancing cost, timeline, and risk
                    outputs:
                      - label: LL97 compliance plan with capital budget and timeline
                        content: |
                          Current emissions vs limits, penalty exposure, recommended ECMs ranked
                          by cost-effectiveness, capital budget, implementation timeline, and
                          projected compliance year.

          - label: Multi-jurisdiction regulatory monitoring
            summary: Track regulatory changes across NYC, CT, and AZ that affect the portfolio
            systems:
              - label: Regulatory change monitoring and impact assessment
                summary: Monitor legislative and regulatory changes for portfolio impact
                content: |
                  Monitor: NYC Council legislation (new local laws), NY State legislature (rent
                  regulation changes, building codes), CT General Assembly (landlord-tenant law,
                  building code updates), AZ legislature (commercial landlord-tenant changes),
                  Scottsdale city council (zoning changes). Federal: ADA updates, EPA regulations,
                  OSHA standards, FASB accounting changes. Sources: NYC Council website, CT
                  General Assembly tracker, AZ legislature tracker, industry associations (BOMA,
                  REBNY, NAIOP). Assess impact on operations, capital requirements, and compliance.
                decisions:
                  - label: Flag material regulatory changes and recommend response
                    outputs:
                      - label: Regulatory update bulletin with portfolio impact assessment
                        content: |
                          Summary of regulatory changes, affected properties, compliance requirements,
                          timeline, estimated cost, and recommended action plan.

  # ══════════════════════════════════════════════════════════════
  # RISK MANAGEMENT
  # ══════════════════════════════════════════════════════════════
  - label: Risk Management
    roles:
      - label: Risk Analyst
        role_key: risk_analyst
        tasks:
          - label: Tenant risk scoring and monitoring
            summary: Maintain tenant risk profiles using credit data, behavioral signals, and early warning indicators
            systems:
              - label: Tenant credit monitoring dashboard
                summary: Aggregate D&B, Megalytics, and internal data for real-time tenant risk assessment
                content: |
                  Data sources: D&B Viability Rating (1-9), Failure Score (predicts insolvency 12mo),
                  PAYDEX (payment performance 0-100), Megalytics AI score (200 components, Random Forest),
                  Equifax CRE real-time credit. Internal signals: payment history (on-time, 30/60/90+),
                  maintenance request patterns (excessive requests may signal frustration/departure),
                  after-hours access trends (declining usage suggests reduced operations).
                  External signals: Google Alerts on tenant company names, LinkedIn headcount tracking,
                  industry news and sentiment analysis, foot traffic data via Placer.ai.
                  Government tenant monitoring: appropriations tracking, agency reorganization news,
                  state budget cycle monitoring (CT legislative session).
                decisions:
                  - label: Place tenants on watchlist and trigger enhanced monitoring or intervention
                    outputs:
                      - label: Quarterly tenant risk report with watchlist updates
                        content: |
                          Portfolio tenant risk heat map, individual risk scorecards for watched tenants,
                          early warning signal summary, and recommended interventions (engagement,
                          renewal acceleration, security deposit enforcement, or legal preparation).

              - label: Early warning system monitoring
                summary: Monitor behavioral and public-record signals for tenant distress
                content: |
                  Behavioral signals monitored: (1) Foot traffic — Placer.ai or building access data
                  showing declining visits (>20% drop triggers review), (2) Employee headcount — LinkedIn
                  or visible staffing changes, parking utilization patterns, (3) Utility usage — BMS/
                  utility data showing abnormal changes (>15% decline suggests reduced operations),
                  (4) Payment patterns — any slippage from historical pattern triggers review.
                  Public record signals: (5) UCC filings — new secured creditors indicate cash flow
                  stress (monitor via RASi or similar service), (6) Court filings — lawsuits, judgments,
                  lien filings against tenant, (7) Bankruptcy filings — PACER monitoring for Chapter 7/11.
                  Response protocol: signal detected -> verify signal -> watchlist placement -> enhanced
                  monitoring cadence (monthly to weekly) -> proactive tenant engagement -> retention or
                  exit strategy. Apply COSO ERM response framework: accept, avoid, transfer, mitigate.
                decisions:
                  - label: Classify distress level and activate appropriate response protocol
                    outputs:
                      - label: Early warning alert memo with recommended action
                        content: |
                          Signal detected, verification status, tenant risk context, distress level
                          classification (watch/concern/critical), and recommended immediate action.

          - label: Portfolio concentration risk analysis
            summary: Analyze tenant, industry, and geographic concentration risk across the portfolio
            systems:
              - label: Concentration risk assessment
                summary: Measure and report portfolio concentration by tenant, industry, geography, and lease term
                content: |
                  Concentration dimensions: (1) Single tenant exposure — largest tenant as % of portfolio
                  revenue (flag if >15%), (2) Industry concentration — aggregate exposure by NAICS sector,
                  (3) Geographic concentration — revenue by market (Hartford, Glastonbury, NYC, Scottsdale),
                  (4) Lease expiration clustering — % of portfolio revenue expiring in any 12-month period
                  (flag if >25%), (5) Government tenant concentration — aggregate government exposure.
                  Current portfolio tenant mix by industry:
                  Financial Services: EMPOWER Retirement, Prudential, TBI Mortgage, Capital Wealth, America Banker
                  Legal: Harris Beach Murtha, Ford & Paulekas, Hassett & George
                  Government: GSA/SBA, CT Dept Banking, CT Dept Insurance, Access Health CT, Glastonbury BoE
                  Healthcare: Vitas Health Care, Scottsdale Physicians Group, Omni Wellness
                  Real Estate: Coldwell Banker, Realty One Group, Cushman & Wakefield
                  Education: BASIS Education Group
                  Technology: My Computer Works, VERTEX, DBDS, Goldin Solutions
                  Industrial: Mitsubishi Power Aero, OTR Freight, Custom Storage, Ashton Woods
                  Entertainment: Beatstreet Production
                  Food & Beverage: Obica
                  Professional Services: Whittlesey, Pool Administrators, Interpreters & Translators, Cowdery & Murphy, PAI
                decisions:
                  - label: Recommend diversification strategies for concentrated exposures
                    outputs:
                      - label: Portfolio concentration report with risk mitigation recommendations
                        content: |
                          Concentration metrics by dimension, comparison to industry benchmarks,
                          flagged concentrations, and recommended mitigation strategies.

      - label: Insurance Coordinator
        role_key: insurance_coordinator
        tasks:
          - label: Insurance coverage management
            summary: Manage property insurance programs and tenant COI compliance
            systems:
              - label: Insurance program review and renewal
                summary: Coordinate annual insurance renewals and coverage adequacy analysis
                content: |
                  Property insurance: all-risk coverage for buildings, business interruption/rent loss,
                  general liability, umbrella/excess liability, environmental liability (for older
                  buildings with asbestos/lead risk). NYC-specific: terrorism coverage (TRIA),
                  flood insurance if in flood zone. AZ-specific: evaluate earthquake coverage.
                  Coverage adequacy: replacement cost valuation updated annually, business interruption
                  coverage for 12-month rent loss, liability limits adequate for property size and
                  tenant population. Broker market annually — obtain 3+ quotes for competitive pricing.
                decisions:
                  - label: Select insurance program balancing coverage adequacy and cost
                    outputs:
                      - label: Insurance renewal recommendation with coverage comparison
                        content: |
                          Coverage comparison matrix, premium summary, deductible analysis,
                          coverage gaps identified, and recommended program.

              - label: Tenant COI tracking
                summary: Verify tenant compliance with lease insurance requirements
                content: |
                  Track tenant Certificates of Insurance (COI): verify coverage amounts meet lease
                  minimums ($1M GL per occurrence), carrier rating (B+ AM Best minimum), landlord
                  named as additional insured, policy expiration dates. Send 60-day advance notice
                  for upcoming expirations. Non-compliance protocol: written notice of deficiency,
                  30-day cure period, potential lease default if uncured. Contractor COI: verify
                  GL, workers comp, and auto liability before permitting work on premises.
                decisions:
                  - label: Issue compliance notices for deficient tenant or contractor insurance
                    outputs:
                      - label: COI compliance report with deficiency notices
                        content: |
                          Tenant COI status matrix, expired or non-compliant policies, notices
                          issued, and cure status tracking.

      - label: Environmental Compliance
        role_key: environmental_compliance
        tasks:
          - label: Environmental risk assessment
            summary: Manage environmental compliance including asbestos, lead, and hazmat
            systems:
              - label: Environmental survey and monitoring
                summary: Maintain environmental baseline and manage hazardous materials in older buildings
                content: |
                  Asbestos: buildings built before 1980 likely contain ACM (asbestos-containing
                  materials). 280 Trumbull (1984) — low risk but verify. 928 Broadway (pre-war) —
                  high likelihood of ACM. Maintain asbestos survey and O&M plan per NESHAP.
                  Re-survey required before any renovation/demolition. Lead paint: pre-1978
                  buildings (928 Broadway, 66 W 77th St) — EPA RRP Rule applies to renovation.
                  NYC LL1 applies to residential with children under 6 (66 W 77th St).
                  PCBs: older fluorescent fixtures may contain PCB ballasts — proper disposal
                  required during lighting retrofit. Refrigerant: EPA Section 608 compliance
                  for HVAC refrigerant management — certified technicians only, leak repair
                  requirements, proper recovery. Phase I ESA: obtain before acquisition,
                  update every 10 years for existing properties.
                decisions:
                  - label: Recommend environmental remediation or ongoing management program
                    outputs:
                      - label: Environmental compliance status report
                        content: |
                          Property-by-property environmental status, ACM inventory, lead paint
                          status, refrigerant compliance, and recommended actions.

