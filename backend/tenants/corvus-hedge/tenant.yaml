display_name: "Corvus Hedge"
default_port: 8006
description: "Investment analysis and portfolio intelligence engine. Filing surveillance, macro synthesis, options strategy validation, and risk assessment across a concentrated equity and LEAPS portfolio."
system_use_banner: >-
  Corvus Hedge — Investment Analysis Intelligence Engine.
  This system provides research synthesis and analytical context.
  It does not provide investment advice, recommendations, or guarantees.
  All analysis is reference-only. Past performance does not indicate future results.
  Users are responsible for their own investment decisions.
semantic_prefilter_enabled: true
regulatory_department_name: "Regulatory & Compliance"
reseed_threshold: 40
baseline_prompt: "I am an individual investor managing a concentrated equity and LEAPS options portfolio focused on technology companies, using fundamental analysis, macro overlay, and options strategy frameworks."
seed_prompts:
  - label: "Filing analysis"
    text: "Summarize NVDA's most recent 10-Q filing and flag any material changes from the prior quarter."
  - label: "Macro impact"
    text: "CPI came in hotter than expected. What does this mean for my LEAPS positions and the rate environment?"
  - label: "LEAPS evaluation"
    text: "Evaluate a 12-month LEAPS call on PLTR at the current price level. What's the risk/reward setup?"
  - label: "Portfolio risk check"
    text: "What's my concentration risk across my tech-heavy watchlist and how correlated are these positions?"
  - label: "Sector rotation"
    text: "Which sectors are showing relative strength right now and does that align with the current macro cycle?"
  - label: "Rate sensitivity"
    text: "How would a 50bps rate cut affect my portfolio given current positioning in growth equities?"
