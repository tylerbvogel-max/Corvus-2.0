# Corvus Hedge — Investment Analysis Neuron Graph
# Layer 0: Department, Layer 1: Role, Layer 2: Task Category
# Layer 3: System/Procedure, Layer 4: Decision/Analysis, Layer 5: Output/Deliverable

departments:

  # ══════════════════════════════════════════════════════════════
  # PORTFOLIO ANALYSIS
  # ══════════════════════════════════════════════════════════════
  - label: Portfolio Analysis
    roles:
      - label: Portfolio Analyst
        role_key: portfolio_analyst
        tasks:
          - label: Portfolio construction and position sizing
            summary: Determine allocation, position sizing, and rebalancing based on conviction and risk
            systems:
              - label: Position sizing framework
                summary: Size positions based on conviction, volatility, correlation, and portfolio concentration
                content: |
                  Position sizing rules: max single position 10-15% of portfolio. LEAPS positions sized
                  by premium outlay, not notional exposure. Kelly criterion as theoretical max, half-Kelly
                  as practical guide. Correlation adjustment: reduce size if new position is >0.7 correlated
                  with existing holdings. Volatility adjustment: higher vol = smaller position.
                decisions:
                  - label: Determine position size for new or existing holdings
                    outputs:
                      - label: Position sizing recommendation with risk rationale
                        content: |
                          Recommended allocation percentage, number of contracts (for LEAPS), max loss
                          at position level, impact on portfolio concentration and correlation metrics.

          - label: Portfolio review and performance attribution
            summary: Periodic assessment of portfolio positioning, factor tilts, and performance drivers
            systems:
              - label: Monthly portfolio review process
                summary: Systematic review of allocation, performance, and thesis validity
                content: |
                  Monthly review checklist: (1) P&L attribution by position, (2) sector allocation vs
                  benchmark, (3) factor exposure check (growth, momentum, quality, size), (4) concentration
                  metrics (top 5 positions as % of portfolio), (5) correlation matrix update, (6) thesis
                  review — has anything changed fundamentally for each position, (7) upcoming catalysts
                  (earnings, macro events, LEAPS expirations within 6 months).
                decisions:
                  - label: Identify positions to add, trim, or exit based on review
                    outputs:
                      - label: Portfolio review summary with action items
                        content: |
                          Performance attribution, concentration analysis, thesis status per position,
                          recommended actions (add/trim/exit/hold), and upcoming catalyst calendar.

  # ══════════════════════════════════════════════════════════════
  # MACROECONOMIC RESEARCH
  # ══════════════════════════════════════════════════════════════
  - label: Macroeconomic Research
    roles:
      - label: Macro Strategist
        role_key: macro_strategist
        tasks:
          - label: Economic indicator analysis
            summary: Interpret macro data releases and assess implications for portfolio positioning
            systems:
              - label: Key indicator monitoring
                summary: Track and interpret rates, inflation, employment, growth, housing, and credit indicators
                content: |
                  Priority indicators and release schedule:
                  RATES: Fed Funds Rate (FOMC 8x/year), 2Y/10Y/30Y Treasury yields (daily), yield curve slope
                  INFLATION: CPI (monthly, ~10th), PCE (monthly, ~last week), breakeven inflation (daily)
                  EMPLOYMENT: Nonfarm Payrolls (first Friday), weekly initial claims, unemployment rate
                  GROWTH: GDP (quarterly advance/preliminary/final), ISM PMI (first business day), retail sales
                  HOUSING: Housing starts, existing home sales, Case-Shiller, mortgage rates
                  CREDIT: IG/HY credit spreads, bank lending standards (quarterly SLOOS), consumer credit
                decisions:
                  - label: Assess economic cycle phase and rate trajectory
                    outputs:
                      - label: Macro environment assessment with portfolio implications
                        content: |
                          Current cycle phase assessment, rate trajectory view, key indicator trends,
                          implications for sector rotation and LEAPS positioning.

          - label: FOMC and Fed policy analysis
            summary: Interpret Fed communications, dot plots, and policy implications
            systems:
              - label: FOMC meeting analysis framework
                summary: Assess Fed statements, press conferences, and dot plot projections
                content: |
                  FOMC analysis framework: (1) Statement language changes — hawkish/dovish shifts in key
                  phrases, (2) dot plot median path vs market pricing (CME FedWatch), (3) press conference
                  tone and Q&A signals, (4) SEP (Summary of Economic Projections) changes, (5) dissents
                  and their direction. For LEAPS: rate cuts increase call values via rho and reduce
                  discount rates on growth stocks. Rate hikes do the opposite. The trajectory matters
                  more than the level — markets price expectations, not current rates.
                decisions:
                  - label: Assess rate path and translate to portfolio impact
                    outputs:
                      - label: Fed policy assessment with rate path and equity impact
                        content: |
                          Rate path view, probability-weighted scenarios, sector and position-level
                          impact analysis, recommended positioning adjustments.

  # ══════════════════════════════════════════════════════════════
  # EQUITY RESEARCH
  # ══════════════════════════════════════════════════════════════
  - label: Equity Research
    roles:
      - label: Equity Researcher
        role_key: equity_researcher
        tasks:
          - label: Company fundamental analysis
            summary: Analyze financial statements, competitive position, and growth trajectory
            systems:
              - label: Fundamental analysis framework
                summary: Evaluate revenue growth, margins, cash flow, balance sheet, and competitive moat
                content: |
                  Fundamental analysis checklist: (1) Revenue growth — rate, consistency, sources (organic
                  vs acquisition), TAM penetration, (2) Gross margin — trend, vs peers, structural drivers,
                  (3) Operating margin — scale leverage, SBC impact, R&D intensity, (4) Free cash flow —
                  FCF margin, FCF conversion from net income, capex intensity, (5) Balance sheet — net
                  cash/debt, debt maturity profile, share count trend, (6) Competitive position — moat
                  source (network effects, switching costs, scale, IP), competitive dynamics.
                decisions:
                  - label: Assess fundamental quality and growth trajectory
                    outputs:
                      - label: Company fundamental analysis report
                        content: |
                          Financial metrics summary, growth drivers, margin trajectory, competitive
                          assessment, key risks, and fundamental quality rating.

          - label: Earnings analysis
            summary: Analyze quarterly earnings results vs expectations and guidance trajectory
            systems:
              - label: Earnings review process
                summary: Compare results to consensus, analyze guidance, and assess beat/miss quality
                content: |
                  Earnings analysis: (1) Revenue vs consensus — beat/miss magnitude and quality (organic
                  vs one-time), (2) EPS vs consensus — operating leverage visible, (3) Guidance — raised/
                  lowered/maintained and by how much vs buy-side expectations, (4) Segment detail — which
                  segments driving growth/deceleration, (5) Margins — gross/operating/net trends and
                  management commentary on trajectory, (6) Cash flow — operating CF and FCF vs net income
                  quality check, (7) Management tone — confidence level, specificity of commentary.
                decisions:
                  - label: Assess earnings quality and revise thesis if needed
                    outputs:
                      - label: Earnings analysis with thesis impact assessment
                        content: |
                          Beat/miss summary, guidance assessment, key segment trends, margin analysis,
                          thesis confirmation or revision recommendation.

      - label: Sector Analyst
        role_key: sector_analyst
        tasks:
          - label: Sector rotation and relative strength analysis
            summary: Track sector momentum, relative performance, and cycle alignment
            systems:
              - label: Sector strength ranking
                summary: Rank sectors by relative performance, momentum, and cycle positioning
                content: |
                  Sector analysis framework: rank 11 GICS sectors by (1) 3-month relative performance
                  vs S&P 500, (2) earnings revision breadth (% of companies with upward revisions),
                  (3) fund flow data (ETF inflows/outflows), (4) cycle alignment — does this sector
                  typically outperform in the current macro phase. Tech/growth sectors: strongest in
                  early-to-mid expansion with falling/stable rates. Energy/materials: strongest in
                  mid-to-late expansion with rising commodity prices. Defensives: strongest in late
                  expansion and recession.
                decisions:
                  - label: Identify sectors to overweight or underweight
                    outputs:
                      - label: Sector rotation recommendation
                        content: |
                          Sector rankings, momentum signals, cycle positioning assessment, and
                          recommended sector tilts relative to current portfolio.

  # ══════════════════════════════════════════════════════════════
  # OPTIONS & DERIVATIVES
  # ══════════════════════════════════════════════════════════════
  - label: Options & Derivatives
    roles:
      - label: Options Strategist
        role_key: options_strategist
        tasks:
          - label: LEAPS evaluation and management
            summary: Evaluate, enter, manage, and roll LEAPS positions
            systems:
              - label: LEAPS entry evaluation
                summary: Assess LEAPS setup quality based on IV, delta, time value, and macro alignment
                content: |
                  LEAPS entry checklist: (1) Fundamental thesis — is the underlying stock worth owning for
                  12-24 months, (2) IV percentile — prefer entry when IV rank < 30 (buying cheap vol),
                  (3) Strike selection — ATM for maximum leverage, 10-20% ITM for higher delta and lower
                  time value decay, (4) Expiration — minimum 12 months, prefer 18-24 for time buffer,
                  (5) Break-even — stock price at expiration that recovers premium, (6) Delta — target
                  0.70+ for stock-replacement strategy, (7) Cost — premium as % of stock price (typically
                  15-30% for ATM LEAPS), (8) Liquidity — bid-ask spread < 5% of mid price.
                decisions:
                  - label: Enter, pass, or waitlist the LEAPS opportunity
                    outputs:
                      - label: LEAPS trade evaluation with entry/pass recommendation
                        content: |
                          Strike, expiration, premium, delta, IV rank, break-even, max loss, and
                          risk/reward assessment with clear recommendation.

              - label: LEAPS roll and exit management
                summary: Decide when to roll, close, or let LEAPS positions expire
                content: |
                  Roll/exit decision framework: evaluate at 6-month mark and at 90-day mark.
                  ROLL if: thesis intact, stock near or above break-even, time value decaying faster
                  than expected. Roll to next annual expiration, same or adjusted strike.
                  CLOSE if: thesis broken (fundamental deterioration), position at max acceptable loss,
                  better opportunities available for the capital.
                  LET RUN if: deep ITM with >6 months remaining, minimal time value remaining (already
                  behaving like stock), thesis strongly intact with upcoming catalyst.
                  NEVER: let a profitable LEAPS expire worthless by forgetting to manage it.
                decisions:
                  - label: Roll, close, or hold the existing LEAPS position
                    outputs:
                      - label: LEAPS management recommendation
                        content: |
                          Current position status, P&L, time value remaining, thesis update, and
                          specific recommendation (roll with new strike/expiry, close and reallocate,
                          or hold with next review date).

      - label: Quantitative Analyst
        role_key: quant_analyst
        tasks:
          - label: Volatility analysis
            summary: Analyze implied vs historical volatility, term structure, and skew
            systems:
              - label: Volatility surface analysis
                summary: Assess IV levels, term structure, and skew for options pricing context
                content: |
                  Volatility analysis: (1) IV rank — current IV vs 52-week range (0-100 percentile),
                  (2) IV vs HV — implied vs realized volatility ratio (>1.2 = options expensive,
                  <0.8 = options cheap), (3) Term structure — normal (upward sloping) vs inverted
                  (near-term fear), (4) Skew — put vs call IV at same delta (steep skew = fear of
                  downside), (5) VIX level and trend — below 15 = complacency, above 25 = fear,
                  above 35 = panic. For LEAPS buyers: low IV = cheap entry. High IV = expensive but
                  may indicate opportunity if you believe vol will stay elevated.
                decisions:
                  - label: Assess whether current volatility environment favors LEAPS entry
                    outputs:
                      - label: Volatility assessment for LEAPS timing
                        content: |
                          IV rank, IV/HV ratio, term structure shape, VIX context, and whether
                          current vol levels favor entry, patience, or alternative strategies.

  # ══════════════════════════════════════════════════════════════
  # RISK MANAGEMENT
  # ══════════════════════════════════════════════════════════════
  - label: Risk Management
    roles:
      - label: Risk Manager
        role_key: risk_manager
        tasks:
          - label: Portfolio risk assessment
            summary: Evaluate concentration, correlation, factor exposure, and tail risk
            systems:
              - label: Risk factor decomposition
                summary: Decompose portfolio risk into concentration, correlation, factor, and scenario dimensions
                content: |
                  Risk dimensions: (1) Concentration — top 5 positions as % of portfolio, HHI index,
                  single-name max, (2) Sector concentration — tech sector as % of total (watch >60%),
                  (3) Correlation — average pairwise correlation of holdings, correlation in stress
                  scenarios (goes to ~1.0 in crisis), (4) Factor exposure — growth factor tilt, momentum
                  exposure, quality score, size tilt, (5) Rate sensitivity — portfolio duration equivalent,
                  how much a 100bps rate move affects holdings, (6) Liquidity — average daily volume of
                  underlying stocks, LEAPS bid-ask spreads, (7) Greeks exposure — total portfolio delta,
                  total vega, aggregate theta decay per day.
                decisions:
                  - label: Identify and prioritize risk mitigation actions
                    outputs:
                      - label: Portfolio risk report with mitigation recommendations
                        content: |
                          Risk metrics across all dimensions, flagged concentrations, stress test
                          results, and specific recommendations for risk reduction.

