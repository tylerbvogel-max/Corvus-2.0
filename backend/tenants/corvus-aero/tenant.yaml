display_name: "Corvus Aero"
default_port: 8002
description: "Biomimetic neuron graph for aerospace defense prompt preparation. Two-stage Haiku pipeline with 5-signal scoring."
system_use_banner: >-
  This is a U.S. Government-aligned information system.
  By accessing and using this system, you acknowledge that usage may be monitored,
  recorded, and subject to audit. Unauthorized use is prohibited and may result in
  disciplinary action and/or civil and criminal penalties.
  This system processes controlled and operationally sensitive information.
semantic_prefilter_enabled: true
regulatory_department_name: "Regulatory"
reseed_threshold: 150
baseline_prompt: "I am an employee at an aerospace manufacturing and prototype design company."
seed_prompts:
  - label: "FAR compliance check"
    text: "What FAR clauses apply to a fixed-price development contract with a government customer?"
  - label: "AS9100 audit prep"
    text: "How should I prepare for an AS9100D Stage 2 surveillance audit?"
  - label: "ITAR export control"
    text: "We're shipping technical data to a UK subcontractor. What ITAR requirements apply?"
  - label: "Root cause analysis"
    text: "A machined part failed dimensional inspection. Walk me through the root cause analysis process."
  - label: "Cost proposal review"
    text: "What does DCAA look for when auditing an incurred cost submission?"
