display_name: "Corvus Apex"
default_port: 8007
description: "Personal workstation intelligence engine for data engineering, aerospace process automation, ERP systems, and manufacturing planning. Combines Corvus Aero domain knowledge with Databricks, SAP ByDesign/S4HANA, and Synchrono SyncManufacturing expertise."
system_use_banner: >-
  Corvus Apex — Personal Workstation Intelligence.
  This system integrates data engineering, ERP, and aerospace manufacturing
  knowledge for decision support and process automation.
  Screen watcher enabled for contextual awareness across all work applications.
semantic_prefilter_enabled: true
regulatory_department_name: "Regulatory"
reseed_threshold: 150
baseline_prompt: "I am a data engineer and aerospace business systems specialist working with Databricks (full platform — ETL, analytics, Unity Catalog, orchestration), SAP Business ByDesign (current ERP), SAP S/4HANA (reference knowledge), and Synchrono SyncManufacturing (APS). My work spans data pipeline development, ERP process automation, production planning, and aerospace compliance."
seed_prompts:
  - label: "Databricks pipeline"
    text: "How should I structure a medallion architecture pipeline for ingesting SAP ByDesign production order data into Delta Lake?"
  - label: "SAP ByDesign"
    text: "What's the best approach to automate purchase order creation in ByDesign using the SOAP API?"
  - label: "S/4HANA comparison"
    text: "How does S/4HANA handle production planning differently from ByDesign, and what would a migration path look like?"
  - label: "Synchrono scheduling"
    text: "How do I configure Synchrono demand-driven scheduling to align with our ByDesign production orders?"
  - label: "FAR compliance"
    text: "What FAR clauses apply to our incurred cost submission and how should I validate the data pipeline feeding it?"
  - label: "Unity Catalog governance"
    text: "How should I set up Unity Catalog data governance for our aerospace manufacturing data lakehouse?"
  - label: "Screen context"
    text: "Based on what's currently on my screen, what should I be paying attention to?"
