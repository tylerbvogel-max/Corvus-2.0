# Corvus Poli — Presidential Behavioral Neuron Graph
# Layer 0: Policy Domain, Layer 1: Behavioral Archetype, Layer 2: Situation Type
# Layer 3: Response Pattern, Layer 4: Historical Precedent, Layer 5: Documented Evidence
#
# Subject: President Donald J. Trump
# Data: Public record only (speeches, tweets, executive orders, press conferences, outcomes)
# Purpose: Behavioral pattern modeling for situational prediction

departments:

  # ══════════════════════════════════════════════════════════════════
  # FOREIGN POLICY
  # ══════════════════════════════════════════════════════════════════
  - label: Foreign Policy
    roles:
      - label: Strongman Posture
        role_key: strongman
        tasks:
          - label: Adversary Provocation Response
            systems:
              - label: Rhetorical escalation followed by preference for economic over military action
                decisions:
                  - label: "Iran 2019-2020: Drone shootdown through Soleimani strike"
                    content: |
                      June 2019: Iran shoots down US RQ-4A Global Hawk drone over Strait of Hormuz. Trump approves retaliatory strike
                      then cancels 10 minutes before execution, citing disproportionate casualties ("150 people dead for a drone").
                      Opted for cyber attack and additional sanctions instead. September 2019: Iran-linked attack on Saudi Aramco
                      facilities. Trump responded with additional sanctions, not military action. January 2020: After Iranian-backed
                      militia attack killed US contractor and embassy siege, authorized Soleimani strike. This was the exception —
                      direct threat to American lives crossed the threshold for military action. After Iran's retaliatory missile
                      strike on Al-Asad (no US casualties), Trump de-escalated: "Iran appears to be standing down." Pattern: extreme
                      reluctance for military action UNLESS American lives directly threatened, then decisive and disproportionate.
                    outputs:
                      - label: "Tweet Jun 21, 2019: Cancellation reasoning"
                        content: |
                          "We were cocked & loaded to retaliate last night on 3 different sights when I asked, how many will die.
                          150 people, sir, was the answer from a General. 10 minutes before the strike I stopped it, not
                          proportionate to shooting down an unmanned drone."
                      - label: "Statement Jan 8, 2020: De-escalation after Iran retaliation"
                        content: |
                          "Iran appears to be standing down, which is a good thing for all parties concerned and a very good thing
                          for the world." Announced new sanctions rather than military escalation. Market relief rally followed.
                          Oil prices dropped ~4% after the statement. Key indicator: when he says "standing down" — situation
                          is de-escalating.

                  - label: "Iran 2025-2026: Nuclear talks collapse and current escalation"
                    content: |
                      Second term Iran approach: returned to maximum pressure campaign immediately upon taking office.
                      Reinstated all sanctions lifted under Biden. Demanded new deal with expanded scope (nuclear + missiles
                      + regional proxies). Pattern consistent with first term: economic pressure first, military threats as
                      rhetoric, back-channel negotiations while maintaining public hardline. Key difference from first term:
                      more experienced team, less improvisational. Watch for: Truth Social posts about Iran as leading
                      indicator of policy shifts. Sanctions escalation before any military posturing.
                    outputs:
                      - label: Current posture indicators
                        content: |
                          Monitor for: (1) Truth Social frequency on Iran topics — increasing frequency signals escalation,
                          (2) Carrier group movements to Gulf region, (3) Sanctions packages targeting new sectors,
                          (4) Back-channel signals through Gulf state intermediaries (UAE, Oman historically used).
                          Market implications: Oil futures most sensitive, defense stocks secondary. Sanctions announcements
                          typically move oil +2-5% intraday.

              - label: Threat rhetoric calibrated to audience — domestic consumption vs actual signaling
                decisions:
                  - label: "North Korea 2017-2018: Fire and Fury to Singapore Summit"
                    content: |
                      July-August 2017: North Korea ICBM tests. Trump responds "fire and fury like the world has never seen"
                      (Aug 8, 2017). Followed by "Rocket Man" rhetoric at UN General Assembly (Sep 19, 2017). Kim responded
                      with "dotard." Escalation peaked with tweets about "my nuclear button is bigger." Appeared headed toward
                      conflict. Then pivot: March 2018, accepted invitation to meet. June 12, 2018 Singapore summit — historic
                      handshake, signed joint statement on denuclearization. No concrete denuclearization occurred. Hanoi summit
                      (Feb 2019) collapsed over sanctions relief disagreement. Pattern: maximum rhetorical escalation → personal
                      diplomacy → declare victory regardless of substance. The "fire and fury" rhetoric was domestic signaling
                      and pressure creation, not actual military intent. Key insight: the more extreme the rhetoric, the more
                      likely a diplomatic pivot is coming.
                    outputs:
                      - label: "UN General Assembly Sep 19, 2017: Rocket Man speech"
                        content: |
                          "The United States has great strength and patience, but if it is forced to defend itself or its allies,
                          we will have no choice but to totally destroy North Korea. Rocket Man is on a suicide mission for
                          himself and for his regime." Market impact: defense stocks +1.5%, VIX spike. But actual military
                          preparations were minimal — rhetoric outpaced reality.
                      - label: "Singapore Summit Jun 12, 2018: Victory declaration"
                        content: |
                          "There is no longer a Nuclear Threat from North Korea." (Tweet, Jun 13, 2018). Actual outcome:
                          vague joint statement, no verification mechanism, no timeline. North Korea continued missile development.
                          But framed as historic diplomatic achievement. Pattern: declare victory early, move on.
                      - label: "Hanoi Summit Feb 2019: Walkaway"
                        content: |
                          Walked away from deal when Kim demanded full sanctions relief for partial denuclearization.
                          "Sometimes you have to walk." Framed as strength, not failure. Market neutral — priced as
                          continuation of status quo. Pattern: willing to walk from a bad deal and frame the walk as strength.

          - label: Diplomatic Surprise and Unpredictability
            systems:
              - label: Deliberate unpredictability as strategic doctrine
                decisions:
                  - label: Unpredictability doctrine across domains
                    content: |
                      "We must as a nation be more unpredictable" (Apr 2016 foreign policy speech). Implemented
                      through: surprise Syria strikes (no pre-notification to Russia beyond deconfliction), abrupt
                      withdrawal announcements, sudden pivot from escalation to diplomacy (North Korea), tariff
                      announcements via tweet. Pattern: unpredictability is not impulsiveness — it is a deliberate
                      strategy to prevent adversaries from gaming responses. However, it also prevents ALLIES
                      from planning, which creates alliance friction.
                    outputs:
                      - label: Unpredictability and market volatility
                        content: |
                          VIX correlation with presidential unpredictability: VIX averaged 16.5 during Obama's
                          last 2 years, 18.2 during Trump first term. The premium is real but modest. Individual
                          events cause spikes (tariff tweets, military threats) but broad market adaptation occurs.
                          Trading: options premiums should carry a presidential unpredictability premium of ~1-2
                          VIX points. Sell volatility on overreactions to rhetoric-only events.
                      - label: Ally management through unpredictability
                        content: |
                          European allies cannot plan defense posture when Article 5 commitment is ambiguous.
                          Asian allies cannot plan trade when tariff threats are rolling. This IS the strategy:
                          keep everyone slightly off-balance to maximize US leverage in every bilateral interaction.
                          Prediction: unpredictability increases in second term (fewer moderating advisors).

                  - label: Surprise diplomatic pivots catalog
                    content: |
                      North Korea: fire and fury → Singapore summit (180-degree pivot in 3 months).
                      China: tariff war → Phase One deal signing ceremony (adversary to partner framing).
                      Russia: criticism avoidance → Helsinki meeting (despite domestic political cost).
                      Taliban: decades of no negotiation → Doha agreement (bypassed Afghan government).
                      Pattern: the surprise is the PIVOT from hostility to engagement. Markets should be
                      prepared for diplomatic openings during maximum tension periods.
                    outputs:
                      - label: Pivot probability indicators
                        content: |
                          When rhetoric against a specific adversary reaches maximum intensity AND a personal
                          relationship channel exists (leader-to-leader) → probability of surprise diplomatic
                          pivot within 90 days is 40-60%. The escalation IS the setup for the pivot.
                          Market play: when tensions are at maximum → buy call options on normalized-relationship
                          beneficiaries (trade-dependent stocks, regional markets).

                  - label: Meeting refusal and walkaway demonstrations
                    content: |
                      Pelosi meeting walkout (May 2019): left infrastructure meeting after Democrats mentioned
                      investigation. Hanoi summit walkaway (Feb 2019): refused Kim's deal terms. Government
                      shutdown non-negotiation (Dec 2018-Jan 2019): 35 days without concession. Pattern: willing
                      to absorb political/economic cost of walkaway to demonstrate resolve. The walkaway is
                      calculated — it establishes that threats are credible for future negotiations.
                    outputs:
                      - label: Walkaway credibility and negotiation
                        content: |
                          When he says he will walk away → believe it. Historical walkaway rate on stated threats
                          is ~40-50% (higher than any recent predecessor). This credibility makes future threats
                          more effective and makes counterparties more likely to concede. Market: walkaway events
                          cause short-term disruption (-1-3%) but establish negotiation credibility that benefits
                          medium-term outcomes.

          - label: Alliance Pressure and Burden Sharing
            systems:
              - label: Public pressure on allies to increase defense spending combined with withdrawal threats
                decisions:
                  - label: "NATO 2017-2019: Spending demands and withdrawal threats"
                    content: |
                      Consistent pattern across both terms: publicly berate NATO allies for not meeting 2% GDP defense
                      spending target. Tactics: (1) public statements at summits embarrassing specific leaders,
                      (2) bilateral pressure in private meetings, (3) periodic hints about withdrawal or reduced
                      commitment. July 2018 Brussels summit: demanded 4% GDP target (double the existing 2% target).
                      Threatened to "go it alone." Result: NATO allies did increase spending — defense budgets across
                      Europe rose significantly 2017-2023. Pattern works because allies take the threat seriously
                      enough to act but Trump never actually follows through on withdrawal. The threat IS the tool.
                    outputs:
                      - label: NATO Brussels Jul 2018 summit confrontation
                        content: |
                          Called emergency session. Demanded immediate 2% compliance. Threatened to go it alone.
                          Behind scenes: did not formally invoke withdrawal. Result: allies accelerated spending
                          timelines. Germany committed to 1.5% by 2024 (from 1.2%). Market: European defense stocks
                          Rheinmetall +12% over following quarter on spending acceleration.
                      - label: NATO spending rhetoric pattern
                        content: |
                          Key phrases to monitor: "paying their fair share," "taking advantage of the United States,"
                          "we're protecting them and they're not paying." When these phrases increase in frequency,
                          expect formal demands at next bilateral/multilateral meeting. Market impact: European defense
                          stocks tend to rise on NATO pressure rhetoric (increased allied spending benefits contractors).
                          USD/EUR typically stable — markets have priced in that withdrawal threats are rhetorical.

      - label: Dealmaker Approach
        role_key: dealmaker
        tasks:
          - label: Bilateral Negotiation with Peer Leaders
            systems:
              - label: Personal relationship-first diplomacy with emphasis on leader-to-leader rapport
                decisions:
                  - label: "China Phase One Deal 2019-2020: Escalate then partial deal"
                    content: |
                      Timeline: March 2018 initial tariffs ($50B) → escalation to $250B → counter-tariffs by China →
                      G20 Osaka truce (June 2019) → additional tariff threats → Phase One deal signed Jan 15, 2020.
                      Deal required China to purchase $200B additional US goods over two years. China never met purchasing
                      targets. Deal framed as "the biggest deal anybody has ever seen with China." Actual impact: tariffs
                      remained on ~$370B of Chinese goods. Pattern: escalate via tariffs → create urgency → negotiate bilateral →
                      accept partial deal → declare total victory. The declared victory rarely matches objective analysis.
                      Market impact: Every tariff announcement and trade talk update moved markets. Soybean futures, tech stocks,
                      and industrial commodities were most sensitive.
                    outputs:
                      - label: "Tweet Dec 13, 2019: Deal announcement"
                        content: |
                          "We have agreed to a very large Phase One Deal with China. They have agreed to many structural changes
                          and massive purchases." S&P 500 +0.8% on announcement. Actual structural changes were minimal.
                          Market learned to discount deal rhetoric over time.
                      - label: Trade war market impact pattern
                        content: |
                          Tariff escalation announcement → S&P -1-3%, soybean futures -3-5%, CNY weakens.
                          Trade talk "progress" announcement → S&P +0.5-1.5%, soybeans recover, CNY strengthens.
                          Deal announcement → S&P +0.5-1%, then fade as details emerge.
                          Pattern: front-run the rhetoric cycle, not the substance.

                  - label: "USMCA 2018-2020: NAFTA renegotiation and rebranding"
                    content: |
                      Threatened NAFTA withdrawal to force renegotiation. Mexico and Canada agreed to updated terms
                      (USMCA). Changes were meaningful but incremental: digital trade provisions, dairy market access,
                      auto rules of origin updates, sunset clause. Framed as "replacing the worst trade deal ever made"
                      with "the best trade deal." Independent analyses showed modest net benefit. Pattern: threaten to
                      destroy existing framework → negotiate incremental improvements → rebrand as entirely new achievement.
                      Key insight for prediction: when he calls something "the worst deal ever," he's positioning for
                      a renegotiation he'll declare as "the best deal ever."
                    outputs:
                      - label: NAFTA withdrawal threat as leverage tool
                        content: |
                          Formally notified Congress of intent to withdraw from NAFTA (to create legal deadline
                          for renegotiation). Pattern: the threat of destruction of existing framework is the
                          primary negotiation tool. Did NOT actually withdraw — the notification created urgency.
                          Applied similarly to: NATO (withdrawal hints), WHO (actual withdrawal), Paris Accord
                          (actual withdrawal), Iran deal (actual withdrawal). Key: some threats are leverage
                          (NAFTA, NATO) and some are genuine (WHO, Paris, JCPOA). Distinguish by: does withdrawal
                          create negotiation leverage? If yes → leverage. If no (unilateral act) → genuine.
                      - label: USMCA framing language
                        content: |
                          "NAFTA was the worst trade deal ever made. USMCA is the best trade deal ever made."
                          Pattern: extreme negative framing of predecessor → extreme positive framing of replacement.
                          The magnitude of improvement is always overstated. Useful for prediction: track what he's
                          currently calling "the worst" — that's what he intends to renegotiate and rebrand.

          - label: Transactional Foreign Aid and Alliances
            systems:
              - label: Foreign relationships valued primarily by what they deliver to the US — quid pro quo framing
                decisions:
                  - label: "Ukraine Aid 2019: Leverage pattern and first impeachment"
                    content: |
                      July 2019: Withheld $391M in military aid to Ukraine. July 25 phone call with Zelensky — "I would
                      like you to do us a favor though." Sought investigation into Biden family and 2016 election. Aid
                      released September 11 after whistleblower complaint. Pattern: uses US government leverage (aid, trade,
                      military support) as transactional tools for perceived US (or personal) benefit. Does not view alliances
                      as intrinsically valuable — every relationship must deliver tangible return. This pattern extends to:
                      Saudi Arabia (arms deals for investment), Japan (trade for security), South Korea (payment for USFK),
                      and NATO allies (spending for protection).
                    outputs:
                      - label: First impeachment market impact
                        content: |
                          Sep 2019 whistleblower complaint → Dec 2019 House impeachment → Feb 2020 Senate acquittal.
                          Market impact: S&P rose 10% during impeachment period (Nov-Feb). Markets completely
                          discounted impeachment as political theater with known outcome (Republican Senate).
                          Pattern: impeachment/legal proceedings have near-zero market impact when outcome is
                          predictable. Only price risk if conviction/removal becomes genuinely possible.
                      - label: Transactional framing indicators
                        content: |
                          Key phrases: "what are we getting out of this," "they need us more than we need them,"
                          "they should be paying us." When these phrases appear regarding a specific country or alliance,
                          expect formal demands for concessions tied to continued US support. Policy prediction: any
                          foreign relationship will be evaluated through a cost-benefit lens with an emphasis on
                          visible, tangible returns.

      - label: Transactional Realist
        role_key: transactional
        tasks:
          - label: Middle East Brokerage
            systems:
              - label: Bypasses traditional State Department channels for leader-to-leader deals
                decisions:
                  - label: "Abraham Accords 2020: Israel-UAE-Bahrain normalization"
                    content: |
                      August-September 2020: Brokered normalization agreements between Israel and UAE, Bahrain, Sudan,
                      and Morocco. Bypassed traditional peace process framework (no Palestinian state prerequisite).
                      Offered each normalizing country specific incentives: UAE got F-35 consideration, Morocco got
                      Western Sahara recognition, Sudan got terrorism list removal. Pattern: identify what each party
                      wants, construct bilateral trades, bypass multilateral frameworks. This is genuine dealmaking
                      achievement — the accords produced lasting diplomatic changes. But also illustrates transactional
                      approach: every signatory got a specific quid pro quo.
                    outputs:
                      - label: Abraham Accords incentive structure
                        content: |
                          UAE: F-35 sale consideration (later paused by Biden, revived second term).
                          Morocco: Western Sahara sovereignty recognition.
                          Sudan: terrorism list removal + $335M debt relief.
                          Bahrain: security guarantees.
                          Pattern: each signatory received a specific, tangible bilateral incentive. The
                          accords were not ideological — they were a network of bilateral trades assembled
                          simultaneously. Prediction: future diplomatic achievements will follow same structure.
                      - label: Abraham Accords methodology
                        content: |
                          Deal structure: (1) Identify the hold-up in existing framework (Palestinian precondition),
                          (2) Remove it, (3) Offer each party a specific bilateral incentive, (4) Announce simultaneously
                          for maximum impact. Market impact: modest — Middle East normalization was not a major market mover
                          but defense/diplomatic stocks responded positively. Template for future deals: watch for bypassing
                          existing multilateral frameworks in favor of bilateral trades.

      - label: Unilateral Actor
        role_key: disruptor
        tasks:
          - label: International Agreement Withdrawal
            systems:
              - label: Withdrawal from multilateral agreements that constrain US autonomy
                decisions:
                  - label: "JCPOA Withdrawal May 2018: Maximum pressure on Iran"
                    content: |
                      May 8, 2018: Withdrew from Iran nuclear deal despite European allies urging compliance.
                      Iran was in compliance per IAEA. Decision driven by: (1) campaign promise, (2) Israel/Saudi
                      lobbying, (3) Bolton appointment (hardline on Iran), (4) philosophical opposition to Obama-era
                      deal. Reimposed all sanctions plus new ones. Pattern: predecessor agreements have no legitimacy
                      if they constrain US leverage. "I don't do deals that other people have done."
                    outputs:
                      - label: JCPOA withdrawal market impact
                        content: |
                          Oil +3% on withdrawal announcement. Iranian oil exports dropped from 2.5M bpd to <500K bpd
                          under maximum pressure. Brent crude rose from $70 to $86 in following months (multiple factors).
                          Pattern: Iran sanctions = oil bullish, Iran diplomacy = oil bearish.
                      - label: Maximum pressure sanctions specific measures
                        content: |
                          JCPOA withdrawal triggered reimposition of: oil export sanctions (targeting 2.5M bpd),
                          Central Bank of Iran sanctions, SWIFT disconnection, secondary sanctions on trading
                          partners. Result: Iran oil exports dropped to <500K bpd. GDP contracted ~6% in 2019.
                          But: Iran did not return to negotiations, increased enrichment, and regional proxy
                          activity intensified. Pattern: maximum pressure creates economic pain but does not
                          guarantee diplomatic capitulation. Adversary may choose resistance over submission.
                      - label: Predecessor agreement reversal pattern
                        content: |
                          If a major policy was enacted by Obama or Biden and Trump publicly criticized it → withdrawal
                          or reversal probability is >80%. This applied to: JCPOA, Paris Accord, TPP, Cuba opening,
                          DACA, ACA mandate, EPA Clean Power Plan, WHO membership. Use criticism intensity as timing
                          indicator — strongest criticism = earliest reversal.

                  - label: "TPP Withdrawal Jan 2017: Day 1 trade signal"
                    content: |
                      Jan 23, 2017 (Day 3): Withdrew from Trans-Pacific Partnership by executive memorandum.
                      12-nation trade deal negotiated under Obama. Framed as protecting American workers from
                      multilateral trade agreements that benefit other countries. Pattern: multilateral = bad,
                      bilateral = good. Consistent across all trade policy. Prefers one-on-one negotiations where
                      US size advantage is maximized.
                    outputs:
                      - label: TPP withdrawal beneficiary analysis
                        content: |
                          TPP withdrawal left trade architecture vacuum in Asia-Pacific. China filled with RCEP
                          (Regional Comprehensive Economic Partnership, signed Nov 2020). Result: US excluded from
                          largest trade bloc in Asia while China gained central role. Pattern cost: bilateral
                          preference has real strategic costs when competitors fill multilateral vacuums.
                          Prediction: same dynamic applies to any multilateral framework withdrawal. Monitor
                          what fills the vacuum.
                      - label: Multilateral vs bilateral preference
                        content: |
                          Any multilateral trade framework will be replaced by bilateral negotiations. This is structural,
                          not situational. Applied to: TPP → bilateral talks with Japan, NAFTA → USMCA (still trilateral
                          but renegotiated bilaterally with Mexico first). Prediction: second term will not join any new
                          multilateral trade frameworks. All trade negotiations will be bilateral.

                  - label: "WHO Withdrawal 2020: International organization skepticism"
                    content: |
                      Jul 6, 2020: Formally notified WHO of withdrawal, effective Jul 2021. Cited: WHO mishandled
                      COVID-19 response, too deferential to China, waste of US funding ($400M+/year). Biden rejoined
                      Jan 2021. Trump re-withdrew upon second inauguration. Pattern: international organizations are
                      viewed as: (1) inefficient, (2) biased against US interests, (3) too expensive relative to
                      benefit. Applies to: WHO, UN agencies, UNESCO (withdrew 2017), UN Human Rights Council
                      (withdrew 2018), Paris Accord. Second term expanding to: potential UN funding reductions,
                      WHO alternative frameworks.
                    outputs:
                      - label: WHO withdrawal specific triggers and timeline
                        content: |
                          Apr 14, 2020: Announced funding halt to WHO during COVID pandemic. Jul 6, 2020: Formal
                          withdrawal notice (1-year delay required). Jan 20, 2021: Biden halted withdrawal Day 1.
                          Jan 20, 2025: Trump re-withdrew Day 1 of second term. Pattern: withdrawal from same
                          organization twice demonstrates conviction, not impulse. The position is fixed.
                          Budget implication: ~$400-500M/year in US WHO funding redirected.
                      - label: International organization engagement prediction
                        content: |
                          Framework: any international organization where US is top funder but doesn't control outcomes
                          is a withdrawal candidate. Probability increases when: organization publicly criticizes US,
                          organization is perceived as China-influenced, organization requires binding US commitments.
                          Monitor: presidential criticism of specific organizations as leading indicator.

          - label: Afghanistan Withdrawal
            systems:
              - label: Campaign promise fulfillment over strategic advice
                decisions:
                  - label: "Afghanistan Taliban Deal Feb 2020: Negotiating with adversary directly"
                    content: |
                      Feb 29, 2020: Signed agreement with Taliban in Doha. Committed to full US withdrawal by May 2021.
                      Did not include Afghan government in negotiations. Released 5,000 Taliban prisoners. Reduced US
                      forces from 13,000 to 2,500 by Jan 2021. Pattern: (1) campaign promise to end "endless wars,"
                      (2) direct negotiation with adversary (bypassing allied government — consistent with bilateral
                      preference), (3) accepted unfavorable terms to achieve withdrawal timeline, (4) framed as peace
                      achievement. Key insight: the desire to exit exceeded the desire for favorable terms.
                    outputs:
                      - label: Endless wars exit pattern
                        content: |
                          Consistent opposition to sustained military deployments. Applied to: Afghanistan (negotiated
                          withdrawal), Syria (withdrew from northeast), Iraq (reduced forces), Germany (reduced forces
                          as burden-sharing punishment). Pattern: if US forces are deployed somewhere for >5 years with
                          no clear end state, expect withdrawal pressure regardless of strategic consequences.
                      - label: Adversary negotiation pattern
                        content: |
                          Willingness to negotiate directly with adversaries that predecessors wouldn't: Taliban, Kim Jong Un,
                          Putin. The negotiation itself is the achievement — outcome is secondary to the optics of the
                          meeting. Pattern: don't assume that an adversary being "beyond negotiation" means Trump won't
                          engage. He will engage anyone if it creates a visible diplomatic event.

          - label: NATO Relationship Management
            systems:
              - label: Transactional view of alliance combined with genuine questioning of value
                decisions:
                  - label: "NATO Article 5 Ambiguity: Deterrence undermining"
                    content: |
                      May 2017: First NATO summit — notably did not affirm Article 5 commitment (mutual defense).
                      Later affirmed it under pressure but with conditions. Repeated pattern: Article 5 is conditional
                      on spending targets. "If they don't pay, are we supposed to defend them? The answer is no."
                      This is not a negotiating tactic for some observers — it reflects genuine skepticism about
                      collective defense obligations. Pattern: alliance commitments are transactional, not principled.
                    outputs:
                      - label: NATO crisis prediction
                        content: |
                          If a NATO ally faces a security threat: (1) initial response will reference their defense
                          spending, (2) support will be calibrated to the ally's "payment" status (high spenders get
                          faster support), (3) any military support will be framed as discretionary, not obligatory.
                          Market impact: NATO uncertainty creates European defense stock volatility. Baltic/Eastern
                          European security concerns → European defense ETFs upward. NATO reassurance → normalization.
                      - label: European defense spending pressure indicators
                        content: |
                          When Trump is preparing NATO pressure: (1) tweets about allied spending increase 2-3 weeks
                          before summits, (2) bilateral meetings with non-compliant allies get tense readouts,
                          (3) troop repositioning rumors emerge. Result: allies increase budgets. European defense
                          contractors (Rheinmetall, BAE, Leonardo) benefit from spending pressure regardless of
                          NATO uncertainty.

  # ══════════════════════════════════════════════════════════════════
  # ECONOMIC & TRADE POLICY
  # ══════════════════════════════════════════════════════════════════
  - label: Economic & Trade Policy
    roles:
      - label: Protectionist
        role_key: protectionist
        tasks:
          - label: Trade Deficit Response
            systems:
              - label: Tariffs as primary tool regardless of economic consensus against them
                decisions:
                  - label: "China Tariffs 2018-2020: Full escalation timeline"
                    content: |
                      Jan 2018: Tariffs on solar panels and washing machines (Section 201). Mar 2018: Steel (25%) and
                      aluminum (10%) tariffs (Section 232). Apr 2018: $50B in China-specific tariffs (Section 301).
                      Jul 2018: $34B tranche activated. Aug 2018: $16B tranche. Sep 2018: $200B at 10%. May 2019:
                      $200B raised to 25%. Aug 2019: Announced 10% on remaining $300B. Sep 2019: Partial implementation.
                      Total: tariffs on ~$370B of Chinese imports. Pattern: tariffs announced via tweet/statement →
                      market drop → partial walk-back or delay → new escalation. Each round followed the same cycle.
                      Advisor opposition (Cohn, Kudlow, Mnuchin) delayed but never prevented tariff actions.
                    outputs:
                      - label: Tariff announcement market impact data
                        content: |
                          Mar 1, 2018 steel/aluminum announcement: S&P -1.3%. Mar 22, 2018 China tariffs: S&P -2.5%.
                          Jul 6, 2018 tariff activation: S&P -0.5% (partially priced). May 5, 2019 tariff increase tweet:
                          S&P -2.4% Monday open. Aug 1, 2019 new tariff announcement: S&P -3.0% over 3 days.
                          Pattern: tweet announcements on weekends/evenings cause gap-down opens. Tariff rhetoric on
                          weekdays causes intraday volatility. Front-run via: VIX calls before anticipated tariff tweets,
                          short industrials/soybeans, long gold.
                      - label: "Second term tariff acceleration (2025-2026)"
                        content: |
                          Second term tariff approach: faster, broader, less negotiation-first. Day 1 executive orders
                          reimposed China tariffs and expanded to new categories. Universal baseline tariff proposed.
                          Pattern evolution: first term used tariffs as negotiation pressure → second term using tariffs
                          as standing policy. Implication: tariff announcements less likely to be reversed through
                          negotiation. Markets should price tariffs as more permanent.

                  - label: "EU Steel/Aluminum Tariffs 2018: Alliance-as-trade-competitor framing"
                    content: |
                      Applied Section 232 steel (25%) and aluminum (10%) tariffs to EU — a military ally. Framed EU
                      as trade adversary: "The European Union is possibly as bad as China, just smaller." EU retaliated
                      with targeted tariffs on bourbon, Harley-Davidson, and other politically symbolic goods.
                      Pattern: does not distinguish allies from adversaries on trade — all bilateral relationships
                      evaluated through trade balance lens. EU retaliation targeted Republican-donor and swing-state
                      products (politically sophisticated response). Eventually led to partial steel deal under Biden,
                      but framing persists in second term.
                    outputs:
                      - label: Section 232 national security tariff mechanism
                        content: |
                          Section 232 of Trade Expansion Act: allows tariffs on national security grounds.
                          Used for: steel (25%), aluminum (10%) on essentially all trading partners. Controversial
                          because national security justification for allied-country metals is legally strained.
                          WTO ruled against US. US ignored ruling. Pattern: will use any available legal mechanism
                          to impose tariffs. National security justification is infinitely elastic in practice.
                          Second term: Section 232 auto tariff investigation remains unresolved — the mechanism
                          is loaded and ready for presidential trigger.
                      - label: EU trade rhetoric pattern
                        content: |
                          "The European Union was formed to take advantage of the United States." This framing has been
                          consistent since 2018 and intensified in second term. Prediction: any EU trade surplus data
                          will trigger tariff threats. Auto tariffs (Section 232) remain on the table. Monitor for:
                          EU trade surplus reports, auto import data, German manufacturing exports.

          - label: Currency and Federal Reserve Pressure
            systems:
              - label: Public pressure on Fed for lower rates combined with dollar weakness preference
                decisions:
                  - label: "Fed Pressure 2018-2019: Public attacks on Jerome Powell"
                    content: |
                      Appointed Jerome Powell as Fed Chair (Feb 2018), then publicly attacked him for raising rates.
                      "My biggest threat is the Fed" (Oct 2018). Tweeted criticism >50 times in 2018-2019. Explored
                      legality of firing Powell (legally dubious). Pattern: views Fed independence as obstacle, not
                      principle. Prefers low rates and weak dollar to boost exports and asset prices. Second term:
                      similar pressure expected, especially as tariff-driven inflation creates tension with rate policy.
                    outputs:
                      - label: Fed independence erosion timeline
                        content: |
                          2018: Public tweets criticizing rate hikes. 2019: Explored legality of firing Powell.
                          2019: Floated Judy Shelton (gold standard advocate) for Fed Board. 2020: Fed cut to zero
                          (COVID, aligned with presidential preference). Second term: Fed Chair term expires 2026.
                          Replacement pick will signal: (1) continuation of independence (unlikely) or (2) dovish
                          pick aligned with low-rate preference (highly likely). Market: 2026 Fed Chair appointment
                          will be the most market-significant personnel decision of the second term.
                      - label: Fed criticism indicators
                        content: |
                          Key phrases: "too fast," "no guts," "our biggest problem," "should be cutting."
                          Market impact: Trump Fed tweets historically moved 2-year Treasury yields 3-5bp intraday.
                          When criticism frequency increases → expect political pressure for rate cuts. If inflation
                          forces Fed to hold/hike → expect escalation of rhetoric toward replacement threats.

      - label: Deregulator
        role_key: deregulator
        tasks:
          - label: Executive Order-Driven Deregulation
            systems:
              - label: Two-for-one deregulation mandate and agency-level rollbacks
                decisions:
                  - label: "First Term Deregulation 2017-2020: Executive order blitz"
                    content: |
                      Executive Order 13771 (Jan 30, 2017): For every new regulation, two must be eliminated.
                      Claimed $220B in regulatory savings over first term. Targeted: EPA rules (Clean Power Plan repeal),
                      financial regulations (Dodd-Frank rollback via Treasury), energy regulations (pipeline approvals,
                      drilling permits), labor regulations (overtime rules, gig worker classification). Pattern: executive
                      order → agency implementation → legal challenges → partial implementation. Speed prioritized over
                      legal durability — many deregulation actions were reversed by courts or Biden administration.
                      Second term approach: learning from first term, executive orders now drafted with legal challenges
                      in mind. Expect faster action and more durable deregulation.
                    outputs:
                      - label: Two-for-one deregulation executive order specifics
                        content: |
                          EO 13771 mandate: for every new regulation, eliminate two existing ones. First term claimed:
                          7.5 deregulatory actions per 1 significant new regulation. $220B claimed savings (disputed by
                          independent analysis). Key rollbacks: Clean Power Plan, WOTUS, methane emissions, auto
                          fuel efficiency standards, Dodd-Frank provisions via Treasury waiver. Pattern: deregulation
                          is most aggressive in first year of each term when political capital is highest. Second term
                          Day 1 deregulation executive orders exceeded first term in scope.
                      - label: Deregulation market beneficiaries
                        content: |
                          Sectors that benefit from deregulation agenda: energy (oil/gas, coal, pipelines), financials
                          (regional banks, trading), industrials (reduced compliance costs), healthcare (drug pricing,
                          FDA approval speed). Pattern: deregulation announcements are sector-specific. Track which
                          agency is mentioned → identify sector beneficiary → position accordingly.

  # ══════════════════════════════════════════════════════════════════
  # MILITARY & DEFENSE
  # ══════════════════════════════════════════════════════════════════
  - label: Military & Defense
    roles:
      - label: Reluctant Hawk
        role_key: reluctant_hawk
        tasks:
          - label: Military Escalation Decision
            systems:
              - label: Strong rhetoric paired with reluctance to commit ground forces — prefers standoff and economic tools
                decisions:
                  - label: "Syria 2017-2018: Limited strikes as signaling"
                    content: |
                      April 6, 2017: 59 Tomahawk missiles at Shayrat airbase after Assad chemical weapons attack.
                      Limited, proportional strike — no regime change intent, no ground forces, no follow-up campaign.
                      April 14, 2018: Second strike (with UK, France) after Douma chemical attack — again limited
                      to chemical weapons facilities. Pattern: willing to use standoff weapons for signaling/punishment
                      but deeply reluctant to commit ground forces or pursue regime change. "I want to bring our troops
                      home" is a consistent theme. October 2019: withdrew from northern Syria (abandoned Kurdish allies)
                      despite bipartisan opposition. Pattern: military action only as discrete punishment, not sustained
                      campaign. De-escalation is the goal, not regime change.
                    outputs:
                      - label: Military action decision framework
                        content: |
                          Decision tree for military action: (1) Is there a clear provocation visible to public? YES required.
                          (2) Are American lives directly at risk? If YES → more likely to act (Soleimani precedent).
                          If NO → prefer standoff/sanctions. (3) Can action be framed as strength without sustained commitment?
                          If YES → limited strike likely. If NO → prefer economic tools. (4) Is there bipartisan support?
                          Less relevant — will act unilaterally if criteria 1-3 are met. Market impact: limited strikes are
                          market-neutral to slightly positive (shows resolve without escalation). Ground force deployment
                          would be major market event but is extremely unlikely based on observed patterns.
                      - label: "Syria withdrawal Oct 2019: Troop-averse pattern"
                        content: |
                          Withdrew US forces from northern Syria despite: Kurdish allies facing Turkish invasion, bipartisan
                          Congressional opposition, Pentagon objections. "It's time for us to come home." Lindsey Graham called
                          it a "disaster." Pattern: personal conviction about avoiding foreign military entanglements overrides
                          advisor input, allied commitments, and political pressure. This is one of the most internally
                          consistent positions — held since 1980s interviews about US military spending abroad.

          - label: Defense Spending and Procurement
            systems:
              - label: Increased budgets combined with personal involvement in procurement decisions
                decisions:
                  - label: "Defense Budget Increases 2017-2020: Rebuild military narrative"
                    content: |
                      FY2018: $700B (up from $619B). FY2019: $716B. FY2020: $738B. Framed as "rebuilding the military
                      after Obama." Pattern: supports large defense budgets as strength signaling, but personally
                      intervenes in procurement to cut costs (F-35 tweets, Air Force One renegotiation, Boeing pricing
                      pressure). The intervention pattern is genuine cost-consciousness combined with desire to
                      demonstrate personal deal-making on visible programs.
                    outputs:
                      - label: F-35 tweet Dec 2016 market impact case study
                        content: |
                          Dec 12, 2016 tweet: "The F-35 program and cost is out of control. Billions of dollars can
                          and will be saved on military (and other) purchases after January 20th." Lockheed Martin
                          stock dropped 4% intraday ($4B market cap loss). Pattern: single tweet moved a major
                          defense contractor. Lockheed CEO Marillyn Hewson met with Trump days later, announced
                          cost reductions. Trump claimed credit for $600M savings (disputed — most were already
                          planned). The tweet-to-meeting-to-savings-claim cycle completed in 2 weeks.
                      - label: Defense procurement intervention pattern
                        content: |
                          When a major defense program cost overrun becomes public → expect presidential tweet/statement
                          criticizing contractor → stock dip 1-3% → behind-scenes negotiation → revised pricing →
                          "saved billions" declaration. Observable: F-35 (Lockheed), Air Force One (Boeing), carrier
                          costs (Huntington Ingalls). Front-run: short defense contractor on cost overrun news, cover
                          after presidential criticism tweet (the bottom is usually the tweet).

      - label: Military Signaling Specialist
        role_key: strongman
        tasks:
          - label: Military Force as Diplomatic Tool
            systems:
              - label: Carrier group deployments and flyovers as signaling without commitment
                decisions:
                  - label: "Carrier Group Deployments as Pressure Tool"
                    content: |
                      Pattern: deploy carrier strike group to region during diplomatic tensions. Not preparation
                      for war — preparation for photographs. USS Carl Vinson toward Korean Peninsula (Apr 2017,
                      though initially sailed wrong direction). USS Abraham Lincoln to Persian Gulf (May 2019)
                      during Iran tensions. Pattern: (1) announce deployment via DOD, (2) presidential statement
                      linking deployment to adversary behavior, (3) media coverage of military assets in theater,
                      (4) de-escalation through negotiation while "ships are in position." The ships rarely fire.
                    outputs:
                      - label: USS Carl Vinson misdirection Apr 2017
                        content: |
                          Apr 9, 2017: White House announced carrier strike group heading toward Korea. Actually sailed
                          toward Australia for exercises. Corrected days later. Pattern: the ANNOUNCEMENT of military
                          movement matters more than the actual movement. Media reported the Korea deployment as
                          escalation signal. Market reacted to the announcement, not the reality. By the time the
                          error was known, the diplomatic signaling had already achieved its effect.
                      - label: Carrier deployment market indicators
                        content: |
                          Carrier deployment announcement to region → defense stocks +0.5-1%, regional equity
                          markets -1-2%, oil +1-3% (Persian Gulf deployments). BUT: if deployment is followed
                          by diplomatic engagement within 2 weeks → full reversion. Pattern: the deployment IS
                          the action, not a precursor to combat. Fade the fear trade after 2 weeks of no escalation.
                      - label: MOAB Afghanistan Apr 2017 signaling
                        content: |
                          Apr 13, 2017: Dropped GBU-43/B MOAB ("Mother of All Bombs") on ISIS tunnel complex in
                          Afghanistan. Largest non-nuclear bomb ever used in combat. Military utility was modest
                          (36 ISIS killed). Signaling utility was enormous — demonstrated willingness to use extreme
                          force. Came 1 week after Syria strikes. Pattern: clustered shows of force create cumulative
                          deterrence effect. Market: defense stocks +1% on MOAB, VIX briefly spiked then normalized.

                  - label: "ISIS Defeat Campaign 2017-2019: Delegated military success"
                    content: |
                      Loosened rules of engagement for military operations against ISIS. Delegated tactical authority
                      to theater commanders (reversing Obama-era White House micromanagement). Result: Mosul liberated
                      Jul 2017, Raqqa Oct 2017, territorial caliphate defeated Mar 2019. Pattern: (1) set strategic
                      objective ("bomb the shit out of them"), (2) delegate execution entirely to military,
                      (3) claim credit for success. This is the military domain where he is MOST hands-off —
                      counterterrorism gets full delegation. Contrast with troop deployment decisions (hands-on,
                      withdrawal-oriented). Key distinction: killing terrorists = delegated; deploying troops = personal.
                    outputs:
                      - label: Raqqa liberation Oct 2017 victory framing
                        content: |
                          Oct 17, 2017: SDF forces captured Raqqa from ISIS. Trump claimed credit for accelerated
                          campaign, attributing success to loosened rules of engagement. Actual timeline acceleration:
                          modest — campaign was already progressing under Obama-era plan. But the framing was effective:
                          "I totally changed the rules of engagement. I totally changed our military." Pattern: takes
                          credit for military successes that were largely continuation of predecessor policy with
                          modest modifications. The claim of radical change is always larger than the actual change.
                      - label: Military delegation framework
                        content: |
                          Counterterrorism operations: fully delegated, minimal presidential interference, strong support.
                          Troop deployments/withdrawals: personal decision, often overrides military advice.
                          Nuclear posture/deterrence: personal interest, unpredictable engagement.
                          Conventional force posturing: used as diplomatic tool, not combat preparation.
                          Market: counterterrorism operations are market-neutral. Troop withdrawal announcements
                          can move defense/regional markets. Nuclear rhetoric moves VIX.

                  - label: "Space Force 2018-2019: Military branding as legacy"
                    content: |
                      Jun 2018: Directed establishment of Space Force as 6th military branch. Signed into law
                      Dec 2019. Actual military reorganization was modest (redesignated Air Force Space Command).
                      But the branding was significant — a new military branch for the first time since 1947.
                      Pattern: attracted to visible, brandable achievements over substantive but invisible reforms.
                      "Space Force" is a brand more than a strategic revolution. Same pattern as: USMCA rebrand of
                      NAFTA, "Operation Warp Speed" brand for vaccine development.
                    outputs:
                      - label: Space Force logo and merchandise as brand indicators
                        content: |
                          Space Force logo revealed (Jan 2020) bore resemblance to Star Trek Starfleet insignia.
                          Official merchandise launched. Pattern: the brand elements (logo, name, merchandise)
                          received more presidential attention than the actual organizational details. When evaluating
                          any new initiative: if the branding is announced before the operational details, the brand
                          IS the product. Operational substance will follow minimally.
                      - label: Branding over substance pattern
                        content: |
                          When evaluating presidential "achievements" for actual impact: separate the brand from the
                          substance. USMCA ≈ NAFTA + modest updates. Space Force ≈ Air Force Space Command + new logo.
                          Operation Warp Speed = accelerated vaccine procurement (genuine achievement with brand overlay).
                          Prediction: any new initiative will have a branded name designed for rallies. The brand name
                          tells you the political value; the actual executive order tells you the policy impact.

          - label: Nuclear Posture and Rhetoric
            systems:
              - label: Unpredictable nuclear rhetoric as deliberate strategic ambiguity
                decisions:
                  - label: "Nuclear Button Tweet Jan 2018: Calculated unpredictability"
                    content: |
                      Jan 2, 2018: "I too have a Nuclear Button, but it is a much bigger & more powerful one than
                      his, and my Button works!" (referring to Kim Jong Un). Alarmed traditional national security
                      establishment. Pattern: nuclear rhetoric serves dual purpose: (1) domestic audience sees
                      strength, (2) adversaries face genuine uncertainty about escalation willingness. This is
                      "madman theory" — whether deliberate or instinctive. The uncertainty itself has deterrent
                      value. Key insight: the rhetoric was escalatory but the actual nuclear posture (doctrine,
                      deployments, readiness levels) did not change. Words ≠ actions on nuclear.
                    outputs:
                      - label: INF Treaty withdrawal as actual nuclear policy change
                        content: |
                          Feb 1, 2019: Formally withdrew from INF Treaty (Intermediate-Range Nuclear Forces, 1987).
                          Cited Russian violations (SSC-8 missile). This was ACTUAL nuclear policy change as opposed
                          to rhetorical nuclear posturing. Done quietly through institutional channels, not tweeted.
                          Pattern: distinguish nuclear RHETORIC (tweets, public statements = performative) from nuclear
                          POLICY (treaty withdrawals, weapons development = institutional, serious). The rhetoric is
                          loud; the policy changes are quiet. Market: INF withdrawal had minimal market impact because
                          it was institutional, not dramatic.
                      - label: Nuclear rhetoric vs posture analysis
                        content: |
                          Nuclear rhetoric is performative. Actual nuclear policy changes (INF Treaty withdrawal,
                          low-yield warhead development, nuclear posture review) happen through institutional
                          channels with minimal presidential tweets. When Trump tweets about nuclear topics →
                          assess as diplomatic signaling, not military preparation. Market: nuclear rhetoric causes
                          VIX spikes of 5-15% that fully revert within 48-72 hours. Do not hold fear positions
                          based on nuclear tweets alone.

          - label: Veterans and Military Personnel
            systems:
              - label: Pro-military-personnel rhetoric with VA reform focus
                decisions:
                  - label: "VA Reform 2017-2018: Genuine policy achievement"
                    content: |
                      VA MISSION Act (Jun 2018): expanded veteran access to private healthcare. VA Accountability Act
                      (Jun 2017): easier to fire underperforming VA employees. Both had bipartisan support. Pattern:
                      veteran issues are one of the few areas of genuine bipartisan cooperation. Pro-veteran rhetoric
                      is consistent and backed by actual legislation. This is a genuine policy priority, not just
                      rhetoric — unusual in the portfolio of presidential priorities.
                    outputs:
                      - label: VA Choice and MISSION Act specifics
                        content: |
                          VA Choice Act (signed by Obama, expanded by Trump): veterans can seek private care if VA
                          wait times exceed threshold. VA MISSION Act (Jun 2018): consolidated and expanded community
                          care programs. Bipartisan 92-5 Senate vote. Pattern: veteran healthcare expansion through
                          private sector is one of very few policy areas with genuine bipartisan achievement.
                          Market: healthcare companies with VA contracts (DaVita, CVS MinuteClinic, community
                          health centers) benefit from continued expansion.
                      - label: Veteran policy as bipartisan signal
                        content: |
                          When bipartisan cooperation is needed on an unrelated issue → watch for veteran policy to be
                          attached as a sweetener. Veteran issues are the bridge topic that both parties will support.
                          Healthcare companies with VA contracts benefit from expansion. Monitor: VA privatization
                          rhetoric (further private sector expansion = healthcare company opportunity).

  # ══════════════════════════════════════════════════════════════════
  # DOMESTIC POLICY
  # ══════════════════════════════════════════════════════════════════
  - label: Domestic Policy
    roles:
      - label: Populist
        role_key: populist
        tasks:
          - label: Base-Energizing Policy Actions
            systems:
              - label: Policy choices calibrated to core voter base enthusiasm over general approval
                decisions:
                  - label: "Immigration Executive Actions: Consistent base priority"
                    content: |
                      Immigration is the most consistent base-energizing policy across both terms: travel ban (EO 13769,
                      Jan 27, 2017 — revised twice for legal challenges), family separation policy (2018), border wall
                      funding battle and government shutdown (Dec 2018 - Jan 2019, 35 days), remain in Mexico policy,
                      second term mass deportation operations. Pattern: immigration action is the go-to when needing
                      to energize base or demonstrate action. Timing correlation: immigration announcements often
                      coincide with periods where other policy areas are stalled or negative news is building.
                    outputs:
                      - label: Government shutdown as immigration leverage Dec 2018
                        content: |
                          Rejected bipartisan continuing resolution because it lacked $5.7B wall funding. "I am
                          proud to shut down the government for border security, Chuck." 35-day shutdown, longest
                          in US history. 800,000 federal workers furloughed or worked without pay. Jan 25, 2019:
                          signed 3-week CR without wall funding. Then declared national emergency Feb 15 to redirect
                          military construction funds. Market impact: S&P -2% during shutdown period, recovered
                          fully within 1 week of reopening. Pattern: shutdown is the wrong tool for funding fights —
                          emergency declaration was the actual mechanism.
                      - label: Immigration action as political tool
                        content: |
                          Monitor for: (1) stalled legislative agenda → expect immigration executive action,
                          (2) approval rating dip → expect border enforcement announcement, (3) primary/election
                          season → expect escalated immigration rhetoric and action. Market impact: immigration
                          actions are generally market-neutral (no direct economic impact on major indices), but
                          construction/infrastructure stocks may move on wall funding announcements.

          - label: Tax and Economic Populism
            systems:
              - label: Tax cuts and economic messaging focused on working-class framing with corporate benefits
                decisions:
                  - label: "Tax Cuts and Jobs Act 2017: Signature legislative achievement"
                    content: |
                      Signed Dec 22, 2017. Corporate rate 35% → 21%. Individual rate cuts (temporary, expire 2025).
                      Pass-through deduction (Section 199A). SALT deduction cap ($10K). Repatriation holiday.
                      Economic impact: corporate profits surged, stock buybacks increased, GDP temporarily boosted.
                      Deficit increased ~$1.9T over 10 years (CBO estimate). Framed as "biggest tax cut in history"
                      (actually not — Reagan's was larger as % of GDP). Pattern: corporate-friendly policy framed in
                      populist language ("tax cuts for working families"). Second term: TCJA extension is legislative
                      priority. Watch for: individual provision expiration debate, potential new corporate cuts.
                    outputs:
                      - label: TCJA passage market reaction detailed
                        content: |
                          S&P 500 during TCJA legislative process: +4% from introduction to House passage (Nov 16),
                          +2% from House to Senate passage (Dec 2), +2% from conference to signing (Dec 22).
                          Total rally: ~8% from Sep-Jan including broader optimism. Key mechanism: corporate rate
                          from 35% to 21% directly increased after-tax earnings by ~14% for domestic companies.
                          Small caps outperformed (higher effective rate reduction). Financial sector outperformed
                          (specific provisions). SALT cap losers: high-tax state housing (NY, CA, NJ, CT).
                      - label: Tax policy market impact
                        content: |
                          TCJA passage: S&P +6% in Dec 2017-Jan 2018 (priced in during legislative process).
                          Sectors: financials, industrials, small caps benefited most from rate cut.
                          Second term extension: market expects TCJA extension — failure to extend would be negative
                          surprise (small caps, high-tax companies most exposed). Monitor: House/Senate vote counts
                          on tax legislation. Presidential rhetoric intensity on tax cuts = urgency indicator.

      - label: Disruptor
        role_key: disruptor
        tasks:
          - label: Institutional Norms Disruption
            systems:
              - label: Deliberate violation of political norms to demonstrate independence and strength
                decisions:
                  - label: "Government Shutdown Dec 2018 - Jan 2019: Wall funding showdown"
                    content: |
                      35-day shutdown (longest in US history) over $5.7B border wall funding. "I am proud to shut down
                      the government for border security." Eventually signed reopening bill without wall funding, then
                      declared national emergency to redirect military construction funds. Pattern: (1) take maximalist
                      position, (2) refuse compromise ("I won't sign"), (3) endure political damage longer than expected,
                      (4) when it becomes untenable, find alternative mechanism (emergency declaration) to claim victory.
                      The shutdown itself was not productive — the emergency declaration was the actual tool. Prediction:
                      future policy impasses → expect creative use of executive authority to bypass legislative deadlock
                      rather than genuine compromise.
                    outputs:
                      - label: I am proud to shut down the government quote analysis
                        content: |
                          Dec 11, 2018 Oval Office meeting with Pelosi and Schumer (televised): "I am proud to shut
                          down the government for border security, Chuck. I will take the mantle. I will be the one
                          to shut it down." Pattern: publicly claimed ownership of the shutdown — unusual political
                          move. Most politicians blame the other side. He WANTED credit with the base. The political
                          calculus: base approval for fighting > general approval for governing. This reveals the
                          priority hierarchy: base enthusiasm > general approval > institutional stability.
                      - label: Shutdown and executive authority pattern
                        content: |
                          Market impact: government shutdowns historically have modest market impact (-0.5-1% over duration,
                          full recovery after resolution). The real signal is what comes after: emergency declarations,
                          executive orders, or creative funding redirections. These can have sector-specific impacts
                          (military construction stocks in the wall case). Monitor for: "I don't need Congress" language
                          as indicator of impending executive action to bypass legislative roadblock.

      - label: Infrastructure Promiser
        role_key: dealmaker
        tasks:
          - label: Infrastructure Spending Attempts
            systems:
              - label: Repeated infrastructure promises that never materialize into legislation
                decisions:
                  - label: "Infrastructure Week (Multiple Failed Attempts 2017-2020)"
                    content: |
                      "Infrastructure Week" became a running joke — announced repeatedly but always overtaken by
                      other news (Comey firing, Charlottesville, impeachment). Never passed infrastructure legislation
                      in first term despite multiple proposals ($1T, then $1.5T, then $2T). Biden passed $1.2T
                      infrastructure bill in 2021. Pattern: infrastructure is a genuine interest (real estate developer
                      background) but never reaches the top of the priority stack. Other priorities (tax cuts, immigration,
                      trade, judicial appointments) always consume the legislative bandwidth first.
                    outputs:
                      - label: Infrastructure announcement discount
                        content: |
                          Presidential infrastructure announcements have <10% probability of becoming legislation based
                          on historical evidence. However, executive order-driven infrastructure (permitting reform,
                          pipeline approvals, federal land access) has high execution probability. Distinguish between:
                          (1) legislative proposals (discount heavily), (2) executive order infrastructure actions
                          (take seriously). Market: infrastructure stocks should react to executive orders, not
                          legislative proposals.

                  - label: "Permitting Reform: Executive action where legislation fails"
                    content: |
                      Where legislative infrastructure failed, executive permitting reform succeeded. Streamlined
                      NEPA review for major projects. Reduced environmental review timelines from years to months
                      for priority projects. Used existing authority rather than new legislation. Pattern: when
                      Congress won't act, find an executive mechanism. Permitting reform is the executive-friendly
                      version of infrastructure spending.
                    outputs:
                      - label: Permitting reform beneficiaries
                        content: |
                          Companies and sectors that benefit: pipeline operators, LNG export terminals, mining companies,
                          toll road operators, utility-scale energy projects (both fossil and, surprisingly, some
                          renewables that benefit from faster permitting). Monitor: NEPA reform executive orders,
                          DOI/BLM land use decisions, Army Corps permitting timelines.

          - label: COVID-19 Response Patterns
            systems:
              - label: Crisis response revealing core behavioral preferences under extreme uncertainty
                decisions:
                  - label: "COVID Initial Response Jan-Mar 2020: Optimism bias and market protection"
                    content: |
                      Jan 22, 2020: "We have it totally under control." Feb 26: "within a couple of days is going to
                      be down to close to zero." Feb 28: "Democrat hoax." Mar 13: Declared national emergency.
                      Mar 16: Acknowledged severity, "15 Days to Slow the Spread." Pattern: (1) minimize threat to
                      protect market/economy (stock market as scorecard), (2) shift blame when minimization fails
                      ("China virus," WHO, Democrat governors), (3) eventually act when crisis becomes undeniable,
                      (4) claim credit for response while deflecting blame for delay.
                    outputs:
                      - label: Crisis minimization to action timeline
                        content: |
                          In novel crises (not playbook situations): expect 2-6 weeks of minimization before serious
                          action. The trigger for action shift is: (1) market decline exceeding -5% threshold, OR
                          (2) visible human impact that dominates media, OR (3) bipartisan pressure including Republican
                          allies. This delay pattern is a prediction vulnerability — markets price in the crisis before
                          presidential action catches up.

                  - label: "Operation Warp Speed May 2020: Genuine crisis achievement"
                    content: |
                      May 15, 2020: Announced Operation Warp Speed — $18B public-private partnership for vaccine
                      development. Bypassed traditional procurement to pre-purchase vaccines before approval.
                      Result: multiple vaccines authorized by Dec 2020, fastest vaccine development in history.
                      Pattern: when presidential attention is focused on a single, visible, measurable goal with
                      a clear "win" metric → execution can be exceptional. The challenge is getting that focus.
                      COVID vaccines were a clear win: brandable ("Warp Speed"), measurable (vaccine approval date),
                      personally creditable. Contrast with: comprehensive healthcare reform (complex, no clear win).
                    outputs:
                      - label: Focused execution pattern
                        content: |
                          When all these conditions are met, execution quality is HIGH: (1) single measurable goal,
                          (2) brandable initiative name, (3) personal credit opportunity, (4) bipartisan support or
                          at least no partisan opposition, (5) executive authority sufficient (no Congress needed).
                          Apply this framework to identify which second-term initiatives will actually deliver.
                          Drug pricing EOs, energy production records, and border metrics meet these criteria.
                          Healthcare reform, infrastructure legislation, and debt reduction do not.

                  - label: "COVID Economy Response: Stimulus and Fed pressure"
                    content: |
                      CARES Act (Mar 27, 2020): $2.2T stimulus, $1,200 checks, PPP loans. Pushed for larger checks
                      than Congress initially proposed. Called for even more stimulus in fall 2020. Pattern: in
                      economic crisis, becomes aggressively Keynesian regardless of deficit concerns. "Spend whatever
                      it takes" approach when economy is visibly struggling. Direct payments are preferred tool
                      (visible, attributable). Fed pressure intensified: demanded rate cuts to zero, QE expansion.
                    outputs:
                      - label: Crisis economic response prediction
                        content: |
                          In economic downturn: (1) demand Fed rate cuts (first response, always), (2) push for
                          direct stimulus payments (branded with presidential name if possible — "Trump checks"),
                          (3) deficit concerns disappear entirely during crisis, (4) blame previous administration
                          or external factors (China, Fed) for the downturn itself. Market: crisis stimulus is
                          always larger than initial market expectation because presidential political incentive
                          is to go big. Long equity on stimulus announcement.

          - label: Election and Democratic Process
            systems:
              - label: Election integrity claims as consistent political strategy
                decisions:
                  - label: "Election Challenges 2020-2021: Refusing to concede"
                    content: |
                      Nov 3, 2020: Election Day. Nov 7: Networks call race for Biden. Trump refuses to concede.
                      Files 60+ lawsuits challenging results — all dismissed or withdrawn. Dec 14: Electoral College
                      votes. Jan 6, 2021: Capitol breach. Jan 20: Left office without attending inauguration.
                      Pattern: (1) never admit defeat ("I won this election, by a lot"), (2) challenge through
                      every available mechanism (legal, political, institutional), (3) create alternative narrative
                      that persists regardless of evidence ("the steal"). This is the revenge/reciprocity pattern
                      applied to the ultimate personal slight.
                    outputs:
                      - label: Election-related market impact
                        content: |
                          2020 transition uncertainty: markets largely ignored — S&P rallied through Nov-Jan on
                          vaccine optimism. Jan 6 Capitol breach: S&P -0.3% (minimal). Pattern: markets price
                          institutional stability — even extreme political events have minimal lasting market impact
                          if institutional transfer of power occurs. Market risk would only be significant if
                          institutional breakdown prevented governance continuity.
                      - label: Stop the steal narrative as political tool
                        content: |
                          The 2020 election narrative became a permanent political loyalty test. Acceptance of the
                          narrative = loyalty signal for endorsements, appointments, political support. Rejection =
                          political exile (Liz Cheney, Adam Kinzinger). Pattern for second term: the narrative is
                          not about 2020 — it's about establishing that presidential claims override institutional
                          findings. Apply to any future dispute where presidential assertion conflicts with
                          institutional assessment.

  # ══════════════════════════════════════════════════════════════════
  # IMMIGRATION
  # ══════════════════════════════════════════════════════════════════
  - label: Immigration
    roles:
      - label: Hardliner
        role_key: protectionist
        tasks:
          - label: Border Enforcement Escalation
            systems:
              - label: Executive action-heavy approach using emergency powers and agency directives
                decisions:
                  - label: "Travel Ban 2017: Executive order blitz and legal evolution"
                    content: |
                      EO 13769 (Jan 27, 2017): Travel ban on 7 Muslim-majority countries. Immediate chaos at airports.
                      Blocked by courts within days. EO 13780 (Mar 6, 2017): Revised version, 6 countries, removed Iraq.
                      Partially blocked. Proclamation 9645 (Sep 24, 2017): Third version with enhanced vetting. Upheld by
                      Supreme Court (Trump v. Hawaii, 5-4, Jun 26, 2018). Pattern: issue maximalist executive order →
                      face legal challenge → revise and reissue → eventually prevail on narrower grounds. First term
                      lesson learned for second term: second term executive orders are drafted with legal durability
                      in mind. Expect fewer immediate court losses but same aggressive scope.
                    outputs:
                      - label: Travel ban airport chaos Jan 27-28 2017
                        content: |
                          EO signed Friday evening Jan 27. By Saturday: travelers detained at airports nationwide,
                          lawyers rushed to airports, protests erupted, federal judges issued emergency stays.
                          Pattern: speed of implementation outpaced legal review and operational planning. CBP was
                          not prepared, DHS guidance was contradictory, State Department was not consulted.
                          Result: maximum disruption, court defeats, political backlash. Lesson learned by second
                          term: executive orders are now pre-vetted by OLC and operationally coordinated before
                          signing. First-term chaos was a feature of inexperience, not strategy.
                      - label: Executive order legal evolution pattern
                        content: |
                          Prediction framework: (1) first version of any executive order will be maximally aggressive,
                          (2) expect immediate legal challenges, (3) administration will revise to address specific
                          legal vulnerabilities while maintaining policy intent, (4) final version usually achieves
                          60-80% of original scope after Supreme Court review. Timeline: initial order to final
                          implementation typically 6-18 months. Markets should price initial announcement at discount
                          to stated scope.

                  - label: "Second Term Mass Deportation Operations 2025-2026"
                    content: |
                      Day 1 executive orders: declared immigration emergency, activated military for border support,
                      expanded expedited removal, reinstated remain in Mexico, terminated CBP One app.
                      Operational deportation flights began immediately. ICE enforcement operations expanded to
                      interior (not just border). Scale: largest peacetime deportation operation in US history.
                      Pattern: second term executing on first term promises with less restraint and more operational
                      capacity. Watch for: (1) economic impact on labor-intensive sectors (agriculture, construction,
                      hospitality), (2) state-level legal challenges, (3) international relations impacts with
                      receiving countries.
                    outputs:
                      - label: Immigration enforcement economic indicators
                        content: |
                          Sectors exposed: agriculture (labor shortage → crop price inflation), construction (labor
                          shortage → project delays), hospitality (service sector workforce contraction).
                          Monitor: H-2A/H-2B visa processing, farm labor availability reports, construction labor
                          cost indices. Macro: net labor force contraction is inflationary. CPI food component
                          most sensitive.

  # ══════════════════════════════════════════════════════════════════
  # MEDIA & COMMUNICATIONS
  # ══════════════════════════════════════════════════════════════════
  - label: Media & Communications
    roles:
      - label: Counter-Puncher
        role_key: counter_puncher
        tasks:
          - label: Media Adversary Management
            systems:
              - label: '"Fake news" framing to discredit unfavorable coverage and control information narrative'
                decisions:
                  - label: "Media Strategy 2017-2026: Consistent delegitimization pattern"
                    content: |
                      "Fake news" label applied to any unfavorable coverage. Targeted specific outlets (CNN, NYT, WaPo)
                      and specific journalists. Revoked Jim Acosta's press pass (Nov 2018, restored by court order).
                      Second term: expanded to social media platform influence, Truth Social as primary channel.
                      Pattern: (1) unfavorable story breaks, (2) "fake news" response within hours, (3) alternative
                      narrative provided via Truth Social, (4) supportive media amplifies alternative narrative,
                      (5) original story loses traction in information environment. This is not random — it's a
                      systematic communication strategy that has been refined over 9+ years. Prediction utility:
                      when a negative story is developing, the counter-narrative will reveal what the administration
                      considers the truth or the preferred framing.
                    outputs:
                      - label: Media response timing indicators
                        content: |
                          Average response time to negative story: 2-6 hours (Truth Social), 12-24 hours (formal
                          statement). Speed of response indicates perceived severity — faster response = higher
                          concern level. No response to a negative story is extremely rare and signals either:
                          (a) legal advice to stay silent, or (b) the story will be addressed through action
                          rather than words. Market relevance: the counter-narrative often contains forward-looking
                          policy signals buried in the media criticism.

          - label: Truth Social as Policy Signal
            systems:
              - label: Social media posts as leading indicators of policy direction — often 12-48 hours ahead of formal action
                decisions:
                  - label: "Truth Social/Twitter as Policy Preview Pattern"
                    content: |
                      Consistently uses social media to test-balloon policy ideas before formal announcement.
                      First term (Twitter): tariff announcements, personnel changes, foreign policy positions,
                      and military decisions were all previewed via tweet. Second term (Truth Social): same pattern
                      with added platforms (Truth Social is primary, sometimes cross-posted). Key insight: social
                      media posts are the single most reliable leading indicator of policy action. The lag between
                      post and formal action is typically 12-48 hours for economic policy, 24-72 hours for
                      foreign policy, and 1-7 days for personnel changes.
                    outputs:
                      - label: Social media to policy action timeline
                        content: |
                          Tariff/trade: Truth Social post → 12-48 hours → executive order or formal announcement.
                          Foreign policy: Truth Social post → 24-72 hours → State/Pentagon action.
                          Personnel: Truth Social praise/criticism → 1-7 days → appointment/firing.
                          Market implication: the Truth Social post IS the signal. By the time formal action occurs,
                          the market has often already partially priced it. Alpha comes from reading the post and
                          acting before formal announcement. Monitor frequency: 6 AM - 8 AM ET and 9 PM - 11 PM ET
                          are peak posting times.

      - label: Social Media Strategist
        role_key: counter_puncher
        tasks:
          - label: Platform Strategy Evolution
            systems:
              - label: Migration from Twitter to Truth Social with implications for signal monitoring
                decisions:
                  - label: Twitter era communication patterns 2015-2021
                    content: |
                      Peak Twitter usage: 2017-2019, averaging 12-15 tweets per day. Early morning tweets (6-8 AM)
                      were often policy-reactive — responding to morning news coverage (Fox and Friends correlation).
                      Late evening tweets (10 PM - midnight) were often strategic — planting next-day narratives.
                      Weekend tweets had highest market impact due to gap-open effect on Monday. Key behavioral
                      pattern: tweet volume correlated with stress level. Increasing tweet frequency (20+ per day)
                      signaled agitation about a specific issue — useful for predicting impending action.
                    outputs:
                      - label: Tweet frequency as stress indicator
                        content: |
                          Normal baseline: 8-12 posts per day. Elevated (15-20): agitated about a topic, expect action
                          within days. Crisis mode (25+): something has deeply upset him, expect dramatic action within
                          24-48 hours. This pattern has transferred to Truth Social. Monitor post frequency as a leading
                          indicator separate from post content.
                      - label: Morning vs evening post analysis
                        content: |
                          Morning posts (6-8 AM ET): reactive to overnight news and morning shows. Content reveals what
                          he finds threatening or noteworthy. Useful for predicting same-day statements and actions.
                          Evening posts (9-11 PM ET): strategic plants for next-day coverage. Content reveals what he
                          wants the narrative to be. Useful for predicting next-day policy direction.
                      - label: Weekend posting and market gaps
                        content: |
                          Weekend policy posts have outsized market impact because markets are closed. A Sunday evening
                          tariff announcement creates a Monday gap-down that traders cannot escape. Historical examples:
                          May 5, 2019 China tariff tweet (Sunday) → S&P -2.4% Monday open. Pattern: high-impact
                          announcements on weekends/holidays are deliberate — they prevent gradual price discovery
                          and maximize shock value. Trading defense: monitor Truth Social over weekends, pre-position
                          hedges Friday afternoon if escalation is expected.

                  - label: Truth Social era 2022-present and signal quality
                    content: |
                      Truth Social launched Feb 2022. Became primary communication platform. Lower engagement than
                      Twitter (smaller user base) but higher signal quality — every post is presidential communication
                      without the noise of a general social media platform. Posts are often cross-posted or amplified
                      by mainstream media. Pattern: Truth Social posts have HIGHER policy signal value than tweets
                      did because: (1) no algorithm suppression, (2) no moderation risk, (3) no need to be provoked
                      by other users — every post is deliberate.
                    outputs:
                      - label: Truth Social monitoring framework
                        content: |
                          Critical monitoring times: 6-8 AM ET, 12-1 PM ET, 9-11 PM ET. Post categories to track:
                          (1) all-caps posts = maximum emphasis, treat as formal statements, (2) re-truths of others =
                          endorsement of position without personal commitment, (3) photo/video posts = curated image
                          management, (4) multi-post threads = sustained attention on topic (rare, high signal).
                          Automated monitoring: RSS feeds and Truth Social API access points exist for real-time capture.

          - label: Adversary-Specific Media Tactics
            systems:
              - label: Different communication strategies for different adversary types
                decisions:
                  - label: Media company targeting patterns
                    content: |
                      CNN: primary media adversary. Attacks serve base-energizing function. Jim Acosta confrontation
                      (Nov 2018) was performative — the conflict itself was the goal. NYT/WaPo: institutional
                      adversaries. Attacks frame these as establishment opposition. Fox News: complex — supportive
                      network that occasionally draws criticism when individual hosts deviate. OAN/Newsmax: fully
                      aligned networks used for friendly interview environments.
                      Pattern: media adversary selection is strategic. Attacking CNN energizes base. Attacking Fox
                      disciplines allies. Ignoring a media outlet signals they are irrelevant.
                    outputs:
                      - label: Media attack target as political signal
                        content: |
                          When attacking CNN/MSNBC: standard base maintenance, no policy signal.
                          When attacking Fox News: disciplining allies, expect loyalty test for Fox hosts.
                          When attacking a specific journalist: that journalist has hit a sensitive topic.
                          When attacking a tech platform: expect regulatory/antitrust action against that platform.
                          When ignoring a media story entirely: either legal advice to stay silent or the story
                          will be addressed through action rather than words.
                      - label: Charlottesville Aug 2017 communication failure
                        content: |
                          Aug 12, 2017: White supremacist rally, counter-protester killed. Aug 15: "Very fine people
                          on both sides." Massive bipartisan backlash. Pattern: when an event requires nuanced
                          condemnation of base-aligned groups, communication defaults to equivocation. This is a
                          VULNERABILITY in the communication pattern — the base-first instinct overrides standard
                          political crisis communication. Prediction: similar events in second term will produce
                          similar equivocation. Watch for: events requiring explicit condemnation of right-wing
                          groups as communication stress tests.

          - label: Approval Rating Response Patterns
            systems:
              - label: Policy calibration in response to approval rating movements
                decisions:
                  - label: Approval floor and ceiling behavioral triggers
                    content: |
                      First term approval range: 35-49% (Gallup). Never exceeded 49% (inauguration) or dropped below
                      35% (COVID peak, Jan 6 aftermath). Pattern: when approval drops toward 35% → expect base-
                      energizing actions (immigration enforcement, rally schedule increase, media attacks). When
                      approval is stable 42-45% → policy experimentation window (bipartisan infrastructure attempts,
                      unexpected diplomatic moves). Key insight: approval FLOOR is more important than ceiling —
                      he will do almost anything to prevent dropping below 35% (base erosion), but doesn't
                      meaningfully pursue broad approval above 45%.
                    outputs:
                      - label: Approval-driven policy prediction
                        content: |
                          Monitor approval rating trajectory (RealClearPolitics average):
                          Declining toward 37%: expect immigration action, rally blitz, media confrontation.
                          Stable 42-45%: policy window open, more unpredictable actions possible.
                          Rising above 45%: rare — occurred briefly during COVID initial response (rally around flag).
                          Market implication: base-energizing actions (immigration, tariff threats) are more likely
                          when approval is declining. These actions have specific sector impacts.

  # ══════════════════════════════════════════════════════════════════
  # PERSONNEL & APPOINTMENTS
  # ══════════════════════════════════════════════════════════════════
  - label: Personnel & Appointments
    roles:
      - label: Loyalty Enforcer
        role_key: loyalty_enforcer
        tasks:
          - label: Cabinet and Senior Staff Management
            systems:
              - label: Loyalty as primary selection criterion with public praise/criticism cycle
                decisions:
                  - label: "Tillerson to Pompeo: Loyalty upgrade pattern"
                    content: |
                      Rex Tillerson (Secretary of State, Feb 2017 - Mar 2018): Initially praised as "a world-class
                      player." Relationship deteriorated as Tillerson publicly contradicted or moderated positions
                      (called for diplomacy with North Korea while Trump escalated rhetoric). NBC reported Tillerson
                      called Trump a "moron" (Oct 2017). Fired via tweet Mar 13, 2018. Replaced by Mike Pompeo —
                      a loyalist who never publicly contradicted the president. Pattern: appointment with praise →
                      divergence on a visible issue → media reports of friction → firing (often via social media) →
                      replacement with more aligned figure. Timeline from first public friction to removal: typically
                      3-6 months.
                    outputs:
                      - label: Cabinet firing leading indicators
                        content: |
                          Warning signs (in order): (1) President stops publicly praising the official, (2) anonymous
                          "White House sources" express displeasure, (3) president publicly contradicts official's
                          position, (4) "full confidence" statement (often precedes firing by 1-4 weeks),
                          (5) replacement candidates leaked to media, (6) firing announcement. Market relevance:
                          cabinet changes can signal policy shifts — e.g., Tillerson→Pompeo signaled harder line on
                          Iran, Sessions→Barr signaled different DOJ priorities.

                  - label: "Sessions Firing: Loyalty test failure on recusal"
                    content: |
                      Jeff Sessions recused from Russia investigation (Mar 2, 2017). Trump viewed this as betrayal
                      despite Sessions being the first Senator to endorse Trump's candidacy. Public criticism
                      escalated for 18 months: "I don't have an Attorney General." Fired Nov 7, 2018 (day after
                      midterm elections). Pattern: even early loyalty does not protect against perceived disloyalty
                      on a critical issue. The recusal was seen as failure to protect rather than proper legal conduct.
                      Prediction: for second term, appointees are pre-screened for willingness to use office to protect
                      presidential interests. Expect fewer intra-administration conflicts but more unified executive action.
                    outputs:
                      - label: Loyalty hierarchy in second term
                        content: |
                          Second term cabinet selection criteria (in observed priority order):
                          (1) Personal loyalty and demonstrated willingness to defend publicly,
                          (2) Alignment on key policy positions (immigration, trade, foreign policy),
                          (3) Competence/experience (present but subordinate to criteria 1-2),
                          (4) Media presence and ability to communicate administration position.
                          Prediction: second term personnel changes will be fewer but more impactful.
                          When they occur, they signal a genuine policy shift, not just personality friction.

  # ══════════════════════════════════════════════════════════════════
  # FOREIGN POLICY — ADDITIONAL PRECEDENTS
  # ══════════════════════════════════════════════════════════════════

      - label: Russia/Putin Relationship Analyst
        role_key: dealmaker
        tasks:
          - label: Russia Policy Duality
            systems:
              - label: Personal deference to Putin combined with hawkish policy actions through Congress/staff
                decisions:
                  - label: "Helsinki Summit Jul 2018: Deference to Putin over US intelligence"
                    content: |
                      Jul 16, 2018: Joint press conference with Putin in Helsinki. Asked about Russian election
                      interference, sided with Putin over US intelligence community: "I don't see any reason why
                      it would be" Russia. Bipartisan condemnation. Walked back next day: "I meant to say wouldn't
                      instead of would." Pattern: personal relationship with Putin overrides institutional positions.
                      However, policy actions during same period included: expelled 60 Russian diplomats (Mar 2018),
                      approved Javelin missiles to Ukraine (first lethal aid), sanctioned Russian oligarchs (Apr 2018).
                      Key insight: RHETORIC toward Putin is deferential; POLICY through staff/Congress was often hawkish.
                      Second term: this duality may collapse as personnel are more aligned with presidential preferences.
                    outputs:
                      - label: Russia rhetoric vs policy divergence
                        content: |
                          Critical analytical framework: separate Trump's WORDS about Russia/Putin from Trump's ACTIONS.
                          First term actions were often hawkish (sanctions, expulsions, arms to Ukraine) despite warm rhetoric.
                          Second term prediction: personnel alignment means rhetoric and policy will converge. Direction of
                          convergence is the key question — watch for: sanctions enforcement (weakening = convergence toward
                          rhetoric), Ukraine policy (aid reduction = convergence), NATO posture (reduced = convergence).

                  - label: "Ukraine/Russia 2022-2025: War response and peace deal pursuit"
                    content: |
                      During campaign: "I will end the war in 24 hours." Did not specify how. Pattern: maximalist
                      promise → reality forces modification → reframe timeline. Post-inauguration: pressure on both
                      sides for negotiation. Reduced rhetoric about Putin as aggressor. Framed as "two sides need to
                      talk." Ukraine aid used as leverage for negotiations (consistent with transactional pattern).
                      Watch for: peace deal announcement framed as personal diplomatic achievement regardless of
                      territorial concessions. Likely outcome: frozen conflict framed as "peace."
                    outputs:
                      - label: Ukraine peace deal prediction framework
                        content: |
                          Most likely outcome structure: (1) ceasefire along current lines, (2) Ukraine does not
                          formally cede territory but de facto loses control, (3) NATO membership deferred indefinitely,
                          (4) framed as "biggest peace deal in decades." Market impact: European defense stocks down
                          on peace deal (reduced urgency), energy stocks neutral (Russian gas return uncertain),
                          grain/agriculture normalize. Timeline: 2025-2026 if negotiations progress.
                      - label: '"24 hours" claim pattern'
                        content: |
                          Campaign promise: "end the war in 24 hours." Reality: months of negotiation. Pattern is
                          consistent with other maximalist timeline claims: wall "immediately," healthcare replacement
                          "day one," infrastructure "very quickly." The claim signals priority and intent, not
                          realistic timeline. Discount timeline by 10-50x; take directional intent seriously.

              - label: Personal rapport with authoritarian leaders as diplomatic tool
                decisions:
                  - label: "Saudi Arabia/MBS: Strategic alignment over human rights"
                    content: |
                      First foreign trip as president: Saudi Arabia (May 2017). $110B arms deal announced (actual
                      deliveries were smaller). After Khashoggi murder (Oct 2018): refused to condemn MBS despite
                      CIA assessment of his involvement. "Maybe he did, maybe he didn't." Maintained relationship
                      for strategic reasons: oil production, Iran containment, arms sales, investment. Pattern:
                      personal relationships with strongmen are maintained regardless of human rights concerns.
                      Transactional value overrides moral considerations every time. Second term: Saudi relationship
                      continues as strategic anchor. Watch for: OPEC production requests, investment fund commitments.
                    outputs:
                      - label: Saudi relationship market indicators
                        content: |
                          Saudi-US alignment correlates with: oil production decisions favorable to US (lower prices
                          before elections), sovereign wealth fund investments in US, defense procurement contracts.
                          When relationship is strong: expect OPEC cooperation signals. When strained: expect
                          production cuts and price pressure. Monitor: Trump-MBS communication frequency, Saudi
                          investment announcements, OPEC meeting outcomes.

          - label: Indo-Pacific Competition
            systems:
              - label: China as primary strategic competitor with trade as the main battlefield
                decisions:
                  - label: "South China Sea 2017-2020: Freedom of navigation vs trade priority"
                    content: |
                      Maintained freedom of navigation operations (FONOPS) through South China Sea per military
                      recommendations. Did not escalate beyond standard operations. Pattern: military maintains
                      operational tempo on autopilot while presidential attention focuses on trade. South China Sea
                      was never elevated to presidential priority — trade deficit was. Implication: military/strategic
                      competition with China is secondary to economic competition in presidential decision-making.
                    outputs:
                      - label: China policy priority hierarchy
                        content: |
                          Presidential priority order for China: (1) Trade deficit and tariffs — ALWAYS primary,
                          (2) Technology competition (Huawei, TikTok) — secondary, driven by national security staff,
                          (3) Military/territorial — tertiary, delegated to Pentagon. Prediction: any China crisis
                          that is economic gets presidential attention. Military crises (Taiwan, SCS) get standard
                          institutional response unless they become economic (supply chain disruption, trade impacts).

                  - label: "Taiwan Policy: Strategic ambiguity with transactional undertones"
                    content: |
                      Mixed signals: took congratulatory call from Taiwan President Tsai (Dec 2016, broke protocol),
                      but subsequently reaffirmed One China policy. Sold arms to Taiwan (routine, bipartisan).
                      Described Taiwan as "like the tip of a pen" compared to China as "the desk" — suggesting
                      relative unimportance. Pattern: Taiwan is a bargaining chip, not a principled commitment.
                      Would likely trade Taiwan-related concessions for economic gains with China. This is the
                      transactional worldview applied to alliances.
                    outputs:
                      - label: Taiwan crisis prediction
                        content: |
                          If China escalates toward Taiwan: (1) initial strong rhetoric ("we will defend"), but
                          (2) simultaneous back-channel trade discussions, (3) willingness to negotiate Taiwan's
                          status as part of broader trade package. Military commitment uncertain — troop-averse
                          pattern suggests economic/sanctions response over military intervention. TSMC/semiconductor
                          supply chain is the actual US interest, not Taiwan's sovereignty per se.
                          Market impact: Taiwan crisis → semiconductor stocks -15-30%, defense stocks +5-10%,
                          tech supply chain disruption would be the primary economic channel.

                  - label: "Japan/Abe and India/Modi: Bilateral relationship leverage"
                    content: |
                      Shinzo Abe: personal friendship, golf diplomacy, but still pressured Japan on trade (auto
                      tariff threats, bilateral trade agreement push). Pattern: personal relationship does not
                      exempt allies from trade pressure. Modi: similar personal rapport used as bridge for
                      Indo-Pacific strategy while maintaining trade pressure on Indian tariffs. Both relationships
                      demonstrate: warmth is genuine but transactional framework always applies.
                    outputs:
                      - label: Allied leader relationship trading pattern
                        content: |
                          Framework: good personal relationship = easier negotiation, NOT exemption from pressure.
                          Prediction: any allied leader who visits and builds rapport should expect a trade ask
                          within 1-3 months. The visit IS the softening before the demand.

  # ══════════════════════════════════════════════════════════════════
  # ECONOMIC & TRADE — ADDITIONAL PRECEDENTS
  # ══════════════════════════════════════════════════════════════════

      - label: Economic Nationalist
        role_key: economic_nationalist
        tasks:
          - label: Manufacturing and Jobs Rhetoric
            systems:
              - label: Direct intervention in individual company decisions via public pressure
                decisions:
                  - label: "Carrier/United Technologies Dec 2016: Pre-inaugural intervention"
                    content: |
                      Before inauguration, personally intervened to prevent Carrier from moving 1,100 jobs to Mexico.
                      Deal: Indiana provided $7M in tax incentives, Carrier kept ~800 jobs (still moved ~600).
                      Framed as saving all 1,100 jobs. Pattern: (1) identify high-visibility company decision,
                      (2) public pressure via tweets/statements, (3) negotiate behind scenes (often with state-level
                      incentives), (4) announce deal with inflated numbers. Repeated with: Foxconn (Wisconsin),
                      Ford (Kentucky), Softbank (investment pledge). Results often underwhelmed the announcement.
                    outputs:
                      - label: Company intervention pattern
                        content: |
                          When a major company announces offshoring/layoffs → expect presidential tweet within 24-48 hours.
                          Stock impact: target company dips 1-3% on presidential criticism, recovers on "deal" announcement.
                          Pattern is performative: the announced deal rarely matches the claimed numbers. Monitor for:
                          companies in politically important states, defense contractors, auto manufacturers (highest
                          intervention probability).

                  - label: "Foxconn Wisconsin 2017-2020: Promised factory that never materialized"
                    content: |
                      Jul 2017: Announced Foxconn would build $10B LCD factory in Wisconsin, creating 13,000 jobs.
                      "The eighth wonder of the world." Reality: factory was repeatedly downsized, never reached
                      scale, most jobs never created. By 2020: renegotiated to much smaller facility. Pattern:
                      announcement is the product, not the outcome. The news cycle of the announcement creates
                      political value regardless of whether the project succeeds. This pattern is critical for
                      market analysis: discount initial announcements by 50-80% for actual delivery.
                    outputs:
                      - label: Foxconn groundbreaking ceremony vs actual delivery
                        content: |
                          Jun 28, 2018: Trump attended groundbreaking ceremony with Foxconn CEO Terry Gou. Called it
                          "the eighth wonder of the world." Golden shovels, thousands of attendees. By 2020: factory
                          repeatedly downsized, renegotiated from 13,000 jobs to 1,454, investment from $10B to $672M.
                          The groundbreaking ceremony generated more media value than the factory ever produced.
                          Pattern: the announcement event IS the deliverable in the political economy. Actual project
                          delivery is irrelevant to the political return on the announcement.
                      - label: Announcement-to-reality discount factor
                        content: |
                          For presidential economic announcements (investment pledges, job creation, factory openings):
                          Apply a 50-80% discount to stated numbers. Historical accuracy: Carrier (73% of claimed jobs),
                          Foxconn (<10% of claimed investment), Softbank (partially delivered through existing plans
                          rebranded as new commitments). Trading implication: fade the initial announcement pop
                          on companies receiving presidential attention — the long-term delivery underperforms.

          - label: Cryptocurrency and Digital Assets
            systems:
              - label: Evolved from skeptic to champion based on donor and political incentives
                decisions:
                  - label: "Crypto Policy Evolution 2019-2025: From skeptic to champion"
                    content: |
                      Jul 2019 tweet: "I am not a fan of Bitcoin and other Cryptocurrencies, which are not money,
                      and whose value is highly volatile and based on thin air." 2024 campaign: embraced crypto,
                      spoke at Bitcoin Conference, promised to fire SEC chair Gensler, proposed strategic Bitcoin
                      reserve. Post-inauguration: signed executive order on digital assets, nominated pro-crypto
                      SEC chair. Pattern: positions evolve based on donor/constituency incentives. Crypto community
                      became major donor bloc in 2024 cycle. The shift is transactional, not ideological.
                    outputs:
                      - label: Crypto policy prediction
                        content: |
                          Second term crypto policy: favorable regulatory environment, SEC enforcement pullback,
                          possible strategic reserve exploration. Monitor for: SEC enforcement actions (declining =
                          favorable), stablecoin legislation (bipartisan path exists), Bitcoin reserve executive
                          order (high symbolic value, uncertain implementation). Market: crypto assets broadly
                          benefit from regulatory clarity. BTC, ETH most sensitive to presidential statements.

          - label: Energy Dominance
            systems:
              - label: Maximum domestic production as both economic and geopolitical strategy
                decisions:
                  - label: "Energy Policy 2017-2020: Drill baby drill as consistent policy"
                    content: |
                      First term: approved Keystone XL and Dakota Access pipelines (Day 1 executive orders),
                      opened ANWR to drilling, reduced EPA regulations, withdrew from Paris Climate Accord (Jun 2017).
                      US became world's largest oil producer (2018) and net energy exporter. Pattern: energy policy
                      is the intersection of economic nationalism (jobs, trade balance) and deregulation (reduce
                      government interference). This is one of the most ideologically consistent policy areas.
                      Second term: same approach amplified. "Drill baby drill" is both literal policy and political slogan.
                    outputs:
                      - label: Energy policy market framework
                        content: |
                          Energy policy is near-certain: maximum domestic production, reduced regulation, fossil fuel
                          favorable. Market implications: domestic E&P companies benefit (permitting acceleration),
                          renewable energy stocks face headwinds (subsidy uncertainty), pipeline companies benefit
                          (regulatory approval speed). Oil price impact: increased US production is bearish for
                          crude long-term, but OPEC responses can offset. Monitor: drilling permit approvals (leading
                          indicator), EPA rule changes, LNG export approvals.

                  - label: "Paris Climate Accord Withdrawal: Sovereignty over multilateralism"
                    content: |
                      Jun 1, 2017: Announced withdrawal from Paris Climate Accord. "I was elected to represent the
                      citizens of Pittsburgh, not Paris." Biden rejoined Jan 2021. Trump re-withdrew upon second
                      inauguration. Pattern: multilateral agreements that constrain US economic activity are rejected.
                      This is economic nationalism applied to climate policy. The withdrawal decision is about
                      sovereignty and competitiveness, not climate science beliefs.
                    outputs:
                      - label: Multilateral agreement prediction framework
                        content: |
                          Any multilateral agreement that: (1) constrains US economic activity, (2) benefits
                          competitors (especially China), (3) requires US funding, or (4) involves sovereignty
                          concessions → will be withdrawn from, renegotiated, or ignored. Apply to: WHO (withdrawn
                          first term, rejoined by Biden, re-withdrawn second term), UN agencies, trade agreements,
                          climate commitments. Pattern is near-certain.

      - label: Sector-Specific Trade Warrior
        role_key: protectionist
        tasks:
          - label: Auto Industry Tariff Threats
            systems:
              - label: Threatened but never implemented auto tariffs as leverage tool
                decisions:
                  - label: Auto tariff threats 2018-2019 against EU and Japan
                    content: |
                      Repeatedly threatened 25% tariffs on imported automobiles under Section 232 (national security).
                      Commerce Department report completed Feb 2019. Trump delayed action multiple times. Never
                      implemented — used as leverage in EU and Japan bilateral trade talks. Pattern: the THREAT
                      of auto tariffs was more valuable than implementation. EU and Japan made trade concessions
                      to avoid them. Second term: auto tariff threat remains in the toolkit. Particularly relevant
                      for German/Japanese automakers and their US operations.
                    outputs:
                      - label: Auto tariff threat market playbook
                        content: |
                          When auto tariff rhetoric appears: European auto stocks (BMW, VW, Daimler) drop 3-8%.
                          Japanese auto (Toyota, Honda) drop 2-5%. US auto (Ford, GM) mixed — short-term fear,
                          but potential beneficiary of protectionism. Pattern: the threat causes the stock move;
                          the threat is then used as leverage; tariffs are delayed or withdrawn after concessions.
                          Trading: buy the dip on European auto after initial tariff threat — implementation
                          probability is <20% based on first-term precedent.
                      - label: Mexico auto tariff threat Jun 2019
                        content: |
                          May 30, 2019: Threatened 5% tariffs on ALL Mexican imports, escalating to 25%, unless Mexico
                          stopped immigration flow. NOT a trade dispute — immigration enforcement via trade threat.
                          Markets dropped. Jun 7: Deal announced, tariffs suspended. Mexico agreed to deploy National
                          Guard to southern border. Pattern: tariffs used as leverage for non-trade objectives.
                          Prediction: any policy objective can be backed by tariff threats, even if unrelated to trade.

          - label: Tech and Social Media Regulation
            systems:
              - label: Antitrust threats against tech companies driven by political grievances
                decisions:
                  - label: Big tech targeting pattern
                    content: |
                      Amazon/Bezos: personal feud (Bezos owns WaPo). Publicly attacked Amazon on postal pricing,
                      tax practices, antitrust. Explored using government contracts as leverage. Google: accused of
                      suppressing conservative content in search results. Threatened regulation. Facebook/Meta:
                      banned from platform Jan 2021, reinstated 2023. Complex — Zuckerberg has since aligned.
                      Twitter: pre-Musk, viewed as censorship platform. Post-Musk, supportive. TikTok: national
                      security ban pursued (bipartisan). Pattern: tech regulation is driven by political alignment,
                      not consistent antitrust philosophy. Aligned platforms get latitude; adversarial platforms
                      get regulatory threats.
                    outputs:
                      - label: Tech regulation prediction framework
                        content: |
                          DOJ/FTC antitrust actions against tech companies correlate with presidential grievances:
                          Company under attack on Truth Social → DOJ investigation probability increases.
                          Company that aligns (Meta, X) → enforcement action probability decreases.
                          TikTok: bipartisan target, separate from political alignment pattern.
                          Trading: monitor presidential statements about specific tech companies. Negative statements
                          precede regulatory action by 1-6 months.
                      - label: Amazon specific targeting pattern
                        content: |
                          Amazon is the most targeted tech company due to Bezos/WaPo relationship. Actions taken/
                          threatened: USPS pricing review, HQ2 political backlash encouragement, JEDI contract
                          intervention (awarded to Microsoft after Trump Pentagon pressure), antitrust rhetoric.
                          Pattern: personal vendetta drives policy. If Bezos/WaPo coverage is negative → expect
                          anti-Amazon action within weeks.

          - label: Sanctions as Economic Weapon
            systems:
              - label: Sanctions preferred over military action across all adversary relationships
                decisions:
                  - label: Sanctions escalation doctrine across adversaries
                    content: |
                      Iran: maximum pressure sanctions targeting oil exports, central bank, individuals.
                      North Korea: expanded sanctions targeting shipping, banking, individuals.
                      Russia (first term): sanctions on oligarchs, companies (Rusal, Deripaska).
                      Venezuela: sanctions on PDVSA, oil exports, Maduro associates.
                      Cuba: reversed Obama opening, reimposed sanctions.
                      Pattern: sanctions are the DEFAULT tool before any other action. Preferred because:
                      (1) no military risk, (2) executive authority (no Congress needed), (3) visible impact,
                      (4) reversible (leverage for negotiation). Second term: sanctions infrastructure is more
                      sophisticated. OFAC enforcement is faster.
                    outputs:
                      - label: Sanctions announcement market impact by target
                        content: |
                          Iran sanctions: oil +2-5%, defense stocks +0.5-1%.
                          Russia sanctions: European energy stocks volatile, ruble weakens 2-5%.
                          China sanctions (entity list): semiconductor stocks volatile, target company -5-15%.
                          Venezuela sanctions: oil +1-3% (marginal supply impact).
                          Generic pattern: sanctions announcement → affected commodity/sector moves immediately,
                          reverts 30-50% within 1 week as market assesses actual enforcement.
                      - label: Secondary sanctions as global leverage
                        content: |
                          Secondary sanctions (threatening third countries/companies that trade with sanctioned
                          entities) are the most powerful economic tool. Used against: European companies trading
                          with Iran, Chinese companies trading with North Korea, banks facilitating sanctioned
                          transactions. Pattern: secondary sanctions have more market impact than primary because
                          they affect allied economies and global trade flows.

          - label: Dollar Policy and Currency
            systems:
              - label: Contradictory desires for strong dollar prestige and weak dollar competitiveness
                decisions:
                  - label: Dollar policy contradictions and market signals
                    content: |
                      Publicly: sometimes calls for strong dollar (prestige), sometimes for weak dollar
                      (export competitiveness). In practice: prefers weaker dollar to boost manufacturing
                      exports and reduce trade deficit. Accused China of currency manipulation (Aug 2019,
                      Treasury officially labeled China). Pressured Fed for lower rates (which weakens dollar).
                      Pattern: when TALKING about the dollar, statements are contradictory. When ACTING,
                      every policy action (tariffs, Fed pressure, fiscal expansion) weakens the dollar.
                    outputs:
                      - label: Dollar trading framework
                        content: |
                          Ignore dollar rhetoric — track dollar-impacting policies. Tariff escalation → short-term
                          USD strength (safe haven) but long-term weakness (reduced trade). Fed pressure → USD
                          weakness. Fiscal expansion → USD weakness (higher deficits). Net effect of Trump policy
                          bundle: USD bearish over 12+ month horizon. DXY tends to weaken during active tariff
                          periods after initial safe-haven spike fades.

  # ══════════════════════════════════════════════════════════════════
  # DOMESTIC POLICY — ADDITIONAL PRECEDENTS
  # ══════════════════════════════════════════════════════════════════

      - label: Institutional Disruptor
        role_key: disruptor
        tasks:
          - label: Judicial Strategy
            systems:
              - label: Court appointments as lasting legacy play — delegated to Federalist Society pipeline
                decisions:
                  - label: "Supreme Court Appointments: Three justices, generational impact"
                    content: |
                      Gorsuch (Apr 2017), Kavanaugh (Oct 2018), Barrett (Oct 2020). All from Federalist Society
                      recommended list published during campaign. Pattern: judicial appointments are the one area
                      where Trump fully delegates to ideological infrastructure (Federalist Society, Heritage Foundation).
                      Not personally engaged in judicial philosophy — delegates selection criteria entirely. But
                      understands the political value: "I appointed three Supreme Court justices" is a consistent
                      talking point. Second term: lower court appointments continue at rapid pace.
                    outputs:
                      - label: Judicial impact on policy prediction
                        content: |
                          Supreme Court composition (6-3 conservative) means: executive orders face friendlier judicial
                          review, regulatory rollbacks more likely to survive challenge, immigration enforcement actions
                          more likely upheld. Prediction: second term executive actions are more legally aggressive
                          BECAUSE the judicial environment is more favorable. Factor this into timeline estimates —
                          actions that would have been blocked in first term may now proceed.

          - label: Healthcare Policy
            systems:
              - label: Repeal and replace rhetoric without coherent replacement plan
                decisions:
                  - label: "ACA Repeal Failure Jul 2017: McCain thumbs-down"
                    content: |
                      Skinny repeal failed 49-51 in Senate, Jul 28, 2017. John McCain's decisive "no" vote.
                      Trump never forgave McCain (revenge/reciprocity pattern — continued attacking McCain posthumously).
                      Never produced a comprehensive replacement plan despite years of "two weeks away" promises.
                      Pattern: healthcare is a political talking point, not a policy priority. The complexity of
                      healthcare reform doesn't match the preference for simple, dramatic action. Second term:
                      drug pricing executive orders (visible, simple) rather than comprehensive reform (complex, risky).
                    outputs:
                      - label: McCain thumbs-down revenge pattern
                        content: |
                          Jul 28, 2017: McCain's thumbs-down vote killed ACA repeal. Trump's response: attacked
                          McCain repeatedly for years, including after McCain's death (Aug 2018). "I was never a
                          fan of John McCain and I never will be." Ordered USS John S. McCain hidden during Japan
                          visit (May 2019, denied but reported). Pattern: the revenge principle has NO time limit
                          and NO death exemption. A single perceived betrayal generates permanent enmity.
                          Prediction utility: anyone who visibly defies Trump should expect permanent targeting.
                      - label: Healthcare policy prediction
                        content: |
                          Healthcare is LOW priority for presidential action. Expect: drug pricing executive orders
                          (visible wins), ACA undermining through administrative action (mandate enforcement, subsidy
                          adjustments), but NO comprehensive replacement legislation. Market: pharma stocks sensitive
                          to drug pricing EOs, ACA marketplace insurers sensitive to subsidy policy. Hospital stocks
                          broadly stable absent major reform.

          - label: Law Enforcement and Justice
            systems:
              - label: Pro-law-enforcement rhetoric combined with DOJ independence challenges
                decisions:
                  - label: "DOJ Independence 2017-2021: Treating AG as personal attorney"
                    content: |
                      Viewed Attorney General as personal protector, not independent law enforcement head.
                      Sessions recusal → fury. Barr initially compliant (Mueller report summary favorable to Trump),
                      later diverged (called Trump tweets about DOJ cases "impossible"). Pattern: expects DOJ to
                      protect presidential interests and investigate opponents. Second term: AG selection specifically
                      screened for alignment on this expectation. Implications: DOJ actions in second term may be
                      more politically directed than first term.
                    outputs:
                      - label: Comey firing May 2017 as DOJ control attempt
                        content: |
                          May 9, 2017: Fired FBI Director James Comey. Initially cited Rod Rosenstein memo on
                          Clinton investigation handling. Then admitted in NBC interview (May 11): "I was going to
                          fire Comey... this Russia thing." The admission contradicted the official explanation.
                          Triggered appointment of Special Counsel Mueller. Pattern: impulsive action to remove
                          perceived threat → official justification doesn't match real reason → admission under
                          media pressure → consequence escalation (Special Counsel). Second term: similar impulses
                          are better managed by aligned staff who prevent public contradictions.
                      - label: DOJ action prediction framework
                        content: |
                          Second term DOJ: expect investigations into political opponents (announced or hinted via
                          Truth Social before formal action), reduced independence from White House direction,
                          prosecution decisions influenced by political alignment. Market relevance: DOJ actions
                          against specific companies (antitrust, fraud) may correlate with presidential grievances.
                          Monitor: presidential criticism of specific companies → DOJ investigation likelihood increases.

  # ══════════════════════════════════════════════════════════════════
  # IMMIGRATION — ADDITIONAL PRECEDENTS
  # ══════════════════════════════════════════════════════════════════

      - label: Border Security Maximalist
        role_key: protectionist
        tasks:
          - label: Wall and Physical Barrier Strategy
            systems:
              - label: Border wall as signature promise with creative funding mechanisms
                decisions:
                  - label: "Border Wall Funding 2017-2020: Mexico payment claim to emergency declaration"
                    content: |
                      Campaign promise: "build a wall and Mexico will pay for it." Mexico refused. Requested
                      Congressional funding ($5.7B). Congress refused. Government shutdown (35 days). Congress
                      still refused. Declared national emergency (Feb 15, 2019) to redirect military construction
                      funds. ~450 miles of barrier constructed by end of first term (most replacing existing
                      barriers, ~80 miles of new barrier where none existed). Pattern: (1) make maximalist promise,
                      (2) fail through normal channels, (3) find creative executive mechanism, (4) declare victory
                      on partial delivery. "Mexico paying" evolved through reframing: USMCA savings, tariff revenue,
                      remittance fees — none actually funded the wall.
                    outputs:
                      - label: Wall construction actual vs claimed statistics
                        content: |
                          Claimed: "completed the wall." Actual: ~453 miles of barriers, of which ~80 miles were
                          new barriers where none existed. Remainder replaced existing vehicle barriers or pedestrian
                          fencing with bollard-style wall. Cost: $15B+ total from multiple funding sources (Congressional
                          appropriations, military construction redirects, Treasury forfeiture fund). Pattern: partial
                          delivery framed as total fulfillment. The gap between claim and reality is consistent and
                          quantifiable: ~60-80% of claimed achievement = actual achievement.
                      - label: National emergency declaration Feb 2019 as funding mechanism
                        content: |
                          Feb 15, 2019: Declared national emergency to access $3.6B in military construction funds
                          for border wall. First use of emergency powers to fund a project Congress explicitly refused
                          to fund. Pattern: emergency declaration as bypass mechanism for Congressional opposition.
                          Legal challenges partially blocked spending. Supreme Court allowed it to proceed (Jul 2019).
                          Template: established precedent that emergency powers can redirect military funds for
                          domestic construction. Second term: this mechanism is available for any priority.
                      - label: Promise-to-delivery reframing pattern
                        content: |
                          When a specific promise can't be literally fulfilled → expect creative reframing rather
                          than admission of failure. "Mexico will pay" → "Mexico is paying through the new trade deal."
                          The reframing is the prediction: identify the original promise, identify the delivery gap,
                          and predict HOW the gap will be reframed. This applies to: wall funding, healthcare replacement,
                          debt elimination, war-ending promises.

          - label: Deportation Operations
            systems:
              - label: Mass enforcement operations combining ICE, military, and local law enforcement
                decisions:
                  - label: "Family Separation 2018: Zero tolerance and reversal"
                    content: |
                      Apr 2018: "Zero tolerance" policy — all illegal border crossers prosecuted, resulting in
                      family separation of parents and children. Massive public backlash including from Republican
                      allies. Jun 20, 2018: Executive order ending family separation (reversal). Pattern: (1) implement
                      maximalist policy, (2) face unexpected backlash intensity, (3) reverse when political cost
                      exceeds benefit, (4) never admit the reversal was wrong — frame as "I solved it."
                      Key insight: there IS a limit to how far immigration enforcement goes. The limit is not
                      legal — it's political. When images/stories generate sufficient bipartisan outrage, reversal
                      occurs. Second term: policies designed to avoid the visual/emotional triggers that caused
                      first term backlash.
                    outputs:
                      - label: Zero tolerance policy timeline and reversal
                        content: |
                          Apr 6, 2018: Sessions announced zero tolerance. May-Jun: 2,654 children separated from
                          parents at border. Jun 18: AP photos of children in cage-like facilities go viral.
                          Jun 20: Trump signs EO ending family separation. Jun 26: Federal judge orders reunification.
                          Reunification took months, some families never reunited. Political cost: bipartisan damage,
                          evangelical allies broke ranks. This is the single clearest example of a policy reversal
                          driven by image-based backlash. The mechanism: visual suffering → media amplification →
                          bipartisan outcry → reversal framed as compassion.
                      - label: Remain in Mexico program effectiveness data
                        content: |
                          MPP enrollment: ~70,000 migrants returned to Mexico during 2019-2021 implementation.
                          Border encounters dropped ~75% during peak MPP enforcement. Court ordered end (Aug 2021),
                          reinstated (Dec 2021), ended again (Jun 2022). Pattern: the program was the most effective
                          deterrence tool of the first term by measurable outcomes. Second term: reinstated
                          immediately and expanded. Monitor: monthly border encounter statistics as effectiveness
                          measure and political ammunition.
                      - label: Policy reversal trigger indicators
                        content: |
                          Reversal occurs when: (1) bipartisan criticism reaches critical mass (not just Democrats),
                          (2) visual/emotional imagery dominates 2+ news cycles, (3) key Republican allies publicly
                          break. Watch for these indicators on any policy. If all three converge, expect executive
                          order "fixing" the issue within 48-72 hours. The reversal will be framed as presidential
                          compassion, not policy failure.

      - label: Immigration Policy Communicator
        role_key: populist
        tasks:
          - label: Immigration as Political Messaging Tool
            systems:
              - label: Immigration rhetoric escalates in proportion to political need
                decisions:
                  - label: Caravan rhetoric pattern Oct 2018 midterms
                    content: |
                      Oct 2018: Central American migrant caravan approaching US border. Trump elevated to dominant
                      campaign issue for midterm elections. Deployed 5,200 troops to border (Operation Faithful Patriot).
                      After midterms: rhetoric and troop presence diminished. Pattern: immigration enforcement
                      actions escalate before elections and during approval rating dips. The caravan was real but
                      the response magnitude was calibrated to political timing, not security threat level.
                    outputs:
                      - label: Election-cycle immigration prediction
                        content: |
                          Pre-election immigration escalation pattern: begin 60-90 days before election.
                          Indicators: (1) increased Truth Social posts about border, (2) ICE operation announcements,
                          (3) troop deployment to border, (4) rally focus on immigration. Market impact: negligible
                          on broad indices. Sector impact: private prison stocks (GEO, CoreCivic) +5-15% on
                          enforcement escalation.
                      - label: Remain in Mexico policy as deterrence tool
                        content: |
                          MPP (Migrant Protection Protocols) aka Remain in Mexico: implemented Jan 2019. Required
                          asylum seekers to wait in Mexico during processing. Effective deterrent — border encounters
                          dropped significantly. Pattern: prefers deterrence policies that discourage migration over
                          processing policies that manage it. Second term: reinstated immediately. Expanded to more
                          nationalities and locations.
                      - label: DACA as political leverage
                        content: |
                          Sep 2017: Rescinded DACA (Deferred Action for Childhood Arrivals). Offered to restore in
                          exchange for wall funding and immigration reform. Democrats refused the trade. Supreme Court
                          blocked rescission (Jun 2020). Pattern: DACA recipients used as bargaining chips, not targeted
                          for removal. The population is politically sympathetic (brought as children) — attacking them
                          directly has high political cost. Prediction: DACA will be used as leverage for other
                          immigration priorities, not terminated outright.

              - label: Title 42 and public health immigration tools
                decisions:
                  - label: COVID-era immigration restrictions as policy template
                    content: |
                      Mar 2020: Invoked Title 42 public health authority to expel migrants at border without
                      processing. Remained in effect until May 2023 under Biden. Pattern: public health emergency
                      powers as immigration enforcement tool. Second term analog: any public health situation
                      (disease outbreak, pandemic concern) will immediately be leveraged for immigration enforcement.
                      The template exists and has been legally tested.
                    outputs:
                      - label: Public health immigration tool prediction
                        content: |
                          Monitor for: CDC disease alerts, WHO pandemic warnings, or domestic outbreak reports.
                          Any significant public health event → probability of immigration restriction executive
                          order increases to >70% within 2 weeks. The action will be framed as public health
                          protection, not immigration enforcement, to improve legal durability.

          - label: Sanctuary City Confrontation
            systems:
              - label: Federal vs state/local immigration enforcement conflicts
                decisions:
                  - label: Sanctuary city funding threats and enforcement conflicts
                    content: |
                      Repeatedly threatened to withhold federal funding from sanctuary cities. EO 13768 (Jan 2017)
                      attempted to defund sanctuary jurisdictions. Blocked by courts. Pattern: executive action →
                      legal challenge → partial implementation. Considered but rejected sending detained immigrants
                      to sanctuary cities as political punishment (leaked Apr 2019). Second term: renewed sanctuary
                      city confrontation with stronger legal team and more aligned DOJ.
                    outputs:
                      - label: Federal-state immigration conflict prediction
                        content: |
                          Second term escalation likely: DOJ lawsuits against sanctuary jurisdictions, federal
                          law enforcement operations in non-cooperating cities, public naming of non-compliant
                          officials. Market: negligible broad impact. Local government bond markets of targeted
                          cities could face pressure if federal funding is credibly threatened.
                      - label: State attorney general response pattern
                        content: |
                          Blue state AGs will file lawsuits against every immigration executive order — first term
                          pattern was ~20 multi-state lawsuits on immigration alone. Second term: same pattern but
                          more favorable federal judiciary (3 SCOTUS justices + hundreds of lower court appointments).
                          Prediction: more executive orders will survive judicial review compared to first term.
                          Policy implementation rate increases from ~60% to ~80% for immigration actions.

  # ══════════════════════════════════════════════════════════════════
  # PERSONNEL — ADDITIONAL PRECEDENTS
  # ══════════════════════════════════════════════════════════════════

      - label: Appointments Strategist
        role_key: loyalty_enforcer
        tasks:
          - label: Second Term Personnel Doctrine
            systems:
              - label: Loyalty-first selection with Schedule F enabling mass civil service replacements
                decisions:
                  - label: "Schedule F and Political Appointee Expansion"
                    content: |
                      Oct 2020: Executive order creating Schedule F — reclassifying policy-influencing federal
                      employees as at-will (removable without cause). Biden revoked. Second term: reinstated and
                      expanded. Purpose: replace career civil servants who resisted first-term policies with
                      political loyalists. Combined with: Project 2025 personnel database, Heritage Foundation
                      vetting of appointees. Pattern evolution: first term was improvised personnel (leading to
                      "adults in the room" who moderated policy). Second term is systematically designed to prevent
                      internal resistance. Implication: second term policies will be MORE extreme because the
                      moderating influence of independent civil servants is being removed.
                    outputs:
                      - label: Second term execution prediction
                        content: |
                          First term pattern: announce bold policy → career staff slow-walk or modify → partial
                          implementation. Second term pattern: announce bold policy → aligned staff execute rapidly →
                          full implementation. Prediction: discount second term executive actions LESS than first term.
                          If he says it, it's more likely to happen this time. Adjust prediction confidence upward
                          by ~20% for executive branch actions compared to first term baseline.

                  - label: "Bolton to O'Brien: NSA loyalty progression"
                    content: |
                      HR McMaster (Feb 2017 - Apr 2018): experienced general, frequently clashed on Russia, North Korea.
                      Replaced by John Bolton (Apr 2018 - Sep 2019): hawkish, aligned on Iran/North Korea initially,
                      clashed on troop withdrawals and diplomatic approaches. Fired after opposing Taliban talks.
                      Replaced by Robert O'Brien (Sep 2019 - Jan 2021): loyalist, lower profile, fewer clashes.
                      Pattern: each successive appointment in the same role moves toward greater alignment/loyalty.
                      The "learning" is: bold picks cause friction; loyalists reduce drama. Second term: ALL
                      appointments start at the O'Brien end of the spectrum.
                    outputs:
                      - label: Personnel progression prediction
                        content: |
                          For any second term position: the appointee will be more aligned than any first term
                          holder of the same role. Use first term appointee conflicts to predict which positions
                          are most critical for loyalty screening (AG, SecDef, NSA, DHS Secretary, FBI Director).
                          When a high-loyalty appointee is in place → policy execution speed increases in that domain.

      - label: Cabinet Role Pattern Analyst
        role_key: loyalty_enforcer
        tasks:
          - label: Key Cabinet Position Behavior Patterns
            systems:
              - label: How each cabinet role functions under presidential management style
                decisions:
                  - label: Secretary of State role evolution across appointees
                    content: |
                      Tillerson (independent, confrontational) → Pompeo (aligned, effective). The SecState role
                      transformed from traditional diplomatic independence to presidential policy executor. Pompeo
                      model is the template for second term. SecState who publicly diverges from presidential
                      position on any issue → removal within 6 months.
                    outputs:
                      - label: SecState as policy execution signal
                        content: |
                          When SecState makes a public statement → it IS the presidential position (unlike Tillerson
                          era where divergence was common). Use SecState statements as confirmed policy signals.
                          If SecState is silent on an issue → policy is still being decided internally.
                      - label: Defense Secretary management pattern
                        content: |
                          Mattis (revered but independent) → Esper (compliant until wasn't) → second term pick
                          (fully aligned). Pattern: military credentialed SecDef is desired for public legitimacy
                          but independence is not tolerated. Mattis resignation letter (Dec 2018) is the template
                          for what triggers removal: public disagreement with alliance policy. Esper removal (Nov 2020):
                          public disagreement on Insurrection Act deployment.
                      - label: Attorney General as most critical loyalty position
                        content: |
                          Sessions (recused, viewed as betrayal) → Whitaker (acting, loyal placeholder) → Barr
                          (initially aligned, later diverged on election claims). AG is viewed as personal protector,
                          not independent law enforcement head. This is the MOST loyalty-sensitive position in
                          the cabinet. Second term: AG selected specifically for willingness to use DOJ in
                          alignment with presidential priorities. Prediction: DOJ enforcement actions will correlate
                          more closely with presidential statements than in any modern presidency.
                      - label: Treasury Secretary and economic team dynamics
                        content: |
                          Mnuchin: maintained Wall Street credibility while executing tariff policy. Navigated between
                          presidential trade instincts and market expectations. Pattern: Treasury Secretary serves
                          as market-facing interpreter of presidential policy. When Mnuchin spoke after tariff
                          announcements → markets recovered partially (credibility buffer). Second term: Treasury
                          pick will signal whether market-reassurance function is maintained or abandoned.

                  - label: Chief of Staff turnover pattern
                    content: |
                      Priebus (RNC establishment, 6 months) → Kelly (military discipline, 17 months) → Mulvaney
                      (acting, compliant, 14 months) → Meadows (political ally, through end of term). Pattern:
                      establishment picks fail fast, military picks clash on process, political allies survive.
                      Each transition moved toward less independent, more aligned CoS. Second term: CoS will be
                      political ally from day one.
                    outputs:
                      - label: White House staff turnover as policy signal
                        content: |
                          Senior staff departures signal policy direction changes. When a moderate departs → policy
                          shifts toward more aggressive position in their domain. When a hawk departs (Bolton) →
                          policy shifts toward negotiation. Track departures and replacements to predict policy
                          trajectory in specific domains.

          - label: Inspector General and Oversight Resistance
            systems:
              - label: Pattern of removing oversight officials who investigate administration
                decisions:
                  - label: IG firing pattern spring 2020
                    content: |
                      Apr-May 2020: Removed multiple Inspectors General in rapid succession. Intelligence Community
                      IG Michael Atkinson (handled Ukraine whistleblower, fired Apr 3). Acting Defense IG Glenn Fine
                      (overseeing pandemic spending, removed Apr 7). State Dept IG Steve Linick (investigating
                      Pompeo, fired May 15). HHS IG Christi Grimm (issued critical COVID report, reassigned).
                      Pattern: oversight officials who investigate or report unfavorable findings are removed.
                      This is the revenge/reciprocity pattern applied to institutional oversight. The firings
                      were clustered because political cost was concentrated in one period.
                    outputs:
                      - label: Oversight removal prediction
                        content: |
                          When an IG report or whistleblower complaint generates negative coverage → probability of
                          IG removal within 60 days is >50%. Second term: IG positions will be filled with aligned
                          appointees, reducing the need for removals (preventive rather than reactive). Monitor:
                          IG reports critical of administration policy as triggers for personnel action.
                      - label: Whistleblower response pattern
                        content: |
                          Whistleblowers are treated as adversaries, not protected sources: Ukraine whistleblower
                          (demanded identity disclosure), intelligence officials (accused of spying), career staff
                          (threatened with reassignment). Pattern: any internal report that becomes public and
                          causes political damage → source will be targeted. Second term: stronger mechanisms
                          to prevent leaks and punish whistleblowers are being implemented.

  # ══════════════════════════════════════════════════════════════════
  # MEDIA & COMMUNICATIONS — ADDITIONAL PRECEDENTS
  # ══════════════════════════════════════════════════════════════════

      - label: Narrative Architect
        role_key: narrative_controller
        tasks:
          - label: Branding and Labeling Strategy
            systems:
              - label: Assigning sticky labels to opponents that define the narrative frame
                decisions:
                  - label: "Political Branding: Crooked Hillary, Sleepy Joe, DeSanctimonious"
                    content: |
                      Consistent pattern of assigning memorable, diminishing labels to opponents: "Crooked Hillary,"
                      "Low Energy Jeb," "Little Marco," "Lyin' Ted" (later "Beautiful Ted" after submission),
                      "Sleepy Joe," "DeSanctimonious," "Birdbrain" (Haley). Labels stick because they are: (1) short,
                      (2) alliterative or rhythmic, (3) target a perceived weakness, (4) repeated relentlessly.
                      The label becomes the narrative — media and opponents must respond to it, which amplifies it.
                      Pattern: once a label is assigned, it is NEVER retracted. The only evolution is from negative
                      to positive when the opponent submits (Ted Cruz: "Lyin' Ted" → "Beautiful Ted" after endorsement).
                    outputs:
                      - label: Branding as political signal
                        content: |
                          When a new label is assigned → that person is being targeted. The label intensity indicates
                          threat level: creative, repeated labels = serious opponent. Generic criticism = minor nuisance.
                          When label shifts from negative to positive → opponent has submitted and is now an ally.
                          Prediction utility: track label assignments to predict political alliances and conflicts.

          - label: Rally Communication Pattern
            systems:
              - label: Rallies as primary policy communication and political temperature gauge
                decisions:
                  - label: "Rally-to-Policy Pipeline: Testing themes before formal action"
                    content: |
                      Rallies serve as focus groups: new policy ideas introduced as riffs, crowd reaction measured,
                      popular themes get repeated and elevated to formal policy. Example: "drain the swamp" started
                      as rally riff → became formal agenda. "Build the wall" started as rally chant → became
                      signature policy. "Lock her up" stayed as rally chant → never became formal policy (distinction:
                      some rally themes are for entertainment only). Pattern: if a new theme gets strong crowd
                      reaction across 3+ rallies → expect it to become formal policy within 1-3 months.
                    outputs:
                      - label: Rally theme tracking for policy prediction
                        content: |
                          Monitor rally transcripts for: (1) new themes introduced, (2) crowd reaction intensity,
                          (3) repetition across multiple rallies, (4) evolution from vague to specific.
                          When a theme appears at 3+ rallies with strong reaction → it's transitioning from
                          entertainment to policy. Timeline: rally introduction → Truth Social amplification (1-2 weeks) →
                          formal policy action (1-3 months). This is the earliest policy signal available.

      - label: Information Warfare Practitioner
        role_key: narrative_controller
        tasks:
          - label: Conspiracy and Alternative Narrative Deployment
            systems:
              - label: Use of alternative narratives to undermine institutional credibility
                decisions:
                  - label: Birtherism 2011-2016 as prototype narrative campaign
                    content: |
                      2011-2016: Promoted conspiracy theory questioning Obama's birthplace. Despite birth certificate
                      release (Apr 2011), continued questioning until Sep 2016 when acknowledged Obama was born in US.
                      Pattern: alternative narratives serve political purpose regardless of factual basis. Maintained
                      for years, then dropped when no longer useful. The narrative built political capital with base
                      that was spent during the 2016 campaign. This was the PROTOTYPE for later narrative campaigns:
                      election fraud, deep state, witch hunt.
                    outputs:
                      - label: Alternative narrative lifecycle
                        content: |
                          Lifecycle: (1) introduce during period of political need, (2) repeat relentlessly despite
                          contradicting evidence, (3) base adopts as identity marker, (4) drop or evolve when no longer
                          politically useful. Each narrative has a specific political function. Prediction: any new
                          alternative narrative should be analyzed for its political function — what does believing
                          this narrative ACHIEVE for the base? That reveals why it was deployed.
                      - label: Deep state narrative function
                        content: |
                          Deep state narrative (2017-present): frames bureaucratic resistance as conspiracy rather
                          than institutional checks. Function: justifies purging career civil servants and consolidating
                          executive power. Second term application: Schedule F implementation, loyalty-based appointments,
                          DOJ alignment. The narrative prepared the base to accept these actions as necessary reforms
                          rather than power consolidation.
                      - label: Witch hunt framing for legal challenges
                        content: |
                          Every legal investigation framed as political persecution: Mueller investigation = witch hunt,
                          first impeachment = hoax, second impeachment = unconstitutional, criminal indictments =
                          election interference, civil fraud = political hit job. Pattern: legal challenges INCREASE
                          base support rather than decrease it. Each charge is fundraising opportunity and loyalty test.
                          Prediction: any future legal action against Trump or allies will be framed as persecution
                          and will strengthen rather than weaken political position among base.

          - label: Endorsement as Political Currency
            systems:
              - label: Presidential endorsements as kingmaking tool with loyalty expectations
                decisions:
                  - label: Endorsement pattern analysis 2018-2024
                    content: |
                      Track record: endorsed candidates in primary and general elections. Endorsement criteria:
                      (1) loyalty to Trump personally (primary criterion), (2) adoption of key policy positions
                      (immigration, election integrity narrative), (3) electability (secondary, sometimes overridden
                      by loyalty — see Dr. Oz, Herschel Walker). Mixed results: high win rate in primaries (~80%),
                      lower in generals (~55%) because loyalty-first candidates sometimes lack general election appeal.
                    outputs:
                      - label: Endorsement as policy signal
                        content: |
                          When endorsing: watch which policy positions the endorsed candidate is required to adopt.
                          These reveal current priority hierarchy. 2022: election integrity was the primary loyalty test.
                          2024: immigration and tariffs were added. Second term: endorsement requirements signal which
                          policies the administration will prioritize in the next Congress.
                      - label: Endorsement withdrawal as punishment signal
                        content: |
                          Endorsement withdrawal or non-endorsement is severe political punishment in Republican politics.
                          Target loses primary viability. Examples: Mark Sanford (criticized Trump, lost primary),
                          Liz Cheney (impeachment vote, lost primary by 37 points). Prediction: any Republican who
                          publicly opposes a major Trump policy → expect endorsement of primary challenger.

          - label: Clemency and Pardon Patterns
            systems:
              - label: Pardons used as loyalty rewards and political statements
                decisions:
                  - label: First term pardon patterns and political messaging
                    content: |
                      High-profile pardons: Joe Arpaio (immigration hardliner, Aug 2017), Dinesh DSouza (conservative
                      commentator, May 2018), Eddie Gallagher (Navy SEAL war crimes case, Nov 2019), Roger Stone
                      (commuted, then pardoned — political ally), Michael Flynn (pardoned — former NSA), Steve Bannon
                      (pardoned — former chief strategist). Pattern: pardons serve as: (1) loyalty rewards, (2) policy
                      statements (Arpaio = immigration support), (3) political alliance maintenance. Pardons are
                      NOT based on legal merit — they are political tools.
                    outputs:
                      - label: Pardon prediction framework
                        content: |
                          Pardon probability increases when: (1) the individual maintained loyalty during legal
                          proceedings (did not cooperate with prosecutors), (2) the case can be framed as political
                          persecution, (3) the pardon sends a policy message to the base, (4) timing aligns with
                          political need (holidays, news cycle management). Jan 6 defendants: mass pardons/commutations
                          in second term were predicted by this framework — the cases met all four criteria.

  # ══════════════════════════════════════════════════════════════════
  # ECONOMIC & TRADE — MARKET IMPACT PATTERNS
  # ══════════════════════════════════════════════════════════════════

      - label: Market Mover
        role_key: economic_nationalist
        tasks:
          - label: Market-Moving Communication Patterns
            systems:
              - label: Presidential statements that reliably move specific markets
                decisions:
                  - label: "Tweet/Truth Social Market Impact Catalog"
                    content: |
                      Documented market-moving statements by category:
                      TARIFF TWEETS: Avg S&P impact -1.5% to -2.5% on escalation, +0.5% to +1.5% on de-escalation.
                      FED CRITICISM: 2yr Treasury yield moves 3-5bp, USD weakens 0.3-0.5%.
                      COMPANY ATTACKS: Target stock drops 1-5% intraday (Amazon, Boeing, Lockheed, others).
                      PEACE/DEAL ANNOUNCEMENTS: S&P +0.5-1%, VIX -5-10%.
                      MILITARY THREATS: VIX +5-15%, oil +2-5%, gold +1-3%.
                      ELECTION/POLITICAL: Minimal broad market impact, sector rotation only.
                      Pattern: weekend/evening posts cause gap-down/up on Monday/next open. Weekday posts cause
                      intraday volatility. The FIRST post on a topic has the most impact; follow-up posts are
                      diminishing. Market adaptation: impact of similar posts has decreased over time (market learning).
                    outputs:
                      - label: Trading framework for presidential statements
                        content: |
                          Optimal strategy: (1) Monitor Truth Social 6-8 AM ET and 9-11 PM ET (peak posting times),
                          (2) Classify post by category (tariff, military, company, deal), (3) Apply historical
                          average impact as initial estimate, (4) Discount by ~30% for market adaptation (diminishing
                          impact of similar posts over time), (5) Position before formal market hours for gap trades,
                          (6) Fade the move by midday (reversion typical within 24-48 hours for rhetoric-only posts).
                          Exception: posts followed by actual executive action (tariff implementation, sanctions) have
                          lasting impact — do not fade these.

                  - label: "Stock Market as Scorecard: Policy calibrated to market reaction"
                    content: |
                      Views stock market performance as personal scorecard: "Stock market just hit a new record high
                      — AGAIN!" (repeated hundreds of times first term). Consequence: market-negative policies
                      may be moderated or delayed if market reaction is severe enough. Example: May 2019 tariff
                      tweet → market dropped 6% over week → partial walk-back of tariff timeline. Pattern: there
                      is a market-pain threshold (roughly -5% over 1 week) that triggers policy moderation.
                      Below that threshold, market reaction does not affect policy.
                    outputs:
                      - label: Market feedback threshold
                        content: |
                          Market reaction influences policy when: (1) S&P drops >5% within one week of policy
                          announcement, AND (2) media narrative links drop directly to presidential action,
                          AND (3) Republican Congressional allies express concern. All three conditions typically
                          required. Below this threshold, market reaction is acknowledged but does not change course.
                          Trading implication: initial sharp drops on policy announcements may overshoot if they
                          approach the -5% threshold — this is where moderation/walk-back becomes likely.

  # ══════════════════════════════════════════════════════════════════
  # HISTORICAL RECORD
  # ══════════════════════════════════════════════════════════════════
  - label: Historical Record
    roles:
      - label: Pre-Presidency Pattern Analyst
        role_key: dealmaker
        tasks:
          - label: Historical Consistency Assessment
            systems:
              - label: Tracking consistency of positions from 1980s interviews through current term
                decisions:
                  - label: "1980s-2015: Pre-presidential pattern establishment"
                    content: |
                      Remarkably consistent core positions spanning 35+ years:
                      - 1987 (Oprah interview): "I'd make our allies pay for our military protection."
                      - 1988 (Art of the Deal): "When someone screws you, screw them back ten times harder."
                      - 1999 (Larry King): Opposed NAFTA, proposed tariffs on Japan.
                      - 2000 (Reform Party): Proposed one-time 14.25% wealth tax to eliminate national debt.
                      - 2011-2015 (Twitter era): Birtherism, China trade criticism, NATO criticism.
                      Key insight: the core behavioral patterns (economic nationalism, transactional alliances,
                      revenge/reciprocity, personal dealmaking) predate the presidency by decades. They are not
                      political positions adopted for electoral advantage — they are deeply held convictions.
                      This makes them MORE predictable than typical political positions, which shift with polls.
                    outputs:
                      - label: Consistency assessment for prediction confidence
                        content: |
                          High confidence predictions (consistent 30+ years): tariffs/protectionism, alliance burden-sharing,
                          personal dealmaking preference, revenge for perceived slights, strong military but troop-averse.
                          Medium confidence (evolved over time): specific country relationships (Russia stance has shifted),
                          healthcare policy (from single-payer to "repeal and replace"), social issues (evolved rightward).
                          Low confidence (situational): specific personnel choices, crisis response timing, judicial priorities.
                          Use this hierarchy to weight predictions: high-confidence patterns are near-certain; low-confidence
                          areas require more recent data points.

                  - label: Key quotes revealing core decision framework
                    content: |
                      Direct quotes that reveal decision-making principles — useful for pattern matching against
                      new situations. Each quote has been applied consistently across multiple domains.
                    outputs:
                      - label: Art of the Deal negotiation principles
                        content: |
                          "I aim very high, and then I just keep pushing and pushing to get what I'm after."
                          Application: opening positions in any negotiation will be maximalist. The stated demand
                          is never the actual goal — it's the ceiling from which concessions are made.
                          "The worst thing you can possibly do in a deal is seem desperate to make it."
                          Application: walkaway power is real and has been exercised (Hanoi summit, government
                          shutdown, NATO spending). He will endure costs to maintain leverage position.
                          "I like thinking big. If you're going to be thinking anything, you might as well think big."
                          Application: all proposals will be framed in superlatives. Discount by 50-80% for actual scope.
                      - label: Revenge and loyalty philosophy quotes
                        content: |
                          "When someone screws you, screw them back ten times harder." — Art of the Deal.
                          This is not hyperbole. Observed consistently: Rosie ODonnell (decade-long feud over
                          one comment), Jeff Sessions (18 months of public attacks over recusal), John McCain
                          (attacked posthumously for healthcare vote). Prediction: any perceived slight will
                          generate retaliation. Timing is variable; certainty is near-100%.
                          "I value loyalty above everything else — more than brains, more than drive."
                          Application: personnel decisions prioritize loyalty over competence consistently.
                      - label: Economic nationalism foundational statements
                        content: |
                          1987 Oprah interview: "I'd make our allies pay for our military protection. I'd tax
                          foreign imports coming into this country." This predates any political career by 28 years.
                          1988 Larry King: Japan is "ripping us off." Same framing applied to China 30 years later.
                          2015 campaign announcement: "When Mexico sends its people, they're not sending their best."
                          Pattern: the core economic and immigration positions have been stated publicly for 35+ years.
                          They are not electoral calculations — they are foundational beliefs. Prediction confidence
                          on these topics should be 90%+.
                      - label: Military and intervention philosophy quotes
                        content: |
                          "I'm the most militaristic person there is, but I'm also the person that knows when
                          not to use the military." (Multiple interviews, 2015-2016)
                          "I love the military, but I don't want to be in every country." (2018)
                          Application: strong defense budget + reluctance to deploy = carrier posturing,
                          sanctions preference, limited strikes. Full military campaigns are near-impossible
                          to predict because the threshold for commitment is extremely high.
                      - label: Dealmaker identity across domains
                        content: |
                          "I alone can fix it." (RNC acceptance speech, Jul 2016)
                          "Nobody builds walls better than me." (Campaign announcement, Jun 2015)
                          "I know more about ISIS than the generals." (2015)
                          "Nobody knows the system better than me, which is why I alone can fix it." (2016)
                          Pattern: personal agency claim across every domain. Prediction implication: expect personal
                          involvement in any high-profile negotiation or crisis. Delegation happens for operational
                          execution but NOT for the announcement or framing. If it's visible, he's involved.

          - label: Key Relationship Profiles
            systems:
              - label: Documented behavioral patterns with specific foreign leaders
                decisions:
                  - label: Xi Jinping relationship dynamics
                    content: |
                      Personal rapport established at Mar-a-Lago summit (Apr 2017). "We have great chemistry."
                      Pattern: genuine personal respect combined with aggressive trade posture. Never personally
                      insults Xi (contrast with other leaders). Trade war framed as against China the country,
                      not Xi the leader. When needing to pressure China, targets policies/trade balance, preserves
                      personal relationship channel. Exception: COVID blame ("China virus") strained personal
                      channel but not as severely as it strained institutional relationship.
                    outputs:
                      - label: Xi Jinping engagement prediction
                        content: |
                          When China tensions rise: (1) expect tariff/economic action (near-certain), (2) expect
                          preservation of Xi personal channel (highly likely), (3) expect summit attempt to resolve
                          after escalation creates leverage (likely if tension sustains >3 months). Never predict
                          personal insults against Xi — this boundary has been maintained even during maximum pressure.
                      - label: Putin relationship dynamics
                        content: |
                          Personal deference in public settings (Helsinki, bilateral meetings). Never directly
                          criticizes Putin by name. "I get along with Putin very well." But policy actions through
                          staff were often hawkish (sanctions, expulsions, arms to Ukraine). Second term: personnel
                          alignment may resolve this disconnect. Watch: does policy converge toward rhetoric (dovish)
                          or does rhetoric converge toward first-term policy (hawkish)?
                      - label: Kim Jong Un relationship dynamics
                        content: |
                          "We fell in love." (Sep 2018, describing letters exchanged). Unprecedented personal
                          relationship with North Korean dictator. Three summits (Singapore, DMZ, Hanoi). No
                          denuclearization achieved but relationship maintained. Pattern: the relationship IS the
                          achievement. Actual policy outcomes are secondary to the visibility of the diplomatic
                          engagement. Second term: possible re-engagement if Kim provides a visible opportunity.
                      - label: Zelensky relationship dynamics
                        content: |
                          Complex: first impeachment centered on Zelensky call. Second term: Zelensky as counterpart
                          in Ukraine peace negotiations. Pattern: Zelensky moved from "weak" category toward "strong"
                          as war continued and he showed resilience. But Ukraine aid remains transactional leverage.
                          Prediction: Zelensky will be pressured for peace deal concessions, but treated with more
                          respect than pre-war expectations (the war elevated his status in Trump's framework).
                      - label: MBS and Gulf state relationships
                        content: |
                          Saudi Arabia as first foreign trip destination = strategic signal. MBS relationship survived
                          Khashoggi murder without meaningful consequence. Pattern: Gulf states are valued for:
                          (1) oil production cooperation, (2) arms purchases, (3) sovereign wealth fund investments,
                          (4) Iran containment. Human rights concerns have zero weight in this calculation.
                          Prediction: Gulf relationships remain strong, OPEC cooperation likely, arms deals continue.
                      - label: European leader dynamics general pattern
                        content: |
                          Merkel/Scholz (Germany): primary target for trade and defense spending pressure. EU's
                          largest economy = largest trade target. Macron (France): attempted personal relationship,
                          partially successful. France's nuclear/military independence earns some respect. Johnson/UK:
                          Brexit alignment created natural affinity. UK is the preferred bilateral partner in Europe.
                          Pattern: bilateral preferences within Europe, not EU-wide engagement. Post-Brexit UK gets
                          better bilateral treatment than EU member states.

          - label: Prediction Confidence Taxonomy
            systems:
              - label: Framework for weighting predictions by historical consistency
                decisions:
                  - label: Tier 1 near-certain patterns (30+ year consistency)
                    content: |
                      These patterns have been documented across 35+ years of public statements and actions.
                      Prediction confidence: 85-95%.
                      (1) Tariffs as preferred economic tool. (2) Alliance burden-sharing demands.
                      (3) Personal dealmaking preference over institutional channels.
                      (4) Revenge for perceived slights. (5) Loyalty as primary personnel criterion.
                      (6) Reluctance for sustained military deployments. (7) Stock market as scorecard.
                      (8) Immigration hardline. (9) Deregulation preference.
                    outputs:
                      - label: Tier 1 trading implications
                        content: |
                          For Tier 1 patterns, position BEFORE the action — the action is near-certain, only
                          timing is uncertain. Example: new tariffs on any trade partner with a surplus are
                          coming, the question is which country and when. Pre-position with broad tariff
                          exposure hedges. Example: immigration enforcement escalation is coming — pre-position
                          with labor-intensive sector exposure (agriculture, construction, hospitality shorts).
                  - label: Tier 2 probable patterns (evolved but directionally consistent)
                    content: |
                      These patterns are directionally consistent but have evolved in specifics over time.
                      Prediction confidence: 60-80%.
                      (1) Russia/Putin approach (rhetoric consistent, policy evolving). (2) Healthcare
                      (from single-payer to repeal, now drug pricing focused). (3) Crypto/tech (from skeptic
                      to champion based on donor incentives). (4) Specific country targeting (shifts based on
                      trade data and political moment). (5) Bipartisan deal willingness (depends on political
                      calendar and approval ratings).
                    outputs:
                      - label: Tier 2 trading implications
                        content: |
                          For Tier 2 patterns, wait for confirming signals before positioning. Monitor for:
                          (1) Truth Social frequency on the topic (increasing = imminent action), (2) rally
                          theme testing, (3) advisor public statements (aligning = confirming). Position after
                          first signal, before formal action.
                  - label: Tier 3 situational patterns (context-dependent)
                    content: |
                      These depend heavily on specific circumstances and advisors present.
                      Prediction confidence: 40-60%.
                      (1) Crisis response timing. (2) Specific personnel appointments. (3) Judicial priorities.
                      (4) Legislative strategy. (5) International crisis escalation vs de-escalation choice.
                      (6) Second-term legacy focus areas.
                    outputs:
                      - label: Tier 3 trading implications
                        content: |
                          For Tier 3 patterns, do NOT pre-position. React to confirmed signals only. Use options
                          for asymmetric exposure if you have a directional thesis but low confidence.
                          Monitor: multiple independent signals converging on same prediction = upgrade to Tier 2.
