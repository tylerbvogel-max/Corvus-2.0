display_name: "Corvus Poli"
default_port: 8004
description: "Presidential behavioral modeling via neuron graph. Encodes stimulus-response patterns from public data to predict most likely responses to breaking events."
system_use_banner: >-
  Corvus Poli — Presidential Behavioral Analysis System.
  This system models publicly documented decision-making patterns.
  All predictions are probabilistic assessments based on historical precedent.
  Not intended for impersonation, deepfakes, or disinformation.
semantic_prefilter_enabled: true
regulatory_department_name: "Historical Record"
reseed_threshold: 20
baseline_prompt: "You are an analyst specializing in political behavioral pattern recognition and historical precedent analysis."
seed_prompts:
  - label: "Escalation pattern"
    text: "How does the escalation ladder pattern typically manifest in trade policy disputes?"
  - label: "Loyalty test"
    text: "What behavioral signals indicate a loyalty test is being applied to a cabinet appointee?"
  - label: "Media counter-punch"
    text: "Analyze the typical counter-punch response pattern to negative media coverage."
  - label: "Dealmaker framing"
    text: "How does dealmaker framing differ between bilateral trade negotiations and multilateral summits?"
  - label: "Historical precedent"
    text: "What pre-presidency patterns are most predictive of executive decision-making style?"
