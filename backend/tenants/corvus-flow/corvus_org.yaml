# Corvus Plumbing — Trade Knowledge Neuron Graph
# Layer 0: Department, Layer 1: Role, Layer 2: Task Category
# Layer 3: System/Procedure, Layer 4: Decision/Analysis, Layer 5: Output/Deliverable

departments:

  # ══════════════════════════════════════════════
  # DRAIN / WASTE / VENT (DWV)
  # ══════════════════════════════════════════════
  - label: Drain/Waste/Vent
    roles:
      - label: DWV Specialist
        role_key: dwv_specialist
        tasks:
          - label: Diagnose slow or clogged drains
            summary: Identify cause of slow drainage or complete blockage
            systems:
              - label: Visual and auger-based drain diagnosis
                summary: Initial assessment using visual inspection, water flow test, and mechanical snake
                content: |
                  Step 1: Identify affected fixtures — single fixture vs. multiple fixtures indicates local vs. main line blockage.
                  Step 2: Run water and observe — gurgling sounds indicate vent issues; slow drain in one fixture suggests local P-trap or branch blockage.
                  Step 3: Check cleanout access points — locate nearest cleanout downstream of affected fixture.
                  Step 4: Deploy drain snake/auger — 1/4" cable for lavatory, 3/8" for kitchen/tub, 1/2"-3/4" for main line.
                  Step 5: If snake passes freely but drain remains slow, suspect vent blockage or pipe slope issue.
                decisions:
                  - label: Determine if blockage is local, branch, or main line
                    outputs:
                      - label: Drain clearing service report with findings
                        content: |
                          Document: affected fixture(s), location of blockage (distance from cleanout), material retrieved,
                          cable size used, condition of pipe interior (scale, grease, root intrusion). Recommend follow-up
                          if roots found (root treatment program) or if pipe condition warrants camera inspection.
              - label: Camera inspection for drain line assessment
                summary: Video inspection to identify pipe condition, blockage location, and structural issues
                content: |
                  Deploy push camera with sonde transmitter through cleanout. Document: pipe material (cast iron, ABS, PVC,
                  clay, Orangeburg), joint condition, bellies (negative slope sections), root intrusion points, scale buildup,
                  offset joints, cracks, and collapses. Record footage with distance counter. Mark sonde location from surface
                  for excavation reference. Camera sizing: 1" head for 1.5"-3" lines, 2" head for 4"-6" lines.
                decisions:
                  - label: Determine repair method based on camera findings
                    outputs:
                      - label: Camera inspection report with repair recommendations
                        content: |
                          Include: video file reference, pipe material and diameter, defect locations (distance from entry),
                          defect severity rating, recommended repair method (spot repair, full replacement, pipe lining/CIPP,
                          pipe bursting). For bellies: note depth and length — bellies >1" over 10' typically require replacement.
                          For root intrusion: note severity and recommend root treatment frequency.

          - label: DWV system design and sizing
            summary: Design drain, waste, and vent systems for new construction or remodel
            content: |
              Size DWV piping per IPC Table 710.1(2) or UPC Table 7-3 using drainage fixture unit (DFU) method.
              Key sizing rules: minimum pipe size by fixture type (lavatory=1.5", WC=3" minimum, kitchen sink=1.5" or 2"),
              maximum DFU loading per pipe diameter and slope. Branch sizing depends on total connected DFUs.
              Building drain/sewer sizing includes slope factor (1/8", 1/4" per foot).
            systems:
              - label: Fixture unit calculation and pipe sizing
                summary: Calculate DFU loads and select pipe diameters per code tables
                content: |
                  Fixture unit values (IPC Table 709.1): Water closet (flushometer)=6 DFU, Water closet (tank)=4 DFU,
                  Lavatory=1 DFU, Bathtub/shower=2 DFU, Kitchen sink=2 DFU, Clothes washer standpipe=3 DFU,
                  Floor drain=2 DFU, Dishwasher=2 DFU. Maximum DFU per pipe size at 1/4" slope:
                  1.5"=3 DFU, 2"=21 DFU, 3"=42 DFU, 4"=216 DFU, 6"=720 DFU.
                  Horizontal branches: maximum length before increasing diameter depends on DFU load and slope.
                decisions:
                  - label: Select pipe diameter based on total fixture units and slope
                    outputs:
                      - label: DWV sizing schedule with pipe diameters and slopes
                        content: |
                          Produce sizing schedule showing: each branch line (fixtures served, DFU total, pipe size, slope),
                          stack connections, building drain segments, and building sewer. Include cleanout locations per
                          IPC 708 (every 100' in 4"+ pipe, at each direction change >45 degrees, at base of each stack).
              - label: Vent system design and sizing
                summary: Design vent piping to maintain trap seal integrity
                content: |
                  Vent sizing per IPC Table 916.1: based on size of drain served and developed length of vent.
                  Minimum vent size = 1.25" (individual vent for 1.5" drain), never less than half the drain diameter.
                  Vent types: individual vent, common vent, wet vent, circuit vent, combination waste and vent,
                  air admittance valve (AAV — IPC 917, not allowed in all jurisdictions).
                  Critical distances (IPC Table 906.1): max distance from trap weir to vent — 1.5" trap=3.5', 2"=5', 3"=6', 4"=10'.
                decisions:
                  - label: Select vent type and routing based on layout constraints
                    outputs:
                      - label: Vent system layout with type and sizing notations
                        content: |
                          Show vent routing plan with: vent type at each fixture, pipe diameter, connection point to drain,
                          developed length calculation, termination point (through roof or AAV where permitted).
                          Wet vent sections clearly identified with maximum DFU loading noted.

          - label: Sewer line repair and replacement
            summary: Methods for repairing or replacing building drain and sewer lines
            systems:
              - label: Trenchless sewer repair methods
                summary: Pipe lining (CIPP) and pipe bursting as alternatives to excavation
                content: |
                  CIPP (Cured-In-Place Pipe) lining: epoxy-saturated felt liner inverted into existing pipe, inflated, and cured.
                  Suitable for 2"-12" pipe, repairs cracks/joints/minor offsets. Not suitable for collapsed pipe, severe bellies,
                  or back-pitched sections. Reduces internal diameter slightly (typically 1/4" per side).
                  Pipe bursting: pneumatic/hydraulic head pulls new HDPE pipe through old pipe, fracturing it outward.
                  Suitable for same-size or upsized replacement. Requires two access pits. Not suitable where existing
                  pipe has bends >22.5 degrees or where nearby utilities could be damaged by displacement.
              - label: Traditional excavation and replacement
                summary: Open-trench sewer line replacement procedures
                content: |
                  Excavation procedure: locate utilities (call 811 minimum 48 hours before), excavate trench to pipe depth
                  (typically 2'-8' below grade), support trench walls per OSHA 1926 Subpart P (sloping, shoring, or trench box
                  for depths >5'). Remove old pipe, prepare bedding (4"-6" gravel or sand), install new pipe (PVC SDR-35 for
                  gravity sewer, Schedule 40 for pressure), backfill in lifts with compaction. Test per code (IPC 712: water
                  test at 10' head for 15 minutes, or air test at 5 psi for 15 minutes).

      - label: Master Plumber
        role_key: master_plumber
        cross_ref_departments: ["Water Supply", "Gas Piping", "Fixtures & Appliances", "Code Compliance"]
        tasks:
          - label: System troubleshooting and root cause analysis
            summary: Diagnose complex multi-system plumbing problems
            systems:
              - label: Systematic diagnostic approach for intermittent problems
                summary: Methodology for diagnosing issues that come and go
                content: |
                  Intermittent drain gurgling: check vent system — partially blocked vent allows drainage but creates
                  intermittent siphonage of nearby traps. Test by running water in multiple fixtures simultaneously.
                  Intermittent water hammer: check water pressure (should be 40-80 psi per IPC 604.8), inspect for
                  failed water hammer arrestors (ASSE 1010), check washer-type faucets for loose washers.
                  Intermittent sewer odor: smoke test DWV system to find leaks, check trap seal levels (especially
                  floor drains in infrequently-used areas), inspect wax ring seals on water closets.

          - label: Plumbing system design review
            summary: Review plans for code compliance and constructibility
            systems:
              - label: Plan review checklist for residential plumbing
                summary: Key items to verify on residential plumbing plans
                content: |
                  Verify: fixture count and DFU calculations, pipe sizing (supply and DWV), water heater sizing
                  (first-hour rating per IPC Table 607.2 or Manual J), backflow prevention at point of service,
                  water service sizing (per IPC 604.3 / AWWA M22), gas piping sizing if applicable,
                  cleanout locations and accessibility, vent termination heights and setbacks (IPC 903.1: 6" above roof,
                  10' from any openable window/air intake), fixture spacing and clearances (IPC 405).

      - label: Apprentice
        role_key: apprentice
        tasks:
          - label: Learn DWV fundamentals
            summary: Core knowledge for apprentice plumbers in drain/waste/vent work
            systems:
              - label: DWV fitting identification and proper use
                summary: Common DWV fittings and when to use each type
                content: |
                  Sanitary tee: used for horizontal-to-vertical connections on drain lines (branch entry into stack).
                  NEVER use for horizontal-to-horizontal — use wye + 1/8 bend instead to maintain proper flow pattern.
                  Long-turn 90 (1/4 bend): preferred for changes in direction in drainage — sweeps waste through turn.
                  Short-turn 90: ONLY for vent piping, never for drainage. Combo (combination wye-bend): horizontal
                  branch to horizontal drain connection — most common fitting for branch-to-main transitions.
                  Cleanout adapter: install at base of every stack, at every direction change >45 degrees.
              - label: Pipe joining methods by material
                summary: How to join ABS, PVC, cast iron, and copper DWV pipe
                content: |
                  ABS: solvent weld only (yellow cement per ASTM D2235). Apply primer? ABS does not require primer
                  (some jurisdictions require it — check local amendments). PVC DWV: purple primer required (ASTM F656),
                  then clear or gray cement (ASTM D2564). Cast iron: no-hub couplings (neoprene gasket + stainless band clamp)
                  for no-hub pipe; lead and oakum for hub-and-spigot (rarely used in new construction). Copper DWV: solder
                  joints using lead-free solder (ASTM B828 procedure). Transition couplings: Fernco/Mission bands for
                  joining dissimilar materials — per IPC 705.5.3 must be accessible.

  # ══════════════════════════════════════════════
  # WATER SUPPLY
  # ══════════════════════════════════════════════
  - label: Water Supply
    roles:
      - label: Water Supply Specialist
        role_key: water_supply_specialist
        tasks:
          - label: Diagnose low water pressure
            summary: Identify and resolve causes of reduced water pressure
            content: |
              Acceptable range: 40-80 psi at any fixture (IPC 604.8). Below 40 psi requires booster pump.
              Above 80 psi requires pressure reducing valve (PRV). Common causes of low pressure: partially closed
              main shutoff, failing PRV, galvanized pipe corrosion (internal buildup), undersized service line,
              multiple simultaneous demands exceeding supply capacity.
            systems:
              - label: Pressure testing and flow analysis
                summary: Measure static and dynamic pressure to isolate cause
                content: |
                  Static pressure test: attach gauge at hose bib nearest meter with all fixtures closed.
                  Record pressure — compare to street pressure (contact water utility). If street pressure is adequate
                  but house pressure is low, problem is between meter and house (service line or PRV).
                  Dynamic pressure test: open fixtures progressively and record pressure drop.
                  >20% drop suggests undersized piping or restriction. Flow test: measure GPM at fixtures
                  and compare to minimum requirements (IPC Table 604.3: lavatory=2 GPM, shower=2.5 GPM, kitchen=2.5 GPM).
                decisions:
                  - label: Determine if issue is supply-side, distribution, or fixture-level
                    outputs:
                      - label: Pressure test report with corrective action plan
                        content: |
                          Document: static pressure (at meter and at building), dynamic pressure at key fixtures,
                          flow rates measured, pipe material and diameter observations. Recommendation: PRV adjustment/replacement
                          if pressure drops across PRV, service line replacement if galvanized with internal corrosion,
                          fixture aerator/cartridge replacement if pressure loss is fixture-specific.

          - label: Water supply system design and sizing
            summary: Design potable water distribution for residential and commercial
            content: |
              Size per IPC Section 604.3 using Water Supply Fixture Unit (WSFU) method.
              Steps: (1) determine total WSFU demand, (2) convert to GPM (IPC Table E103.3(3)),
              (3) account for available pressure, (4) calculate friction loss through fittings and pipe,
              (5) select pipe diameter that provides adequate flow at minimum required pressure.
            systems:
              - label: Water supply fixture unit calculations
                summary: WSFU values and demand conversion
                content: |
                  WSFU values (IPC Table 604.3): Lavatory (private)=1.0, Water closet (tank, 1.6 GPF)=2.5,
                  Bathtub/shower=4.0, Kitchen sink (residential)=1.4, Dishwasher=1.4, Clothes washer=4.0,
                  Hose bibb=2.5. Total WSFU → GPM conversion follows probability curve accounting for
                  diversity of use. Size pipe to deliver required GPM with friction loss + static head
                  not exceeding available pressure. Minimum sizes: 3/4" main, 1/2" branch to fixtures.
                decisions:
                  - label: Select pipe material and diameter for supply branches and mains
                    outputs:
                      - label: Water supply sizing schedule
                        content: |
                          Produce pipe sizing table: each segment from meter to furthest fixture showing
                          WSFU served, equivalent GPM demand, pipe diameter, pipe material, friction loss per 100',
                          total pressure available at fixture. Verify minimum 8 psi residual at highest/most remote fixture.

          - label: Water heater installation and service
            summary: Install, maintain, and troubleshoot storage and tankless water heaters
            systems:
              - label: Water heater sizing and selection
                summary: Size water heater based on demand and recovery rate
                content: |
                  Storage tank sizing: use first-hour rating (FHR) method per IPC Table 607.2.
                  Calculate peak hour demand: count fixtures likely used in peak hour, sum GPM requirements.
                  Match to water heater FHR within 2 gallons. Common residential sizes:
                  1-2 people=30-40 gal, 2-3 people=40-50 gal, 3-5 people=50-80 gal.
                  Tankless sizing: determine required temperature rise (incoming temp to 120°F),
                  sum simultaneous GPM demand — select unit rated for that flow at that rise.
                  Energy factor (UEF) comparison: tank gas=0.60-0.70, tank electric=0.92-0.95,
                  tankless gas=0.82-0.97, heat pump=2.0-3.5.
              - label: Water heater installation requirements
                summary: Code requirements for water heater installation
                content: |
                  Per IPC 607: T&P relief valve required (ASSE 1016 listed), discharged to within 6" of floor
                  or to approved receptor — never capped, reduced, or threaded on discharge end.
                  Expansion tank required on closed systems (check valve or PRV on supply).
                  Seismic strapping required in seismic zones (2 straps: upper 1/3 and lower 1/3).
                  Gas water heaters: FVIR compliant, proper venting (natural draft, power vent, or direct vent),
                  combustion air per IFGC/IPC 607. Electric: dedicated circuit per NEC, disconnect within sight.
                  Minimum clearances per manufacturer and code. Drain pan required when damage could result from leak.
                decisions:
                  - label: Choose water heater type based on demand, fuel, and space constraints
                    outputs:
                      - label: Water heater recommendation with sizing justification
                        content: |
                          Document: peak hour demand calculation, recommended unit (make/model/capacity),
                          fuel type justification, installation requirements (venting, electrical, gas line sizing),
                          estimated annual operating cost comparison, required permits.

      - label: Backflow Prevention Technician
        role_key: backflow_tech
        cross_ref_departments: ["Code Compliance"]
        tasks:
          - label: Backflow prevention device selection and testing
            summary: Select, install, and annually test backflow prevention assemblies
            content: |
              Backflow prevention required per IPC Section 608 wherever a cross-connection could exist.
              Device selection based on degree of hazard: low hazard (backpressure/backsiphonage) = dual check,
              high hazard (health hazard) = reduced pressure zone (RPZ), atmospheric vacuum breaker (AVB) for
              non-pressurized applications, pressure vacuum breaker (PVB) for irrigation.
            systems:
              - label: Backflow device selection by hazard level
                summary: Match device type to cross-connection hazard per IPC Table 608.1
                content: |
                  High hazard (health risk — IPC 608.13.1-7): RPZ (ASSE 1013) required. Applications:
                  chemical feed systems, medical/dental facilities, irrigation with chemical injection, boilers
                  with chemical treatment, fire sprinkler systems with antifreeze or chemical additives.
                  Low hazard (non-health — IPC 608.13.8): double check valve assembly (DCVA, ASSE 1015).
                  Applications: fire sprinkler systems (no chemicals), irrigation (no injection), boilers
                  without chemical treatment. Atmospheric vacuum breaker (ASSE 1001): hose bibb applications,
                  must be 6" above highest downstream point, no continuous pressure >12 hours.
              - label: Annual backflow test procedure
                summary: Test procedure for RPZ, DCVA, PVB assemblies per ASSE standards
                content: |
                  RPZ test: (1) close downstream shutoff, (2) install test gauge kit, (3) test #1 check valve
                  (must hold 1 psi minimum), (4) test #2 check valve (must hold 1 psi minimum), (5) test relief
                  valve — must open before check valve differential drops below 2 psi. DCVA test: both check
                  valves must hold 1 psi minimum. PVB test: check valve must hold 1 psi, air inlet must open
                  when pressure drops 1 psi below inlet. Document results on state-approved test form.
                  Submit to water purveyor within required timeframe (typically 10 days).

  # ══════════════════════════════════════════════
  # GAS PIPING
  # ══════════════════════════════════════════════
  - label: Gas Piping
    roles:
      - label: Gas Fitter
        role_key: gas_fitter
        tasks:
          - label: Gas piping sizing and design
            summary: Size natural gas and LP piping systems
            content: |
              Size per IFGC/NFPA 54 using longest-length method or branch-length method.
              Key inputs: total connected BTU load, specific gravity of gas (NG=0.60, LP=1.50),
              inlet pressure (typically 7" WC for NG residential), allowable pressure drop (typically 0.5" WC),
              pipe material (black steel, CSST, copper, PE for underground).
            systems:
              - label: Gas pipe sizing calculations
                summary: BTU load calculation and pipe size selection per IFGC tables
                content: |
                  Step 1: List all gas appliances and their BTU input ratings (from nameplate or specs).
                  Common ratings: furnace=40,000-120,000, water heater=30,000-75,000, range=65,000,
                  dryer=22,000-35,000, fireplace=20,000-60,000.
                  Step 2: Determine longest run from meter to furthest appliance.
                  Step 3: Use IFGC Table 402.4 (Schedule 40 steel) or appropriate table for pipe material.
                  Look up capacity at your longest length — pipe must carry total BTU of all downstream appliances.
                  Size each segment for cumulative BTU demand. CSST sizing uses manufacturer's tables — varies by brand.
                decisions:
                  - label: Select pipe material and diameter for each segment
                    outputs:
                      - label: Gas piping sizing schedule with BTU loads
                        content: |
                          Produce: gas piping isometric or plan with each segment labeled — BTU demand served,
                          pipe diameter, pipe material, length. Include: meter location, regulator location,
                          drip legs at each appliance connection, shutoff valve locations, union/disconnect
                          requirements. Note: CSST requires bonding per IFGC 310.1.1.

          - label: Gas leak detection and repair
            summary: Detect, locate, and repair gas leaks safely
            systems:
              - label: Gas leak detection procedures
                summary: Methods for finding gas leaks in piping systems
                content: |
                  NEVER use open flame to detect gas leaks. Methods: (1) Electronic combustible gas detector
                  (most sensitive, required for survey work), (2) Soap bubble solution (spray on joints, watch
                  for bubbles — use manufacturer-approved leak detection fluid, not household soap),
                  (3) Pressure test: isolate system, pressurize with air to test pressure per code
                  (IFGC 406.4: 3 psi for 10 minutes minimum for new piping, undiluted gas at operating pressure
                  for existing systems). Check gauge for any drop — 0 drop = pass.
                  If gas odor detected indoors: evacuate building, do not operate electrical switches,
                  call gas company from outside. Do not re-enter until cleared by gas company or fire department.
                decisions:
                  - label: Determine repair method based on leak location and severity
                    outputs:
                      - label: Gas leak repair report
                        content: |
                          Document: leak location, detection method, pipe material and size, repair performed
                          (joint re-tightened, fitting replaced, section replaced), post-repair pressure test
                          results, gas company notification if required. Include appliance relight verification.

          - label: Gas appliance venting
            summary: Design and install venting for gas-fired appliances
            systems:
              - label: Vent sizing and material selection
                summary: Size and select venting per IFGC Chapter 5 / NFPA 54
                content: |
                  Vent categories: Category I (non-positive, non-condensing — natural draft), Category II
                  (non-positive, condensing — rare), Category III (positive, non-condensing — fan-assisted),
                  Category IV (positive, condensing — high-efficiency). Material requirements:
                  Category I: Type B vent, single-wall metal (with clearances), or masonry chimney with liner.
                  Category III: AL29-4C stainless or listed vent system. Category IV: PVC/CPVC Schedule 40
                  (most common for high-efficiency furnaces and water heaters).
                  Sizing: use IFGC vent tables — input BTU, vent height, lateral length, connector rise.
                  Common cause of CO problems: undersized vent, blocked vent, negative pressure from exhaust fans.

      - label: Fire Suppression Specialist
        role_key: fire_suppression
        cross_ref_departments: ["Water Supply", "Code Compliance"]
        tasks:
          - label: Residential fire sprinkler systems
            summary: Design and install residential fire sprinkler systems per NFPA 13D
            systems:
              - label: NFPA 13D system design basics
                summary: Residential sprinkler design criteria
                content: |
                  NFPA 13D covers one- and two-family dwellings and manufactured homes.
                  Design criteria: 2 sprinklers flowing simultaneously (most remote pair), minimum 7 psi at
                  most remote head, duration = 10 minutes minimum. Multipurpose systems allowed (combined
                  domestic/fire supply). Pipe sizing per NFPA 13D hydraulic calculation or pipe schedule method.
                  Head spacing: per manufacturer listing, typically 12'-16' coverage diameter. Heads required in
                  all areas except bathrooms <55 sq ft, closets, garages (some jurisdictions), attics, porches.
                  Obstruction rules: 18" clearance below deflector to top of storage.

  # ══════════════════════════════════════════════
  # FIXTURES & APPLIANCES
  # ══════════════════════════════════════════════
  - label: Fixtures & Appliances
    roles:
      - label: Fixture Technician
        role_key: fixture_tech
        tasks:
          - label: Toilet diagnosis and repair
            summary: Diagnose and repair common water closet problems
            systems:
              - label: Running toilet diagnosis
                summary: Identify cause of continuously running toilet
                content: |
                  Common causes in order of likelihood: (1) Flapper worn/warped — not seating properly on flush
                  valve seat, allows water to leak from tank to bowl. Test: add food coloring to tank, wait 15 min,
                  check bowl for color. (2) Fill valve not shutting off — water level exceeds overflow tube, drains
                  to bowl. Adjust float or replace fill valve. (3) Flush valve seat corroded/pitted — flapper cannot
                  seal even when new. Sand seat with emery cloth or replace flush valve. (4) Overflow tube cracked —
                  water leaks down inside of tube. Replace flush valve assembly. Tank-to-bowl bolts: check for leaks
                  at bolt gaskets — tighten or replace. Wax ring failure: water at base of toilet, sewer odor —
                  pull toilet, replace wax ring (or use wax-free gasket), check flange condition.
                decisions:
                  - label: Determine repair vs. replacement based on age and condition
                    outputs:
                      - label: Toilet repair recommendation
                        content: |
                          If toilet is pre-1994 (>3.5 GPF), recommend replacement with 1.28 GPF WaterSense model
                          for water savings and possible utility rebate. If post-1994 but parts degraded, replace
                          fill valve and flapper (~$20 parts, 30 min labor). If flange is broken or below floor
                          level, repair flange before reinstalling (flange repair ring or full replacement).

          - label: Faucet repair and replacement
            summary: Diagnose leaking faucets and replace fixtures
            systems:
              - label: Faucet types and repair procedures
                summary: Identify faucet type and repair accordingly
                content: |
                  Four types: (1) Compression (washer) — oldest type, two handles. Repair: replace stem washer
                  and seat. (2) Ball — single handle, ball mechanism (Delta-style). Repair: replace springs,
                  seats, and ball. Use repair kit specific to model. (3) Cartridge — single or double handle,
                  cylindrical cartridge. Repair: pull and replace cartridge (Moen 1225 is most common residential).
                  (4) Ceramic disc — single handle, wide cylinder. Repair: replace disc cartridge or clean seals.
                  Most modern faucets: replacement cartridge is the standard repair. Important: shut off supply
                  valves before disassembly. If supply valves are gate valves that don't fully shut off, replace
                  with quarter-turn ball valves during the repair.

          - label: Fixture installation and clearances
            summary: Install plumbing fixtures per code requirements
            systems:
              - label: Fixture clearance and spacing requirements
                summary: Minimum clearances per IPC Section 405
                content: |
                  Water closet: 15" minimum from center to side wall/obstruction (IPC 405.3.1), 21" clear
                  space in front (IPC 405.3.1). Recommended: 18" center to wall for comfort. Lavatory: 4"
                  minimum from side wall (IPC 405.3.1), 21" clear in front. Shower: minimum 30"x30" interior
                  (IPC 408.6), 24" clear opening. Bathtub: access panel required for concealed piping connections.
                  ADA requirements (where applicable): WC 18" center to side wall, 60"x56" clear floor space,
                  grab bars at specific heights and lengths per ICC A117.1.

      - label: Homeowner
        role_key: homeowner
        tasks:
          - label: Basic plumbing maintenance
            summary: Preventive maintenance homeowners can perform
            systems:
              - label: Seasonal plumbing maintenance checklist
                summary: Tasks to perform quarterly/annually to prevent plumbing emergencies
                content: |
                  Quarterly: (1) Test T&P relief valve on water heater — lift lever, verify water flows, lever
                  snaps back. If it doesn't release or drips after, replace the valve. (2) Check under all sinks
                  for leaks — look for water stains, mold, warped cabinet floor. (3) Run water in infrequently
                  used fixtures to maintain trap seals (floor drains, guest bathrooms).
                  Annually: (1) Flush water heater — connect hose to drain valve, flush until clear to remove
                  sediment. (2) Inspect visible supply lines (washing machine hoses, toilet supply lines) —
                  replace rubber hoses with braided stainless every 5 years. (3) Check outdoor hose bibbs for
                  drips and winterize before first freeze (disconnect hoses, close interior shutoff if frost-proof
                  type, or install insulated cover). (4) Locate and test main water shutoff valve — exercise
                  it annually so it doesn't seize.
          - label: When to call a plumber vs. DIY
            summary: Help homeowners understand what they can safely do themselves
            systems:
              - label: DIY safety guidelines
                summary: Which plumbing tasks are safe for homeowners
                content: |
                  Safe DIY: replacing toilet flapper/fill valve, replacing faucet cartridge, replacing shower head,
                  clearing simple drain clogs (plunger, hand snake), replacing garbage disposal, replacing
                  washing machine hoses, fixing running toilet. Call a plumber: anything involving gas piping,
                  sewer line work, water heater installation, new pipe installation, frozen pipe thawing (risk of
                  pipe burst), slab leak detection/repair, backflow device testing, any work requiring a permit.
                  NEVER: use chemical drain cleaners repeatedly (damages pipes), overtighten plastic fittings,
                  use lead solder on potable water lines, connect dissimilar metals without dielectric unions.

  # ══════════════════════════════════════════════
  # CODE COMPLIANCE
  # ══════════════════════════════════════════════
  - label: Code Compliance
    roles:
      - label: Plumbing Inspector
        role_key: inspector
        cross_ref_departments: ["Drain/Waste/Vent", "Water Supply", "Gas Piping", "Fixtures & Appliances"]
        tasks:
          - label: Rough-in inspection
            summary: Inspect concealed plumbing before walls are closed
            systems:
              - label: Rough-in inspection checklist
                summary: Complete checklist for rough plumbing inspection
                content: |
                  DWV: (1) All joints properly made (solvent weld, mechanical, etc.), (2) Proper fittings used
                  (no short-turn 90s on drainage), (3) Pipe slope verified (1/4" per foot for 3" and smaller,
                  1/8" per foot for 4" and larger), (4) Vent sizes adequate and properly connected, (5) Cleanouts
                  at required locations, (6) Test plugs installed for pressure/water test, (7) No S-traps
                  (must be P-trap with proper vent), (8) Proper fire-stopping at penetrations.
                  Water supply: (1) Pipe material approved (copper, PEX, CPVC per local code), (2) Support
                  spacing correct (copper 6' horizontal/10' vertical, PEX 32" horizontal), (3) Hot/cold properly
                  positioned (hot on left per code), (4) Anti-scald protection at showers (thermostatic mixing
                  valve or pressure-balanced valve per IPC 424.3), (5) Expansion tank if required.
                  Testing: Water test DWV system — fill to highest opening, maintain for 15 minutes minimum,
                  no leaks allowed. Pressure test supply — typically 100 psi for 15 minutes (per local requirements).
                decisions:
                  - label: Pass, fail, or conditional pass based on findings
                    outputs:
                      - label: Rough-in inspection report
                        content: |
                          Document: inspection date, permit number, inspector ID, items inspected, test method
                          and results, deficiencies found (with code section reference), correction required,
                          reinspection required (yes/no). Common failure items: missing cleanouts, wrong fittings,
                          inadequate slope, missing fire-stopping, failed pressure test.

          - label: Final inspection
            summary: Inspect completed plumbing system before occupancy
            systems:
              - label: Final inspection checklist
                summary: Complete checklist for final plumbing inspection
                content: |
                  Fixtures: (1) All fixtures installed and operational, (2) Proper trim and escutcheons,
                  (3) No leaks at supply connections or drain connections, (4) Anti-scald valves verified at
                  showers (max 120°F per IPC 607.1), (5) Fixture mounting secure, (6) Clearances met (IPC 405).
                  Water heater: (1) T&P valve installed and properly discharged, (2) Expansion tank if closed
                  system, (3) Seismic strapping if required, (4) Gas venting correct (draft test), (5) Drain pan
                  if required. Exterior: (1) Backflow prevention at service (if required), (2) Hose bibb vacuum
                  breakers, (3) Vent terminations correct height and setback, (4) Cleanout access exterior.

          - label: Permit requirements and process
            summary: When permits are required and how to obtain them
            systems:
              - label: Permit requirement guide
                summary: Which plumbing work requires a permit
                content: |
                  Typically requires permit: new construction, additions, water heater replacement (most jurisdictions),
                  sewer line replacement/repair, re-pipe (supply or DWV), gas line installation or modification,
                  new fixture installation (not like-for-like replacement), backflow device installation,
                  fire sprinkler systems. Typically does NOT require permit: like-for-like fixture replacement
                  (faucet, toilet, garbage disposal), minor repairs (washers, cartridges, flappers), clearing
                  drain clogs, replacing supply lines/stops. Varies by jurisdiction — always check local requirements.
                  Process: (1) Submit application with scope of work, (2) Provide plans if required (typically for
                  new construction or significant alterations), (3) Pay permit fee, (4) Schedule inspections at
                  required stages, (5) Receive final approval/certificate of completion.

      - label: IPC Code Specialist
        role_key: ipc
        tasks:
          - label: IPC code interpretation and application
            summary: Interpret and apply International Plumbing Code requirements
            systems:
              - label: IPC Section 604 — Water supply and distribution
                summary: Water supply sizing and pressure requirements
                content: |
                  IPC 604.1: All water supply pipe sizing must be in accordance with Section 604.3 (WSFU method).
                  IPC 604.3: Size using procedures in Appendix E — based on available pressure, developed pipe length,
                  elevation, fixture units. IPC 604.8: Maximum water pressure = 80 psi (PRV required above).
                  IPC 604.8.1: Minimum water pressure = 8 psi at highest fixture. If water pressure exceeds 80 psi
                  at any time, a pressure reducing valve is required. Thermal expansion must be controlled when
                  PRV is installed (IPC 607.3.2).
              - label: IPC Section 608 — Backflow protection
                summary: Cross-connection control and backflow prevention requirements
                content: |
                  IPC 608.1: A potable water supply system shall be designed, installed, and maintained so as to prevent
                  contamination from nonpotable liquids, solids, or gases. IPC 608.13: Specific backflow devices by
                  application — Table 608.1 maps hazard levels to acceptable device types. Air gaps (ASME A112.1.2)
                  are the most reliable form. RPZ assemblies (ASSE 1013) for high-hazard continuous pressure.
                  Annual testing required for RPZ, DCVA, PVB, and SPVB assemblies. Test reports submitted to
                  water purveyor per IPC 608.17.
              - label: IPC Section 710 — Drainage system
                summary: Drain pipe sizing and slope requirements
                content: |
                  IPC 710.1(1): Maximum DFU loading for building drains and sewers by diameter and slope.
                  IPC 710.1(2): Maximum DFU loading for horizontal fixture branches and stacks.
                  Minimum slopes: 1/4" per foot for pipe 3" and smaller, 1/8" per foot for pipe 4" and larger.
                  Building sewer: minimum 4" diameter from building to public sewer (IPC 710.2).
                  No drainage pipe shall be smaller than the trap arm it serves.

      - label: UPC Code Specialist
        role_key: upc
        tasks:
          - label: UPC code interpretation and application
            summary: Interpret and apply Uniform Plumbing Code requirements
            systems:
              - label: Key UPC differences from IPC
                summary: Notable areas where UPC and IPC diverge
                content: |
                  UPC is adopted primarily in western US states (CA, WA, OR, etc.) while IPC covers most other states.
                  Key differences: (1) Wet venting — IPC allows more liberal wet venting (Section 912), UPC is more
                  restrictive. (2) Air admittance valves — IPC allows (Section 917), UPC historically did not
                  (2021 UPC added limited allowance). (3) S-traps — both codes prohibit, but UPC defines trap arm
                  length limits differently. (4) Fixture unit values — slightly different tables between codes.
                  (5) Pipe support spacing — some differences in horizontal/vertical support requirements.
                  (6) UPC requires all plumbing work to be performed by licensed plumbers (homeowner exemptions vary).
                  Always verify which code edition and local amendments apply in your jurisdiction.

      - label: NFPA Specialist
        role_key: nfpa
        cross_ref_departments: ["Gas Piping", "Water Supply"]
        tasks:
          - label: NFPA 54 / IFGC gas code requirements
            summary: Fuel gas code requirements for piping, venting, and appliances
            systems:
              - label: NFPA 54 key provisions
                summary: Critical gas code requirements
                content: |
                  NFPA 54 (National Fuel Gas Code) / IFGC Chapter 4: Pipe sizing by longest-length or
                  branch-length method. Approved materials: black steel (ASTM A53), CSST (listed and labeled),
                  copper (Type K or L, joints brazed with BCuP alloys — no soft solder on gas), PE pipe
                  (exterior underground only, per ASTM D2513). CSST bonding: IFGC 310.1.1 requires bonding
                  to grounding electrode system. Testing: 3 psi minimum for 10 minutes (IFGC 406.4) for new
                  installations. Drip legs: required at each appliance connection — 3" minimum (full-size tee
                  with capped nipple). Shutoff valves: within 6' of each appliance, accessible.

      - label: EPA Regulations Specialist
        role_key: epa_regulations
        cross_ref_departments: ["Water Supply", "Fixtures & Appliances"]
        tasks:
          - label: Lead-free and safe drinking water requirements
            summary: EPA lead-free rules and Safe Drinking Water Act compliance
            systems:
              - label: EPA Section 1417 — Lead-free requirements
                summary: Lead-free requirements for potable water system components
                content: |
                  Safe Drinking Water Act Section 1417 (amended 2014): "Lead-free" means ≤0.25% weighted average
                  lead content for wetted surfaces of pipes, fittings, and fixtures, and ≤0.2% lead for solder and flux.
                  Applies to: any pipe, fitting, fixture, or solder used in potable water systems. Includes faucets,
                  valves, and water meters. NSF/ANSI 61 and NSF/ANSI 372 certification required. Pre-2014 installations:
                  lead solder was banned in 1986 but "lead-free" was defined as ≤8% until 2014 amendment.
                  For pre-1986 homes with lead solder: recommend testing water for lead levels, consider
                  point-of-use filtration (NSF 53 certified for lead reduction), or full re-pipe if levels exceed
                  EPA action level of 15 ppb.

      - label: OSHA Plumbing Safety Specialist
        role_key: osha_plumbing
        cross_ref_departments: ["Drain/Waste/Vent", "Estimating & Business"]
        tasks:
          - label: Jobsite safety requirements for plumbing work
            summary: OSHA requirements applicable to plumbing contractors
            systems:
              - label: Key OSHA requirements for plumbing contractors
                summary: Most relevant OSHA standards for plumbing work
                content: |
                  29 CFR 1926 Subpart P — Excavation: trenches 5'+ deep require protective system (sloping,
                  shoring, or trench box). Competent person must inspect daily. Access/egress within 25' of travel
                  in trenches 4'+ deep. 29 CFR 1926 Subpart X — Stairways and ladders (working at heights).
                  29 CFR 1910.1200 — HazCom: SDS required for all chemicals on site (solvents, adhesives, fluxes).
                  29 CFR 1926.651 — Underground utility locating required before excavation.
                  29 CFR 1910.134 — Respiratory protection for confined space entry (sewer work).
                  29 CFR 1910.146 — Permit-required confined spaces (manholes, large underground vaults).
                  Silica rule (1926.1153): if cutting cast iron or concrete, respirable silica exposure limits apply.

      - label: State Amendments Specialist
        role_key: state_amendments
        tasks:
          - label: Common state-level code amendments
            summary: Notable state amendments to IPC and UPC
            systems:
              - label: State amendment awareness
                summary: Important state-specific variations from model codes
                content: |
                  States adopt IPC or UPC as a base code but commonly amend. Examples of critical amendments:
                  California: CPC (California Plumbing Code, based on UPC) adds seismic requirements, water
                  conservation mandates (CALGreen), and specific reclaimed water provisions.
                  Massachusetts: 248 CMR (independent code, not IPC or UPC) — unique requirements.
                  Texas: IPC-based with amendments — allows PEX everywhere (some earlier editions restricted it).
                  Florida: FPC (Florida Plumbing Code, based on IPC) — adds hurricane-resistant vent caps,
                  specific septic setback distances. Wisconsin: state plumbing code (Comm 81-87) predates both
                  model codes and has unique provisions. ALWAYS verify local jurisdiction — city/county may add
                  further amendments on top of state code. When in doubt, call the local building department.

  # ══════════════════════════════════════════════
  # ESTIMATING & BUSINESS
  # ══════════════════════════════════════════════
  - label: Estimating & Business
    roles:
      - label: Plumbing Estimator
        role_key: estimator
        tasks:
          - label: Residential plumbing estimating
            summary: Estimate costs for residential plumbing projects
            systems:
              - label: Rough-in estimating method
                summary: Estimate new construction rough-in plumbing
                content: |
                  Method: count fixtures, apply per-fixture rough-in cost (includes proportional share of
                  main line, branch piping, fittings, hangers, testing). Typical per-fixture rough-in cost ranges
                  (materials + labor, varies by market): Bathroom group (WC+lav+tub/shower)=$2,500-$4,500,
                  Kitchen sink=$800-$1,500, Laundry=$600-$1,000, Hose bibb=$200-$400, Water heater (install
                  only)=$800-$1,800. Adjust for: pipe material (copper adds 20-40% vs PEX), multi-story
                  (add 10-15% per floor above first), crawlspace vs. slab (slab adds 15-25% for trenching),
                  complexity of layout, local labor rates. Always separate: permit fees, fixture costs (allowance
                  or specified), specialty items (water treatment, recirculation pump, etc.).
              - label: Service call estimating
                summary: Price service/repair work
                content: |
                  Common pricing models: (1) Time and materials — hourly rate ($85-$175/hr typical) + materials
                  at cost + markup (20-50%). Best for unknown scope. (2) Flat rate — published price per task
                  from flat rate pricing book (e.g., Pricebooks.com, Service Titan). Better for customer
                  transparency and profit consistency. (3) Diagnostic fee — charge $49-$150 for initial
                  diagnostic, applied to repair if customer proceeds. Include: travel time/fuel charge,
                  minimum call charge (typically 1 hour), after-hours/weekend premium (1.5x-2x).
                decisions:
                  - label: Select pricing model based on job type and customer expectations
                    outputs:
                      - label: Service estimate with itemized breakdown
                        content: |
                          Provide: description of work, materials list with costs, labor hours estimated,
                          flat rate or T&M total, warranty terms (typically 1 year labor, manufacturer warranty
                          on parts), payment terms, permit fees if applicable, exclusions clearly stated.

      - label: Dispatcher
        role_key: dispatcher
        tasks:
          - label: Service call triage and scheduling
            summary: Prioritize and schedule plumbing service calls
            systems:
              - label: Call triage priority system
                summary: Categorize incoming calls by urgency
                content: |
                  Priority 1 (Emergency — same day): Active flooding/water damage, gas leak or CO alarm,
                  no water to entire building, sewer backup into living space, burst pipe.
                  Priority 2 (Urgent — within 24 hours): No hot water, single toilet home with toilet failure,
                  significant fixture leak (cabinet damage risk), frozen pipe (not yet burst).
                  Priority 3 (Standard — within 3-5 days): Slow drains, dripping faucet, running toilet,
                  minor fixture issues, hose bibb leak. Priority 4 (Scheduled — within 1-2 weeks):
                  Fixture upgrades, water heater replacement (still functional), preventive maintenance,
                  remodel consultations. Always ask: Is there active water damage? Can you shut off the water?
                  Is there a gas odor? These questions immediately determine priority level.

      - label: Plumbing Engineer
        role_key: engineer
        cross_ref_departments: ["Water Supply", "Drain/Waste/Vent", "Gas Piping"]
        tasks:
          - label: Commercial plumbing system design
            summary: Design plumbing systems for commercial and multi-family buildings
            systems:
              - label: Commercial water supply design
                summary: Design water supply for commercial buildings
                content: |
                  Key differences from residential: higher fixture counts (WSFU aggregation per IPC Table 604.3),
                  domestic booster pump systems (required when street pressure insufficient for upper floors),
                  hot water recirculation systems (required per IPC 607.2.1 for systems where wait time >designated
                  seconds, or per energy code). Water hammer arrestors required per IPC 604.9 on quick-closing
                  valves. Backflow prevention: RPZ at building service for high-hazard occupancies (medical, lab,
                  industrial). Fire department connection and fire suppression coordination with fire protection engineer.
                  Water meter sizing: coordinate with utility — size for peak demand, not pipe size.
              - label: Commercial DWV design
                summary: Design drainage for commercial buildings
                content: |
                  Key differences from residential: grease interceptors required for food service (IPC 1003 —
                  size per PDI G101 or local requirements), acid-resistant drainage for laboratories (borosilicate
                  glass, polypropylene, or PVDF per IPC 803), indirect waste connections for food/beverage equipment
                  (IPC 801), storm drainage design (IPC Chapter 11 — separate from sanitary system, size per rainfall
                  intensity data). Ejector/sump pump systems for below-sewer fixtures. Sewage pump sizing:
                  2" solids handling minimum for sanitary, duplex pumps with alternator for commercial.
