version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: corvus
      POSTGRES_PASSWORD: corvus
      POSTGRES_DB: corvus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corvus"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+asyncpg://corvus:corvus@db:5432/corvus"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      TENANT_ID: "${TENANT_ID:-corvus-aero}"
      PORT: "${PORT:-8002}"
    ports:
      - "${PORT:-8002}:${PORT:-8002}"

volumes:
  pgdata:
