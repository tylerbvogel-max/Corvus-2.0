# GovCloud override — use with: docker compose -f docker-compose.yml -f docker-compose.govcloud.yml up
#
# Removes local PostgreSQL (GovCloud uses Azure Database for PostgreSQL).
# Routes all LLM calls through Azure OpenAI via model aliases.
# Enables RBAC via Azure AD JWT validation.

services:
  db:
    # Disable local database — GovCloud uses Azure PostgreSQL
    profiles: ["local-only"]

  backend:
    depends_on: []
    environment:
      # Database (Azure PostgreSQL, private endpoint)
      DATABASE_URL: "${DATABASE_URL}"

      # Azure OpenAI (required — no Anthropic models in GovCloud)
      AZURE_OPENAI_API_KEY: "${AZURE_OPENAI_API_KEY}"
      AZURE_OPENAI_ENDPOINT: "${AZURE_OPENAI_ENDPOINT}"
      AZURE_OPENAI_API_VERSION: "${AZURE_OPENAI_API_VERSION:-2024-10-21}"
      AZURE_OPENAI_DEPLOYMENT_GPT4O: "${AZURE_OPENAI_DEPLOYMENT_GPT4O}"
      AZURE_OPENAI_DEPLOYMENT_GPT4O_MINI: "${AZURE_OPENAI_DEPLOYMENT_GPT4O_MINI}"
      AZURE_OPENAI_DEPLOYMENT_O1: "${AZURE_OPENAI_DEPLOYMENT_O1:-}"

      # Model aliases — redirect Corvus model names to Azure models
      LLM_MODEL_ALIASES: '{"haiku":"azure-gpt4o-mini","sonnet":"azure-gpt4o","opus":"azure-gpt4o"}'

      # RBAC (Azure AD)
      RBAC_MODE: "azure_ad"
      RBAC_AZURE_TENANT_ID: "${RBAC_AZURE_TENANT_ID}"
      RBAC_ADMIN_CLAIM: "${RBAC_ADMIN_CLAIM:-corvus-admin}"
      RBAC_REVIEWER_CLAIM: "${RBAC_REVIEWER_CLAIM:-corvus-reviewer}"

      # Access & tenant
      CORVUS_ACCESS_KEY: "${CORVUS_ACCESS_KEY}"
      TENANT_ID: "${TENANT_ID:-corvus-aero}"
      PORT: "${PORT:-8002}"
      CORS_ORIGINS: "${CORS_ORIGINS:-}"
